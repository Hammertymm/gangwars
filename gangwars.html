<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

</head>
<body>
<div id="portrait-root">
<div id="crt">
  <div class="masthead">
<h1 class="serif" aria-label="Gang Wars"><img src="./banner.png" alt="Gang Wars" class="masthead-banner"></h1>
  </div>
  <div id="app"></div>
  <div id="game-live" role="status" aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;padding:0;margin:0;"></div>
</div>
</div>

<script src="engine.js"></script>
<script src="ledger.js"></script>
<script src="ledger-ui.js"></script>
<script src="audio.js"></script>
<script>
if (typeof document !== "undefined") {
(function lockPortrait(){
  const tryLock = () => {
    const o = screen.orientation;
    if (!o || typeof o.lock !== "function") return;
    o.lock("portrait").catch(() => {});
  };
  tryLock();
  window.addEventListener("orientationchange", tryLock);
  document.addEventListener("click", tryLock, { once: true, passive: true });
})();
(function(){
  const app = document.getElementById("app");
  const SAVE_KEY = "gw:save", HS_KEY = "gw:highscores", LEDGER_KEY = "gw:ledger";
  const A = () => window.GangWarsAudio;
  function audioUnlock(){ if (A()) A().unlock(); }
  function audioPlay(id, opts){ if (A()) A().play(id, opts); }
  function syncSceneAudio(scene){
    if (A()) A().onScene(scene);
    updateMuteButtons();
  }
  function updateMuteButtons(){
    const enabled = A() && A().isEnabled();
    document.querySelectorAll("[data-audio-mute]").forEach(btn => {
      btn.hidden = !enabled;
      if (!enabled) return;
      const muted = A().isMuted();
      const label = muted ? "Unmute sound" : "Mute sound";
      const icon = muted ? "\u{1F507}" : "\u{1F50A}";
      btn.textContent = icon;
      btn.setAttribute("aria-label", label);
    });
  }
  function bindMuteButton(el){
    if (!el) return;
    el.dataset.audioMute = "1";
    el.onclick = (e) => {
      e.stopPropagation();
      if (!A() || !A().isEnabled()) return;
      audioUnlock();
      A().setMuted(!A().isMuted());
      updateMuteButtons();
    };
    updateMuteButtons();
  }
  document.addEventListener("click", () => audioUnlock(), { once: true, passive: true });
  app.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn || btn.disabled || btn.dataset.audioMute) return;
    if (!A() || !A().isEnabled()) return;
    audioUnlock();
    audioPlay("sfx.ui.buttonTap");
  }, true);
  if (A()) A().init();
  bindMuteButton(document.getElementById("audio-mute"));
  let saveCorrupted = false;
  function announce(msg){ const el = document.getElementById("game-live"); if(el) el.textContent = msg; }
  let S = null, modal = null;
  let ledgerView = null, ledgerViewCat = null, ledgerFocusId = null, ledgerReturn = null;
  let pendingUnlockQueue = [], pendingCompleteQueue = [];
  let ledger = migrateLedger((() => { try { return JSON.parse(localStorage.getItem(LEDGER_KEY)); } catch(e) { return null; } })());
  const money = n => "$"+Math.round(n).toLocaleString("en-US");
  const TITLE_SCREEN = "title-screen.png?v=12";
  const TITLE_CANVAS = { w: 853, h: 1844 };
  function layoutTitleScreen(){
    const cover = document.querySelector(".title-cover");
    if (!cover) return;
    const { w: W, h: H } = TITLE_CANVAS;
    const vv = window.visualViewport;
    const vw = vv ? vv.width : window.innerWidth;
    const vh = vv ? vv.height : window.innerHeight;
    if (!vw || !vh) return;
    const scale = Math.max(vw / W, vh / H);
    const sw = W * scale, sh = H * scale;
    cover.style.width = sw + "px";
    cover.style.height = sh + "px";
    cover.style.left = ((vw - sw) / 2 + (vv?.offsetLeft || 0)) + "px";
    cover.style.top = Math.max(0, (vh - sh) / 2 + (vv?.offsetTop || 0)) - 5 + "px";
  }
  function openLedgerCategory(catId){
    if (!LEDGER_CATEGORIES.find(c => c.id === catId)) return;
    ledgerView = "category";
    ledgerViewCat = catId;
    ledgerFocusId = null;
    render();
  }
  function ledgerUiCtx(){
    return {
      view: ledgerView,
      catId: ledgerViewCat,
      focusId: ledgerFocusId,
      ledger,
      onOpenCategory: openLedgerCategory,
      onBackHome: exitLedgerHome,
      onBackCategory: exitLedgerCategory,
      onRevealComplete: ()=>{ saveLedger(); render(); },
    };
  }
  function ledgerProgressText(){
    return `${countDiscovered(ledger)} / ${LEDGER_TOTAL} DISCOVERED`;
  }
  function titleAchievementText(){
    return `${countDiscovered(ledger)}/${LEDGER_TOTAL} ACHIEVEMENTS DISCOVERED`;
  }
  function titleAchievementCount(){
    return `${countDiscovered(ledger)}/${LEDGER_TOTAL}`;
  }
  function openLedgerFromTitle(){
    ledgerReturn = { type: "title", savedModal: null, savedModalEscape: null };
    ledgerView = "home";
    ledgerViewCat = null;
    ledgerFocusId = null;
    render();
  }
  function openLedgerReveal(achievementId){
    ledgerView = "category";
    ledgerViewCat = getCategoryForAchievement(achievementId);
    ledgerFocusId = achievementId;
    render();
  }
  function exitLedgerCategory(){
    if (ledgerFocusId && isUnlocked(ledger, ledgerFocusId)) {
      pendingUnlockQueue = pendingUnlockQueue.filter(id => id !== ledgerFocusId);
      saveLedger();
    }
    ledgerView = "home";
    ledgerViewCat = null;
    ledgerFocusId = null;
    render();
  }
  function exitLedgerHome(){
    if (ledgerReturn) { restoreLedgerReturn(); return; }
    ledgerView = null;
    render();
  }
  function captureLedgerReturn(){
    ledgerReturn = {
      type: S ? "game" : "title",
      savedModal: modal && modal._achFlow ? null : modal,
      savedModalEscape: modal && modal._achFlow ? null : modalEscape,
    };
  }
  function restoreLedgerReturn(){
    const ret = ledgerReturn;
    ledgerView = null;
    ledgerViewCat = null;
    ledgerFocusId = null;
    ledgerReturn = null;
    if (!ret) { render(); return; }
    modal = ret.savedModal || null;
    modalEscape = ret.savedModalEscape || null;
    render();
  }
  function renderLedgerRoute(){
    const crt = document.getElementById("crt");
    // Home and category pages both reuse the High Scores layout (Gang Wars banner shown).
    crt.classList.remove("title-mode", "ledger-mode");
    crt.classList.add("game-mode");
    app.dataset.ledgerView = ledgerView || "";
    app.dataset.ledgerCategory = ledgerViewCat || "";
    app.dataset.ledgerFocus = ledgerFocusId || "";
    LedgerUI.render(app, ledgerUiCtx());
  }
  const EVENT_IMG_VERSION = "events-v4";
  function versionEventImage(path){
    if (typeof path !== "string" || !path.startsWith("events/") || path.includes("?")) return path;
    return `${path}?v=${EVENT_IMG_VERSION}`;
  }
  function getAchievementCardImage(id){
    const cat = getCategoryForAchievement(id);
    if (cat === "rare") return versionEventImage(`events/rare_${id}.jpg`);
    if (cat === "superRare") return versionEventImage(`events/super_${id}.jpg`);
    if (cat === "godlike") return versionEventImage(`events/godlike_${id}.jpg`);
    if (cat === "goldenGodlike") return versionEventImage("events/godlike_golden.jpg");
    return null;
  }
  /** Achievement unlock presentation (Achievement Found → reveal / card → ledger list). */
  function tryShowAchievementFlow(){
    if (modal && modal._achFlow) return true;
    if (pendingUnlockQueue.length) { showAchievementFoundPopup(); return true; }
    if (pendingCompleteQueue.length) { showLedgerCompletionPopup(pendingCompleteQueue[0]); return true; }
    return false;
  }
  function showAchievementFoundPopup(){
    audioPlay("sfx.achievement.found");
    modal = function(){
      modal._achFlow = true;
      app.innerHTML = `<div class="modal"><div class="card ach-found-card" role="dialog" aria-modal="true">
        <div class="ach-found-popup">
          <div class="ach-found-rule">════════════════════</div>
          <div class="ach-found-title">ACHIEVEMENT FOUND</div>
          <div class="ach-found-body">A NEW ENTRY HAS BEEN<br>ADDED TO YOUR LEDGER</div>
          <button type="button" class="full amber" id="achView">OK</button>
          <div class="ach-found-rule">════════════════════</div>
        </div>
      </div></div>`;
      document.getElementById("achView").onclick = ()=>{
        const id = pendingUnlockQueue[0];
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        if (!id) { render(); return; }
        captureLedgerReturn();
        const catId = getCategoryForAchievement(id);
        if (catId === "general") openLedgerReveal(id);
        else showAchievementCardReveal(id);
      };
      modalEscape = ()=>{
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        render();
      };
    };
    render();
  }
  function showLedgerCompletionPopup(kind){
    const isMaster = kind === "master";
    const cat = isMaster ? null : LEDGER_CATEGORIES.find(c => c.id === kind);
    const title = isMaster ? "CRIME LORD" : cat.completeTitle;
    const sub = isMaster
      ? `ALL ${LEDGER_TOTAL} LEDGER ENTRIES DISCOVERED`
      : `${cat.achievements.length} / ${cat.achievements.length} FOUND`;
    modal = function(){
      modal._achFlow = true;
      app.innerHTML = `<div class="modal"><div class="card ledger-complete${isMaster ? " master" : ""}" role="dialog" aria-modal="true">
        <div class="ach-found-rule">════════════════════</div>
        <h2>${title}</h2>
        <p>${isMaster ? sub : `${cat.achievements.length} / ${cat.achievements.length} FOUND`}</p>
        ${isMaster ? '<p class="ledger-master-tag">THE CITY IS YOURS</p>' : ""}
        <div class="ach-found-rule">════════════════════</div>
        <button class="full amber" id="ok" style="margin-top:12px">CONTINUE</button>
      </div></div>`;
      document.getElementById("ok").onclick = ()=>{
        if (isMaster) {
          ledger.masterCompleteShown = true;
          saveLedger();
        } else {
          markCategoryCompleteShown(ledger, kind);
          saveLedger();
        }
        pendingCompleteQueue = pendingCompleteQueue.filter(k => k !== kind);
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        if (pendingUnlockQueue.length) showAchievementFoundPopup();
        else if (pendingCompleteQueue.length) showLedgerCompletionPopup(pendingCompleteQueue[0]);
        else restoreLedgerReturn();
      };
    };
    render();
  }
  function showAchievementCardReveal(achievementId){
    const img = getAchievementCardImage(achievementId);
    const cat = getCategoryForAchievement(achievementId);
    const golden = cat === "goldenGodlike";
    modal = function(){
      modal._achFlow = true;
      app.innerHTML = `<div class="ach-card-reveal${golden ? " golden" : ""}" id="achCardReveal" role="dialog" aria-modal="true">
        <img src="${img}" alt="${getAchievementTitle(achievementId)}" decoding="async">
        <button type="button" class="ach-card-next" id="achCardNext">NEXT</button>
      </div>`;
      const advance = ()=>{
        revealAchievement(ledger, achievementId);
        saveLedger();
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        openLedgerReveal(achievementId);
      };
      document.getElementById("achCardNext").onclick = advance;
      document.getElementById("achCardReveal").onclick = e=>{
        if (e.target.id === "achCardReveal") advance();
      };
      modalEscape = advance;
    };
    render();
  }
  const DISTRICT_IMG = {
    "Little Italy":       "assets/little-italy.jpg",
    "Dock #13":           "assets/dock-13.jpg",
    "Kitty Kat Club":     "assets/kitty-kat-club.jpg",
    "Uptown":             "assets/uptown.jpg",
    "Warehouse District": "assets/warehouse-district.jpg",
    "City Hall":          "assets/city-hall.jpg",
  };
  const GOODS_IMG_VERSION = "160x250-v3";
  const GOODS_IMG = Object.fromEntries(GOODS.map(d => [d.id, `assets/goods/${d.id}.png?v=${GOODS_IMG_VERSION}`]));


  function save(){
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }
    catch(e){
      const el = document.getElementById("save-err");
      if(el) el.textContent = "Could not save — storage may be full or disabled.";
    }
  }
  const TUTORIAL_KEY = "gw:tutorialDone";
  function load(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return null;
      return migrateSave(JSON.parse(raw));
    }catch(e){ saveCorrupted = true; localStorage.removeItem(SAVE_KEY); return null; }
  }
  function highscores(){ try{ return JSON.parse(localStorage.getItem(HS_KEY))||[]; }catch(e){ return []; } }
  function sortHighscores(hs){
    return hs.slice().sort((a, b) => b.worth - a.worth || String(a.date || "").localeCompare(String(b.date || "")));
  }
  function pushScore(score, worth){
    const hs = highscores();
    const entry = {score, worth, date:new Date().toISOString().slice(0,10)};
    hs.push(entry);
    const sorted = sortHighscores(hs);
    const placement = sorted.findIndex(e => e === entry) + 1;
    localStorage.setItem(HS_KEY, JSON.stringify(sorted.map(({score:s, worth:w, date:d}) => ({score:s, worth:w, date:d}))));
    return { placement, entry };
  }
  function scoreEntryMatch(a, b){
    return a && b && a.worth === b.worth && a.score === b.score && a.date === b.date;
  }
  function defaultLeaderboardRows(){
    const seeds = [50000000,45000000,40000000,35000000,30000000,25000000,20000000,15000000,10000000,5000000];
    return [...RANKS].reverse().map((rank, i) => ({ rank, worth: seeds[i], isDefault: true }));
  }
  function buildTop10Leaderboard(hs){
    const seeds = defaultLeaderboardRows();
    if (!hs.length) return seeds;
    const real = sortHighscores(hs).map(entry => ({ rank: getRank(entry.worth), worth: entry.worth, isDefault: false, entry }));
    const combined = [...real, ...seeds].sort((a, b) => b.worth - a.worth || (a.isDefault ? 1 : -1));
    return combined.slice(0, 10);
  }
  function rankPortrait(rank){
    const r = rank.toLowerCase().replace(/ /g,'-');
    return `cards/${r}-portrait.jpg`;
  }
  function mkScoresLbRow(row, pos, isYou){
    return `<div class="slb-row${isYou ? ' you' : ''}">
      <span class="slb-pos">${pos}.</span>
      <img class="slb-portrait" src="${rankPortrait(row.rank)}" alt="${row.rank}">
      <span class="slb-rank">${row.rank.toUpperCase()}</span>
      <span class="slb-score">${money(row.worth)}</span>
      ${isYou ? '<span class="slb-you">← YOU</span>' : ''}
    </div>`;
  }
  function saveLedger(){
    try { localStorage.setItem(LEDGER_KEY, JSON.stringify(ledger)); }
    catch(e) { /* storage full */ }
  }
  function startNewGame(){
    audioPlay("sfx.events.modalClose");
    if (A()) A().stopMusic();
    S = newGame(eventRollChances(ledger));
    migrateRunStats(S);
    save();
  }
  function queueUnlocks(ids){
    if (!ids || !ids.length) return;
    let eventUnlocked = false;
    ids.forEach(id => {
      if (!pendingUnlockQueue.includes(id)) pendingUnlockQueue.push(id);
      if (isEventAchievementId(id)) eventUnlocked = true;
    });
    if (eventUnlocked) resetEventPity(ledger);
    saveLedger();
    refreshCategoryCompletions();
    if (checkMasterComplete(ledger) && !ledger.masterComplete) {
      ledger.masterComplete = true;
      saveLedger();
      if (!ledger.masterCompleteShown) pendingCompleteQueue.push("master");
    }
  }
  function refreshCategoryCompletions(){
    LEDGER_CATEGORIES.forEach(cat => {
      if (isCategoryComplete(ledger, cat.id) && !wasCategoryCompleteShown(ledger, cat.id)) {
        if (!pendingCompleteQueue.includes(cat.id)) pendingCompleteQueue.push(cat.id);
      }
    });
  }
  function checkRunAchievements(){
    if (!S || S.over) return;
    migrateRunStats(S);
    const ids = checkGeneralAchievements(S, ledger);
    queueUnlocks(ids);
  }
  function checkEndAchievements(){
    if (!S) return;
    migrateRunStats(S);
    const ids = checkEndRunAchievements(S, ledger);
    queueUnlocks(ids);
  }
  function unlockFromEvent(eventId){
    queueUnlocks(unlockEventAchievement(ledger, eventId));
  }
  function logMsg(t){ S.log.unshift(`Day ${S.day}: ${t}`); S.log = S.log.slice(0,12); }
  function afterMarketAction(msg){
    const stall = tickStallPressure(S);
    if (stall){
      if (S.over){ endGame(stall); return; }
      logMsg(stall);
    }
    if (msg) logMsg(msg);
    save();
  }

  function bindModalCard(card){
    if(!card) return;
    card.setAttribute("role","dialog");
    card.setAttribute("aria-modal","true");
    const h2 = card.querySelector("h2");
    if(h2 && !card.getAttribute("aria-labelledby")) card.setAttribute("aria-labelledby", h2.id || (h2.id = "modal-title"));
  }
  function dismissModal(){
    modal = null;
    modalEscape = null;
    render();
  }
  let modalEscape = null;
  document.addEventListener("keydown", e=>{
    if(e.key !== "Escape") return;
    if (ledgerView && !modal) {
      e.preventDefault();
      exitLedgerHome();
      return;
    }
    if (!modal) return;
    e.preventDefault();
    if (modalEscape) modalEscape();
    else dismissModal();
  });



  /* ── Market anomaly event bodies ── */
  const ANOMALY_BODIES = {
    spike:[
      `The Feds hit three stash houses overnight. You won't find {ITEM} on the streets anymore. Name your price.`,
      `Big Daddy J stopped moving {ITEM}. The rest of the city mistook it for a law.`,
      `Father Dempsey condemned {ITEM} on Sunday. By Monday, his congregation had bought every crate.`,
      `The Tribune reported a {ITEM} shortage. It wasn't true until everyone believed it.`,
      `A sign read: "BUY {ITEM}. — A FRIEND FROM 1959." By noon, nobody was laughing.`,
      `A broker refused Big Daddy J's offer. By breakfast he accepted. By dinner he'd disappeared.`,
      `Aldermen declared {ITEM} a menace. Their chauffeurs bought every crate before the ink dried.`,
      `The Feds seized a warehouse of {ITEM}. Half returned as "missing evidence." The rest became expensive.`,
      `A bookmaker stopped taking bets and started buying {ITEM}. That's all the market needed to hear.`,
      `Someone asked where all the {ITEM} went. Nobody answered. Nobody needed to.`,
    ],
    surge:[
      `Rothstein's network collapsed. What's left of {ITEM} is selling like buried treasure.`,
      `Every {ITEM} dealer got the same offer: pay or close. The survivors named their own price.`,
      `A doctor prescribed {ITEM} for "modern nerves." By lunch, half the city felt unwell.`,
      `Nobody knew why the queue formed. By noon, nobody cared. {ITEM} was gone.`,
      `Big Daddy J quietly bought {ITEM}. By lunchtime, everyone else had a reason to.`,
      `Big Daddy J is entertaining tonight. Every crate of {ITEM} already has an invitation.`,
      `Big Daddy J said three words. By sunrise, everyone was buying {ITEM}. Nobody asked what they were.`,
      `A truckload of {ITEM} vanished between two blocks. So did the witnesses.`,
      `The newspapers called {ITEM} a passing craze. The next edition cost twice as much.`,
      `Everybody laughed at the first buyer of {ITEM}. By afternoon they were laughing in a queue.`,
    ],
    flood:[
      `A hijacked shipment of {ITEM} got scattered across the docks. Someone's offloading it fast and cheap.`,
      `Nobody ordered this much {ITEM}. Nobody admits owning it. Everybody's selling it.`,
      `Only one man survived last night's deal. He's selling {ITEM} like tomorrow's somebody else's problem.`,
      `Big Bill Thompson lost the city's {ITEM} stockpile on a boxing match. Now everyone's buying it back.`,
      `Salvatore Minetti's dying wish: sell every crate of {ITEM}. His lawyer took him literally.`,
      `Big Daddy J flooded the {ITEM} market overnight. Somewhere, somebody got the message.`,
      `She sold every crate of {ITEM}. "It won't matter after '33," she smiled. Nobody understood.`,
      `The owner refused to sell {ITEM}. His widow accepted a much lower offer.`,
      `An accountant found one extra zero. The warehouse found nine extra shipments.`,
      `Somebody accidentally delivered {ITEM} to the evidence warehouse. Somebody else accidentally collected it.`,
    ],
  };

  function maybeTutorial(){
    if(localStorage.getItem(TUTORIAL_KEY)) return;
    const steps = [
      {title:"THE DON'S DEBT", body:`Your debt compounds at ${Math.round(CONFIG.loanInterest*100)}% every day you travel. Pay him down at Little Italy before it eats your profits — the Don caps total debt at ${money(CONFIG.maxTotalDebt)}.`},
      {title:"THE FAMILY VAULT", body:`Bank your cash at Little Italy only. Savings earn ${Math.round(CONFIG.bankInterest*100)}% daily — plus a ${Math.round(CONFIG.conservativeBankBonus*100)}% bonus when your debt is under half the cap.`},
      {title:"PACK HEAT", body:"Feds show up on the road. Buy guns when offered — without one, you can only run or bribe."},
      {title:"LOOSE CASH", body:"Muggings hit harder when you're carrying a lot of cash. Bank it at Little Italy before you travel — the streets notice a fat wallet."},
    ];
    let step = 0;
    function hideTutorial(){
      document.getElementById("tutorial-overlay")?.remove();
    }
    function finishTutorial(){
      localStorage.setItem(TUTORIAL_KEY, "1");
      hideTutorial();
      modal = null;
      modalEscape = null;
      render();
    }
    function showStep(){
      if(step >= steps.length){
        finishTutorial();
        return;
      }
      const s = steps[step];
      let el = document.getElementById("tutorial-overlay");
      if(!el){
        el = document.createElement("div");
        el.id = "tutorial-overlay";
        document.body.appendChild(el);
      }
      el.className = "tutorial";
      el.setAttribute("role", "dialog");
      el.setAttribute("aria-modal", "true");
      el.innerHTML = `<div class="card">
          <p class="na">Tip ${step+1}/${steps.length}</p>
          <h2 id="modal-title">${s.title}</h2><p>${s.body}</p>
          <div class="card-actions">
            <button type="button" id="tskip">SKIP</button>
            <button type="button" class="amber" id="tnext">${step===steps.length-1?"PLAY":"NEXT"}</button>
          </div>
        </div>`;
      el.querySelector("#tnext").onclick = ()=>{ step++; showStep(); };
      el.querySelector("#tskip").onclick = finishTutorial;
      modal = ()=>{};
      modalEscape = finishTutorial;
    }
    showStep();
  }

  function render(){
    const crt = document.getElementById("crt");
    if (ledgerView && !modal){
      document.documentElement.classList.remove("title-route");
      renderLedgerRoute();
      syncSceneAudio("ledger");
      return;
    }
    crt.classList.remove("ledger-mode");

  function openTrade(id, mode){
    const d = GOOD[id]; const price = S.prices[id];
    const maxFor = ()=> mode==="buy"
      ? Math.min(Math.floor(S.cash/price), spaceLeft(S))
      : (S.inventory[id]||0);
    let qty = maxFor();
    modal = function(){
      const max = maxFor(); if(qty>max) qty=max;
      const avg = mode==="sell" ? avgCost(S,id) : null;
      const pct = mode==="sell" ? profitPct(S,id,price) : null;
      app.innerHTML = `<div class="modal"><div class="card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">${mode==="buy"?"BUY":"SELL"} ${d.name}</h2>
        <p>Price <span class="price">${money(price)}</span> each<br>
          ${mode==="buy"?`can afford ${max}`:`you hold ${S.inventory[id]||0}`}</p>
        ${avg!=null?`<p class="profit ${pct>=0?'up':'down'}">Avg cost ${money(avg)} · ${pct>=0?'+':''}${pct}%</p>`:''}
        <label for="qty" class="na">Quantity</label>
        <input type="number" id="qty" min="0" max="${max}" value="${qty}" inputmode="numeric" aria-label="Quantity" />
        <div class="qtybtns">
          <button data-q="1">+1</button><button data-q="10">+10</button>
          <button data-q="half">½</button><button data-q="max">MAX</button>
        </div>
        <p class="center">Total <span class="price" id="tot">${money(price*qty)}</span></p>
        <p class="err" id="terr"></p>
        <div class="btns">
          <button class="amber" id="confirm">${mode==="buy"?"BUY":"SELL"} ${qty}</button>
          <button id="cancel">CLOSE</button>
        </div>
      </div></div>`;
      const input=document.getElementById("qty"), tot=document.getElementById("tot");
      const conf=document.getElementById("confirm");
      const setQ=v=>{ qty=Math.max(0,Math.min(maxFor(),Math.floor(v||0))); input.value=qty;
        tot.textContent=money(price*qty); conf.textContent=`${mode==="buy"?"BUY":"SELL"} ${qty}`; };
      input.oninput=()=>setQ(+input.value);
      app.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>{ const q=b.dataset.q;
        setQ(q==="max"?maxFor():q==="half"?Math.floor(maxFor()/2):qty+(+q)); });
      bindModalCard(app.querySelector(".card"));
      document.getElementById("cancel").onclick=dismissModal;
      conf.onclick=()=>{
        const err = mode==="buy"?buy(S,id,qty):sell(S,id,qty);
        if(err){ document.getElementById("terr").textContent=err; audioPlay("sfx.economy.errorDeny"); return; }
        audioPlay(mode==="buy"?"sfx.economy.coinsBuy":"sfx.economy.cashRegister");
        if (mode === "buy") {
          recordBuy(S, id, qty, price * qty);
          recordUnitsBought(ledger, qty);
          saveLedger();
        } else {
          const avg = avgCost(S, id);
          const profit = avg ? (price - avg) * qty : 0;
          recordSell(S, id, qty, profit);
        }
        announce(`${mode==="buy"?"Bought":"Sold"} ${qty} ${d.name} for ${money(price*qty)}.`);
        afterMarketAction(`${mode==="buy"?"Bought":"Sold"} ${qty} ${d.name}.`);
        checkRunAchievements();
        modal=null;
        if (tryShowAchievementFlow()) return;
        render();
      };
    };
    render();
  }

  function travelTo(dest){
    audioPlay("sfx.travel.engineStart");
    audioPlay("sfx.travel.dayTick");
    modal=null; S.location=dest; S.day+=1;
    audioPlay("sfx.travel.arrival");
    audioPlay("sfx.travel.screech");
    const eventsBefore = countEventAchievementsUnlocked(ledger);
    recordDistrictVisit(S, dest);
    recordSpaceChange(S);
    const capMsg = applyDailyInterest(S);
    if (capMsg){ endGame(capMsg); return; }
    if (S.day > CONFIG.days){ endGame(); return; }
    const { prices, anomaly, sr, gk, golden, re } = resolveTravelMarket(S, dest);
    S.prices = prices;
    S.anomaly = anomaly || null;
    if (LOCATION_FLAVOR[dest]) { logMsg(`Arrived in ${dest}. ${LOCATION_FLAVOR[dest]}`); announce(`Day ${S.day}. Arrived in ${dest}.`); }

    let marketEvent=null;
    if(golden && S.day===golden.day){
      unlockFromEvent('golden');
      const goldenImg=golden.img||'bigdaddy';
      marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'golden' }); showTierEvent(goldenImg, golden.lines[0], `${golden.lines[1]} Every price in the city is climbing.`, next); };
    } else if(gk && S.day===gk.day){
      unlockFromEvent(gk.id);
      const gkImg=gk.img||'bigdaddy';
      if(dest===gk.district){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'godlike' }); showTierEvent(gkImg, gk.lines[0], gk.lines[1], next); };
      } else {
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'godlike' }); showTierEvent(gkImg, 'BIG DADDY J IS ACROSS TOWN', `He's making moves in ${gk.district}. Every price there is climbing.`, next); };
      }
    } else if(sr && S.day===sr.day){
      unlockFromEvent(sr.id);
      const srImg=sr.img||'celeb';
      const srTitle = sr.title || (sr.lines && sr.lines[0]) || '';
      const srDesc  = sr.desc  || (sr.lines && sr.lines[1]) || '';
      if(dest===sr.district){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'superRare' }); showTierEvent(srImg, srTitle, srDesc, next); };
      } else {
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'superRare' }); showTierEvent(srImg, srTitle, `${srDesc} Head to ${sr.district} for the action.`, next); };
      }
    } else if(re && S.day===re.day){
      unlockFromEvent(re.id);
      const spikeGood=GOOD[re.commodity];
      const reImg=re.img||'intel';
      if(dest===re.district){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'rare' }); showTierEvent(reImg, re.lines[0], re.lines[1], next); };
      } else if(spikeGood){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'rare' }); showTierEvent(reImg, re.lines[0], `${re.lines[1]} ${spikeGood.name} prices are surging in ${re.district}.`, next); };
      }
    } else if(anomaly){
      const anomalyImg={spike:'shortage',surge:'frenzy',flood:'flood'};
      const body=pick(ANOMALY_BODIES[anomaly.type]).replace(/{ITEM}/g, anomaly.itemName);
      marketEvent=(next)=>{ if(A()) A().eventStinger({ anomalyType: anomaly.type }); showEvent(anomalyImg[anomaly.type], body, 'NOTED', next); };
    }

    runTravelEvents(()=>{
      if (isEventLedgerSlow(ledger) && countEventAchievementsUnlocked(ledger) === eventsBefore) {
        recordEventPityTravel(ledger);
        saveLedger();
      }
      checkRunAchievements();
      save();
      if (tryShowAchievementFlow()) return;
      render();
    }, marketEvent);
  }
  function runTravelEvents(done, firstEvent){
    const queue=[];
    if(firstEvent) queue.push(firstEvent);
    const candidates=[];
    if (chance(1/12)) candidates.push(eventMugging);
    if (chance(1/12)) candidates.push(eventFind);
    if (chance(1/7))  candidates.push(eventStash);
    if (chance(1/7))  candidates.push(eventGun);
    if (chance(1/7))  candidates.push(eventFeds);
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    queue.push(...candidates.slice(0, CONFIG.maxTravelEvents));
    let i=0; const next=()=>{ if(S.over)return; if(i>=queue.length){ save(); done(); return; } queue[i++](next); };
    next();
  }

    feds:     'events/the_feds.jpg',

    return versionEventImage(EV_IMG[imgKeyOrPath] || EV_IMG.intel);

  function fitEventPopupToImage(src){
    const popup = app.querySelector(".ev-popup");
    const left = popup && popup.querySelector(".ev-left");
    if (!popup || !left || !src){ if (popup) popup.classList.add("ev-ready"); return; }
    // Hide the popup until it's sized to the image so the oversized default
    // frame never flashes and then collapses (no resize flicker).
    popup.classList.add("ev-measuring");
    const reveal = ()=>{ popup.classList.remove("ev-measuring"); popup.classList.add("ev-ready"); };
    const fit = (naturalWidth, naturalHeight)=>{
      if (naturalWidth && naturalHeight){
        const leftWidth = left.getBoundingClientRect().width || popup.getBoundingClientRect().width / 2;
        const maxHeight = Math.floor(window.innerHeight * 0.88);
        const imageHeight = Math.round(leftWidth * naturalHeight / naturalWidth);
        popup.style.height = `${Math.min(imageHeight, maxHeight)}px`;
      }
      reveal();
    };
    const img = new Image();
    img.onload = ()=>fit(img.naturalWidth, img.naturalHeight);
    img.onerror = reveal;
    img.src = src;
    // Cached images are already complete — size synchronously, before paint.
    if (img.complete && img.naturalWidth) fit(img.naturalWidth, img.naturalHeight);
  }

  /* Single-button event popup with split image/text layout */
  function showEvent(imgKey, body, btn, cb){
    modal=function(){
      audioPlay("sfx.events.modalOpen");
      const imgSrc = eventImgSrc(imgKey);
      app.innerHTML=`<div class="modal"><div class="ev-popup" role="dialog" aria-modal="true">
        <div class="ev-left" style="background-image:url('${imgSrc}')" role="img" aria-label="Event illustration"></div>
        <div class="ev-right">
          <div class="ev-body"><div>${body}</div></div>
          <div class="ev-acts"><button class="amber full" id="ok">${btn||'OK'}</button></div>
        </div>
      </div></div>`;
      fitEventPopupToImage(imgSrc);
      const advance = ()=>{ audioPlay("sfx.events.modalClose"); modal=null; modalEscape=null; cb(); };
      document.getElementById("ok").onclick=advance;
      modalEscape = advance;
    };
    render();
  }

  /* Tier-event popup (rare / super rare / godlike / golden godlike):
     event title + description stacked above a large illustration, NEXT below. */
  function showTierEvent(imgKey, title, desc, cb){
    modal=function(){
      audioPlay("sfx.events.modalOpen");
      const imgSrc = eventImgSrc(imgKey);
      app.innerHTML=`<div class="modal modal-event"><div class="ev-tier" role="dialog" aria-modal="true" aria-label="${title}">
        <div class="ev-tier-head">
          <div class="ev-tier-title">${title}</div>
          <div class="ev-tier-desc">${desc}</div>
        </div>
        <div class="ev-tier-art"><img src="${imgSrc}" alt="" decoding="async"></div>
        <div class="ev-tier-acts"><button class="amber full" id="ok">NEXT</button></div>
      </div></div>`;
      const advance = ()=>{ audioPlay("sfx.events.modalClose"); modal=null; modalEscape=null; cb(); };
      document.getElementById("ok").onclick=advance;
      modalEscape = advance;
    };
    render();
  }

  /* Two-button choice popup (BUY/PASS style) */
  function showEventAsk(imgKey, body, yesLabel, onYes, noLabel, onNo){
    modal=function(){
      audioPlay("sfx.events.modalOpen");
      const imgSrc = eventImgSrc(imgKey);
      app.innerHTML=`<div class="modal"><div class="ev-popup" role="dialog" aria-modal="true">
        <div class="ev-left" style="background-image:url('${imgSrc}')" role="img" aria-label="Event illustration"></div>
        <div class="ev-right">
          <div class="ev-body"><div>${body}</div></div>
          <div class="ev-acts">
            <button class="amber full" id="yes">${yesLabel}</button>
            <button class="full" id="no">${noLabel}</button>
          </div>
        </div>
      </div></div>`;
      fitEventPopupToImage(imgSrc);
      const yes = ()=>{ audioPlay("sfx.events.modalClose"); modal=null; modalEscape=null; onYes(); };
      const pass = ()=>{ audioPlay("sfx.events.modalClose"); modal=null; modalEscape=null; onNo(); };
      document.getElementById("yes").onclick=yes;
      document.getElementById("no").onclick=pass;
      modalEscape = pass;
    };
    render();
  }

  /* Legacy plain-card toast (used by bank/Don modals — no image) */
  function toast(title, body, btn, cb){
    modal=function(){
      app.innerHTML=`<div class="modal"><div class="card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">${title}</h2><p>${body}</p>
        <button class="full amber" id="ok">${btn||"OK"}</button>
      </div></div>`;
      bindModalCard(app.querySelector(".card"));
      document.getElementById("ok").onclick=()=>{ modal=null; modalEscape=null; cb(); };
    };
    render();
  }
  function eventMugging(next){
    const loss=Math.min(S.cash, randInt(50, Math.max(100, Math.round(S.cash*0.15))));
    S.cash-=loss; logMsg(`Ambushed — lost ${money(loss)}.`);
    const mugV = pick([
      ["MUGGING", `A welcoming committee was waiting around the corner. They were fast, organised, and ${money(loss)} richer when they left.`],
      ["MUGGING", `The beating was free. Stealing ${money(loss)} was business.`],
      ["MUGGING", `You were robbed of ${money(loss)} by a man pretending to be a lamppost. In hindsight, he was unusually bright.`],
      ["MUGGING", `Three professionals took ${money(loss)}. "Tell whoever sent you the answer's still no." Nobody sent you.`],
      ["MUGGING", `A priest heard your confession and left with ${money(loss)}. He definitely wasn't a priest.`],
      ["MUGGING", `A man representing Big Daddy J collected an "associate fee" of ${money(loss)}. You paid promptly.`],
      ["MUGGING", `Four men relieved you of ${money(loss)}. The fifth apologised for the inconvenience.`],
      ["MUGGING", `You were pickpocketed of ${money(loss)} so elegantly you almost checked whether he'd left a receipt.`],
      ["MUGGING", `A street magician made ${money(loss)} disappear. He then disappeared as well.`],
      ["MUGGING", `The note simply read: "Mr J appreciates your contribution." The missing ${money(loss)} agreed.`],
    ]);
    showEvent('mugging', mugV[1], "DAMN", next);
  }
  function eventFind(next){
    if (spaceLeft(S)<=0){ next(); return; }
    const d=pick(GOODS); const n=Math.min(spaceLeft(S), randInt(2,7));
    S.inventory[d.id]=(S.inventory[d.id]||0)+n; logMsg(`Dead drop — picked up ${n} ${d.name}.`);
    const findV = pick([
      ["DEAD DROP", `Someone hid ${n} ${d.name} and never returned. You decide waiting would be impolite.`],
      ["DEAD DROP", `Whatever went down in that garage on Clark Street, the men who stashed ${n} ${d.name} won't be coming back. You will.`],
      ["DEAD DROP", `The Gennas are gone. Their ${n} ${d.name} isn't. You collect the inheritance.`],
      ["DEAD DROP", `The chalk outline's still fresh. The ${n} ${d.name} isn't going anywhere.`],
      ["DEAD DROP", `A crate of ${n} ${d.name}. A letter signed with one initial. You keep the goods. The fire keeps the letter.`],
      ["DEAD DROP", `The hearse is empty. The crate beside it isn't. ${n} ${d.name} has changed addresses.`],
      ["DEAD DROP", `The warehouse door stood open. The lock lay beside ${n} ${d.name}. Nobody else was coming back.`],
      ["DEAD DROP", `The cloakroom ticket and ${n} ${d.name} was still in the coat. The owner wasn't.`],
      ["DEAD DROP", `A warehouse foreman tipped his hat. ${n} ${d.name} is "Already paid for." He wouldn't say by whom.`],
      ["DEAD DROP", `A crate bore tomorrow's newspaper. Inside was ${n} ${d.name}. You ignored the headline.`],
    ]);
    showEvent('find', findV[1], "NICE", next);
  }
  function eventStash(next){
    const { add, cost } = rollStashUpgrade();
    if (S.cash<cost){ next(); return; }
    const sv=pick([
      `A mechanic studies your vehicle, nods once, and offers +${add} hidden crates for ${money(cost)}.`,
      `A man waves a patent for hidden crates. Genuine or not, he'll add +${add} for ${money(cost)}.`,
      `A blind carpenter measures by touch alone. The +${add} hidden crates fit perfectly. ${money(cost)}.`,
      `"Mr J covered the labour," the mechanic says. You only pay ${money(cost)} for +${add} hidden crates.`,
      `A stranger predicts computers. You settle for +${add} hidden crates instead. Cost: ${money(cost)}.`,
      `An undertaker offers +${add} hidden crates for ${money(cost)}. "Nobody inspects my work twice."`,
      `A locksmith smiles. "Locks keep honest people honest." He adds +${add} hidden crates for ${money(cost)}.`,
      `A theatre illusionist asks where you'd like the cargo to disappear. ${money(cost)} buys +${add} hidden crates.`,
      `A work order already bears your name. Nobody remembers writing it. ${money(cost)} finishes the job.`,
      `A bank vault engineer says your vehicle has "wasted space." ${money(cost)} fixes the problem.`,
    ]);
    showEventAsk('stash', sv, 'BUY',
      ()=>{ S.cash-=cost; S.space+=add; recordSpaceChange(S); logMsg(`+${add} stash space.`); modal=null; next(); },
      'PASS', ()=>{ modal=null; next(); }
    );
  }
  function eventGun(next){
    if (S.guns >= CONFIG.maxGuns){ next(); return; }
    const base=randInt(1500,2500);
    const cost=gunEventCost(base, S.guns);
    if (S.cash<cost){ next(); return; }
    const gv=pick([
      `An alley merchant opens a canvas bag just wide enough. Clean piece. ${money(cost)}. No promises.`,
      `A quiet veteran unwraps a well-kept sidearm. "I was hoping never to see it again." ${money(cost)}.`,
      `The piece on the table has a history you don't want to know about. ${money(cost)}, no questions, no paperwork. In this city that's a bargain.`,
      `Ness's men seized it Tuesday. It's for sale again today. ${money(cost)}.`,
      `"Big Daddy prefers his associates breathing." A clean piece costs ${money(cost)}.`,
      `"One day this belongs in a museum," he says. Today it's ${money(cost)}.`,
      `A Pinkerton detective hangs up his badge and slides a clean piece across the table. ${money(cost)}.`,
      `A pawnbroker shrugs. "Nobody pawns happy memories." The piece costs ${money(cost)}.`,
      `A tailor measures your jacket before recommending the firearm. "Fit matters." ${money(cost)}.`,
      `A bartender reaches beneath the counter. "Big Daddy said you might need this." ${money(cost)}.`,
    ]);
    showEventAsk('gun', gv, 'BUY',
      ()=>{ S.cash-=cost; S.guns+=1; logMsg(`Bought a gun.`); modal=null; next(); },
      'PASS', ()=>{ modal=null; next(); }
    );
  }
  /* Feds encounter — same combat math as the original cop fight */
  function eventFeds(next){
    let maxCops = 1 + Math.min(3, Math.floor(S.day / 8));
    if (S.day > 20) maxCops += 1;
    let cops = randInt(1, maxCops);
    let fightRound = 0;
    let fedsAudioStarted = false;
    const bribeScale = S.day > 20 ? 1.5 : 1;
    const fedsResolved = ()=>{ if (A()) { A().duckMusic(false); A().stopTensionMusic(); } };
    const draw=(msg)=>{
      modal=function(){
        const canFight=S.guns>0;
        if (!fedsAudioStarted) {
          audioPlay("sfx.combat.siren");
          if (A()) { A().duckMusic(true); A().playMusic("music.fedsTension"); }
          fedsAudioStarted = true;
        }
        const imgSrc = eventImgSrc('feds');
        app.innerHTML=`<div class="modal"><div class="ev-popup" role="dialog" aria-modal="true">
          <div class="ev-left" style="background-image:url('${imgSrc}')" role="img" aria-label="The Feds"></div>
          <div class="ev-right">
            <div class="ev-body"><div>
              Agent Hayes spotted you — <b>${cops}</b> ${cops>1?'agents':'agent'} closing in.<br><br>
              HP: <b>${S.health}/${CONFIG.startHealth}</b> &nbsp;·&nbsp; Guns: <b>${S.guns}</b>
              ${msg?`<br><br><span style="color:var(--red)">${msg}</span>`:''}
            </div></div>
            <div class="ev-acts">
              <button class="red full" id="fight"${canFight?'':' style="opacity:.32"'}>FIGHT</button>
              <button class="full" id="run">RUN</button>
              <button class="amber full" id="bribe">PAYOFF</button>
              ${!canFight?'<span class="ev-warn">No gun — can\'t fight back.</span>':''}
            </div>
          </div>
        </div></div>`;
        fitEventPopupToImage(imgSrc);
        document.getElementById("run").onclick=doRun;
        document.getElementById("bribe").onclick=doBribe;
        const f=document.getElementById("fight");
        f.onclick=()=>{ if (canFight) doFight(); else audioPlay("sfx.combat.emptyClick"); };
        modalEscape = null;
      };
      render();
    };
    const hit=()=>{ audioPlay("sfx.combat.punchOof", { variant: "random" }); S.health-=1; if(S.health<=0){ audioPlay("sfx.combat.deathSting"); endGame("The city has a short memory. By morning nobody will remember your name."); return true; } return false; };
    const doFight=()=>{
      fightRound++;
      const copsBefore = cops;
      cops = fedsApplyFightKill(S, cops, fightRound);
      if (cops<=0){ const reward=randInt(3750,10000); S.cash+=reward;
        grantDebtInterestFreeze(S, 1);
        recordFedFightWin(S);
        logMsg(`Beat the Feds, grabbed ${money(reward)}.`); modal=null;
        audioPlay("sfx.combat.tommyBurst");
        fedsResolved();
        const winV=pick([
          ["LAST MAN STANDING", `The smoke clears. The Feds don't get up. You do. The city has a long memory for days like this.`],
          ["ONE FOR THE PAPERS", `By evening the headlines had improved your reputation and damaged the truth. You can live with both.`],
          ["THE HOUSE WINS", `Another raid fails. Another detective writes a longer report. Business resumes before the ink is dry.`],
          ["WRONG TARGET", `They expected an easy arrest. They found you instead. Someone back at headquarters has difficult paperwork ahead.`],
          ["NOTHING TO REPORT", `Witnesses suddenly remembered urgent appointments. The official report will be remarkably uncomplicated.`],
          ["NOTED", `A boy in a pressed suit tips his hat. "Big Daddy heard." He says nothing else. He doesn't need to.`],
          ["WITNESSES FORGET", `Nobody saw enough to testify. Those who did suddenly remembered other appointments.`],
          ["BETTER LUCK TOMORROW", `Agent Hayes tips his hat before limping off. Even he knows when today's argument is over.`],
          ["EXPENSIVE LESSON", `Somebody underestimated you. The city won't make that mistake twice.`],
          ["CITY BUSINESS", `The street empties, the smoke settles, and Manhattan carries on as though nothing happened.`],
        ]);
        showEvent('feds', winV[1], "GO", next); return; }
      if (cops < copsBefore) audioPlay("sfx.combat.gunshot");
      if (chance(fedsCounterHitChance(S.guns, fightRound, S.day))){ if(hit())return; draw("You took a hit!"); }
      else { audioPlay("sfx.combat.emptyClick"); draw("You missed — they're still on you."); }
    };
    const doRun=()=>{
      if (chance(0.62)){ logMsg("Vanished into the streets."); modal=null;
        audioPlay("sfx.travel.screech");
        fedsResolved();
        const runV=pick([
          ["GONE", `You turn one corner, then another. By the time the whistles catch up, you're already somebody else's problem.`],
          ["INTO THE CROWD", `Lunch hour arrives at exactly the right moment. A hundred hats later, even you couldn't pick yourself out.`],
          ["THE BACK WAY", `The city keeps secrets. Today one of them kept you.`],
          ["LOST IN THE PARADE", `A brass band rounds the corner. By the final chorus you're applauding with everyone else.`],
          ["THE FUNERAL", `You borrow a solemn face and join the mourners. Nobody questions grief.`],
          ["THE LEFT TURN", `They chase the obvious route. You stopped being obvious years ago.`],
          ["WRONG PLATFORM", `You step onto a train just as the doors close. The Feds arrive in time to watch it leave.`],
          ["BORROWED HAT", `You swap hats with a stranger. Five seconds later the Feds arrest a very confused insurance salesman.`],
          ["ANOTHER FACE", `You straighten your tie, slow your pace, and become just another citizen with somewhere to be.`],
          ["THE NEWS CYCLE", `Tomorrow's paper will report a dramatic pursuit. It won't mention where you stopped for lunch.`],
        ]);
        showEvent('feds', runV[1], "PHEW", next); return; }
      if (hit()) return;
      const owned=Object.keys(S.inventory);
      if (owned.length){ const id=pick(owned); const lost=Math.min(S.inventory[id],randInt(1,5));
        S.inventory[id]-=lost; if(S.inventory[id]<=0) delete S.inventory[id];
        logMsg(`Fled but dropped ${lost} ${GOOD[id].name} and took a hit.`); }
      draw("Couldn't shake them — took a hit and dropped some goods.");
    };
    const doBribe=()=>{
      const cost=Math.min(S.cash, Math.round(randInt(2000,8000)*cops*bribeScale));
      if (cost<=0||cost>S.cash){ draw("Nothing to pay them with."); return; }
      S.cash-=cost; logMsg(`Counted out ${money(cost)} into an open palm.`); modal=null;
      audioPlay("sfx.events.bribePaid");
      fedsResolved();
      const brV=pick([
        ["NOBODY SAW ANYTHING", `The money changes hands. Memories become remarkably unreliable. The street returns to normal.`],
        ["CITY RATES", `The officer counts the cash twice, thanks you for your cooperation, and wishes you a pleasant afternoon.`],
        ["CIVIC DONATION", `Your contribution to public safety has been gratefully acknowledged.`],
        ["ABOVE BOARD", `Several receipts change hands. None explain what actually happened.`],
        ["ALREADY HANDLED", `Before you reach for your wallet the officer nods. "Big Daddy already handled it."`],
        ["ADMINISTRATIVE ERROR", `Your name disappears from the paperwork before the ink has time to dry.`],
        ["EXPEDITED PROCESSING", `The paperwork moves with astonishing efficiency once accompanied by folding money.`],
        ["THE USUAL ARRANGEMENT", `Neither of you mentions the money. That's how you know you're both professionals.`],
        ["THE RECEIPT", `"Would you like a receipt?" he asks. You both enjoy the joke more than expected.`],
        ["INTERNAL AFFAIRS", `"Best not mention this to Internal Affairs," he says. "They're happiest when they're surprised."`],
      ]);
      showEvent('feds', brV[1], "OK", next);
    };
    draw(null);
  }

  /* ---------- game over ---------- */
  function endGame(reason){
    if (A()) { A().stopMusic(); A().duckMusic(false); }
    audioPlay("sfx.end.rankReveal");
    S.over=true; S.overReason=reason||`Your month is over. Whatever you made, it's going to have to be enough.`;
    const result = pushScore(classicScore(S), netWorth(S));
    S.placement = result.placement;
    S.scoreEntry = result.entry;
    checkEndAchievements();
    save();
    saveLedger();
    if (tryShowAchievementFlow()) { render(); return; }
    render();
  }
  function renderGameOver(){
    const worth = netWorth(S);
    const hs = highscores();
    const top10 = buildTop10Leaderboard(hs);
    const playerInTop10 = top10.findIndex(row => !row.isDefault && scoreEntryMatch(row.entry, S.scoreEntry)) !== -1;
    const rows = top10.map((row, i) => {
      const isYou = !row.isDefault && scoreEntryMatch(row.entry, S.scoreEntry);
      return mkScoresLbRow(row, i + 1, isYou);
    }).join("");

    let outsideRow = '';
    if (!playerInTop10 && S.scoreEntry) {
      const real = sortHighscores(hs).map(e => ({ worth: e.worth, isDefault: false, entry: e }));
      const combined = [...real, ...defaultLeaderboardRows()].sort((a, b) => b.worth - a.worth || (a.isDefault ? 1 : -1));
      const pos = combined.findIndex(row => !row.isDefault && scoreEntryMatch(row.entry, S.scoreEntry)) + 1;
      outsideRow = `<div class="scores-lb-wrap eos-you-wrap">${mkScoresLbRow({ rank: getRank(worth), worth }, pos, true)}</div>`;
    }

    app.innerHTML = `<div class="play scores-play eos-play">
      <div class="scores-hero">
        <img src="./assets/city-hall.jpg" alt="" class="scores-hero-img">
        <div class="scores-hero-overlay"></div>
        <div class="scores-hero-title eos-hero-title">
          <span class="eos-hero-label">FINAL SCORE</span>
          <span class="eos-orn-line"></span>
          <span class="eos-hero-amt">${money(worth)}</span>
        </div>
      </div>
      <div class="scores-lb-wrap">${rows}</div>
      ${outsideRow}
      <div class="scores-foot eos-foot">
        <button class="amber" id="again">PLAY AGAIN</button>
        <button id="menu">MAIN MENU</button>
      </div>
    </div>`;
    document.getElementById("again").onclick = ()=>{ localStorage.removeItem(SAVE_KEY); startNewGame(); render(); };
    document.getElementById("menu").onclick = ()=>{ S=null; render(); };
  }


  window.GangWarsLedger = {
    getLedger: () => ledger,
    getViewState: () => ({ view: ledgerView, categoryId: ledgerViewCat, focusId: ledgerFocusId }),
    getPendingUnlocks: () => pendingUnlockQueue.slice(),
    getPendingCompletions: () => pendingCompleteQueue.slice(),
    ledgerUiCtx,
    ledgerProgressText,
    getAchievementCardImage,
    openLedgerFromTitle,
    openLedgerCategory,
    openLedgerReveal,
    exitLedgerCategory,
    exitLedgerHome,
    saveLedger,
  };

  render();
})();
}
</script>
<script>
  if ('serviceWorker' in navigator && !/^127\.0\.0\.1$|^localhost$/i.test(location.hostname)) {
    navigator.serviceWorker.register('./sw.js?v=126').then(reg => {
      reg.update();
      reg.addEventListener('updatefound', () => {
        const worker = reg.installing;
        if (!worker) return;
        worker.addEventListener('statechange', () => {
          if (worker.state === 'installed' && navigator.serviceWorker.controller) {
            worker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    });
    // NOTE: deliberately do NOT reload on controllerchange. A forced reload
    // when a new SW activates interrupts active play (in-memory state isn't
    // restored on load, so it drops back to the title). The updated assets
    // apply on the next natural page load instead.
  }
</script>
</body>
</html>
