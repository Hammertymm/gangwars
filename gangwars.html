<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#15110b" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gang Wars" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="preload" as="image" href="title-screen.png" fetchpriority="high" />
<title>GANG WARS</title>
<style>
  :root{
    color-scheme:dark;
    /* READABLE — art-deco speakeasy: espresso black, cream, gold */
    --bg:#15110b; --panel:#201a11;
    --text:#ece1cd; --dim:#9c8d73;
    --green:#c9a24a; --amber:#e7c879; --red:#cf6a5d;
    --border:#3a2f1d; --bartrack:#2a2114;
    --btnbg:#241d12; --btnborder:#4a3b22;
    --shadow:rgba(0,0,0,.55); --glow:none; --rowline:#2a2215;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{height:100%;height:100svh;height:100dvh;}
  html,body{margin:0;padding:0;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:ui-monospace,"SF Mono","Menlo",Consolas,monospace;font-size:15px;line-height:1.4;
    -webkit-text-size-adjust:100%;}
  body{display:flex;justify-content:center;align-items:stretch;
    height:100vh;height:100svh;height:100dvh;}
  .serif{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,"Times New Roman",serif;}
  #crt{width:100%;max-width:540px;display:flex;flex-direction:column;
    min-height:0;height:100vh;height:100svh;height:100dvh;max-height:100dvh;overflow:hidden;
    padding:calc(env(safe-area-inset-top, 0px) + 10px) 10px calc(env(safe-area-inset-bottom, 0px) + 12px) 10px;background:var(--bg);}
  .masthead{flex:0 0 auto;text-align:center;
    border-top:3px double var(--amber);border-bottom:3px double var(--amber);
    padding:3px 0;margin:0 0 3px;}
  #crt.game-mode{padding:calc(env(safe-area-inset-top, 0px) + 1px) 8px env(safe-area-inset-bottom, 0px) 8px;}
  #crt.game-mode .masthead{padding:2px 0;margin:0 0 15px;}
  #crt.game-mode h1{font-size:clamp(1.1rem, 6.5vw, 2rem);}
  h1{font-size:clamp(1.35rem, 7.5vw, 2.4rem);letter-spacing:2px;margin:0;line-height:1.05;
    color:var(--amber);text-shadow:var(--glow);font-weight:900;white-space:nowrap;}
  #app{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  /* ── three-zone permanent frame ── */
  .play{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;}

  /* Illustration assets — lighten ~10% for readability on dark UI */
  .goods-icon-wrap .goods-icon,.market-play .loc-header img,.travel-head img,.travel-row img,.eos-art img{
    filter:brightness(1.1);}

  /* MARKET SCREEN — fixed single-screen layout (no scroll) */
  .market-play{gap:5px;overflow:hidden;}
  .market-play .loc-header{flex:0 0 16%;min-height:76px;max-height:112px;
    display:flex;gap:6px;align-items:stretch;padding:4px 8px 4px 4px;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;}
  .market-play .loc-header img{flex:0 0 auto;width:auto;height:100%;
    min-width:clamp(76px, 24vw, 120px);max-width:42%;aspect-ratio:1;
    display:block;object-fit:cover;object-position:center;
    image-rendering:pixelated;image-rendering:crisp-edges;border-radius:4px;
    border:1px solid var(--btnborder);}
  .market-play .loc-header-body{flex:1 1 auto;min-width:0;overflow:hidden;}
  .market-play .loc-header-title{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.94rem, 4.8vw, 1.18rem);font-weight:700;color:var(--amber);letter-spacing:1px;
    line-height:1.1;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .market-play .loc-header-day{font-size:clamp(.62rem, 2.8vw, .74rem);color:var(--dim);margin:1px 0 2px;}
  .market-play .loc-header-desc{font-size:clamp(.58rem, 2.5vw, .68rem);color:var(--dim);line-height:1.28;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .market-mid{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;
    background:var(--bg);border:1px solid var(--border);border-radius:8px;}
  .market-head{flex:0 0 auto;padding:5px 10px 3px;border-bottom:1px solid var(--border);}
  .market-golden-banner{flex:0 0 auto;margin:0;padding:5px 10px 4px;
    font-size:clamp(.58rem, 2.5vw, .68rem);letter-spacing:1.2px;text-transform:uppercase;
    text-align:center;color:#1a1206;background:linear-gradient(90deg, #b8860b, var(--amber), #b8860b);
    border-bottom:1px solid var(--amber);animation:golden-pulse 2s ease-in-out infinite;}
  @keyframes golden-pulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.15);}}
  .market-head-title{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.76rem, 3.4vw, .88rem);color:var(--amber);letter-spacing:1px;text-transform:uppercase;}
  .market-cols{flex:0 0 auto;display:grid;grid-template-columns:1fr minmax(4.2rem,5.4rem) 1.8rem minmax(5rem,6.8rem);gap:3px;
    padding:2px 8px 3px;font-size:clamp(.52rem, 2.3vw, .6rem);color:var(--dim);letter-spacing:.5px;
    border-bottom:1px solid var(--rowline);}
  .market-cols span:nth-child(2){text-align:right;}
  .market-cols span:nth-child(3){text-align:right;}
  .market-rows{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
  .market-row{flex:1 1 0;min-height:0;display:grid;grid-template-columns:1fr minmax(4.2rem,5.4rem) 1.8rem minmax(5rem,6.8rem);gap:3px;
    align-items:stretch;padding:1px 8px;border-bottom:1px solid var(--rowline);font-size:clamp(.62rem, 2.8vw, .74rem);
    overflow:hidden;}
  .market-row:last-child{border-bottom:none;}
  .market-row.dead{opacity:.42;}
  .market-row .price-cell,.market-row .hold-cell,.market-play .market-row .market-actions{align-self:center;}
  .goods-cell{display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;align-self:stretch;}
  .goods-icon-wrap{flex:0 0 auto;width:clamp(27px,8.3vw,43px);height:clamp(27px,8.3vw,43px);
    border:1px solid var(--btnborder);border-radius:4px;background:rgba(0,0,0,.35);
    padding:5px;box-sizing:border-box;overflow:hidden;
    display:grid;grid-template:1fr/1fr;align-items:center;justify-items:center;}
  .goods-icon{width:100%;height:100%;display:block;object-fit:contain;
    transform-origin:50% 50%;max-width:none;max-height:none;
    border:none;border-radius:0;background:transparent;padding:0;}
  /* ~2.3–2.7× zoom inside fixed frame; translate optically centres each silhouette */
  .goods-icon-wrap[data-good="moonshine"] .goods-icon{transform:scale(2.32) translate(-0.1%,-32.7%);}
  .goods-icon-wrap[data-good="cigars"] .goods-icon{transform:scale(2.70) translate(1.1%,-30%);}
  .goods-icon-wrap[data-good="bathgin"] .goods-icon{transform:scale(2.58) translate(1%,-36.9%);}
  .goods-icon-wrap[data-good="art"] .goods-icon{transform:scale(2.40) translate(2.2%,-29.8%);}
  .goods-icon-wrap[data-good="scotch"] .goods-icon{transform:scale(2.90) translate(4.1%,-36%);}
  .goods-icon-wrap[data-good="counterfeits"] .goods-icon{transform:scale(2.50) translate(-1.7%,30.9%);}
  .goods-icon-wrap[data-good="cognac"] .goods-icon{transform:scale(2.26) translate(-0.2%,28.6%);}
  .goods-icon-wrap[data-good="furcoats"] .goods-icon{transform:scale(2.48) translate(2.1%,26%);}
  .goods-icon-wrap[data-good="champagne"] .goods-icon{transform:scale(2.36) translate(3%,31%);}
  .goods-icon-wrap[data-good="diamonds"] .goods-icon{transform:scale(2.62) translate(5.9%,34.5%);}
  .goods-name{flex:1 1 auto;min-width:0;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .price-cell{text-align:right;color:var(--amber);white-space:nowrap;}
  .price-cell.na{color:var(--dim);}
  .hold-cell{text-align:right;color:var(--dim);white-space:nowrap;}
  .hold-cell.have{color:var(--green);}
  .market-play .market-actions{display:flex;justify-content:flex-end;align-items:center;gap:3px;
    white-space:nowrap;height:100%;max-height:100%;overflow:hidden;}
  .market-play .market-actions button{padding:2px 7px;font-size:clamp(.5rem, 2.1vw, .58rem);margin:0;border-radius:3px;
    min-height:0;min-width:0;height:clamp(20px, 92%, 30px);line-height:1.1;flex:0 0 auto;}
  .market-mid .actlog{flex:0 0 auto;font-size:clamp(.56rem, 2.4vw, .64rem);color:var(--dim);
    padding:4px 10px 5px;line-height:1.25;border-top:1px solid var(--border);}

  /* TRAVEL — locked standard: full car header, stacked districts, zero dead space (see docs/ui-standards/travel.png) */
  .travel-play{overflow:hidden;}
  .travel-screen{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column;
    border:3px double var(--amber);border-radius:8px;background:var(--bg);}
  .travel-head{flex:0 0 16%;min-height:88px;max-height:118px;display:flex;gap:10px;align-items:center;
    padding:4px 10px 4px 6px;border-bottom:1px solid var(--amber);background:var(--panel);}
  .travel-head img{flex:0 0 auto;height:100%;width:auto;max-width:44%;min-width:0;
    display:block;object-fit:contain;object-position:left center;
    image-rendering:pixelated;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;
    border:none;border-radius:0;background:transparent;}
  .travel-head-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px;}
  .travel-head-title{font-family:inherit;
    font-size:clamp(1.2rem, 6vw, 1.6rem);font-weight:700;color:var(--amber);letter-spacing:1.5px;
    line-height:1.05;text-transform:uppercase;width:100%;
    padding:0;border:none;border-radius:0;background:transparent;box-sizing:border-box;}
  .travel-head-sub{font-size:clamp(.6rem, 2.6vw, .72rem);color:var(--dim);line-height:1.3;padding:0 2px;}
  .travel-list{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;
    gap:0;padding:0;}
  .travel-row{flex:1 1 0;min-height:0;display:flex;align-items:stretch;gap:8px;
    padding:2px 8px 2px 3px;border:none;border-bottom:1px solid var(--btnborder);border-radius:0;
    background:var(--bg);color:var(--text);text-align:left;cursor:pointer;width:100%;
    font-family:inherit;}
  .travel-row:first-child{border-top:1px solid var(--btnborder);}
  .travel-row img{flex:0 0 auto;height:100%;width:auto;
    min-width:clamp(56px, 16vw, 88px);max-width:38%;aspect-ratio:1;
    display:block;object-fit:cover;object-position:center;border-radius:0;
    border:none;
    image-rendering:pixelated;image-rendering:crisp-edges;}
  .travel-row-body{flex:1 1 auto;min-width:0;overflow:hidden;padding-right:2px;
    display:flex;flex-direction:column;justify-content:center;}
  .travel-row-name{display:block;font-family:inherit;font-weight:700;color:var(--amber);letter-spacing:.4px;
    font-size:clamp(.74rem, 3.3vw, .86rem);
    text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .travel-row-desc{display:block;font-size:clamp(.56rem, 2.4vw, .66rem);color:var(--dim);line-height:1.28;
    margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .travel-row.here,.travel-row:disabled{opacity:.35;cursor:default;pointer-events:none;
    background:rgba(32,26,17,.5);}
  .travel-row.here img,.travel-row:disabled img{filter:brightness(1.1) grayscale(.7);}
  .travel-row.here .travel-row-name,.travel-row:disabled .travel-row-name{color:var(--dim);}
  .travel-row:active:not(.here):not(:disabled){background:rgba(231,200,121,.12);}
  .travel-foot{flex:0 0 auto;min-height:42px;max-height:52px;padding:5px 10px 6px;
    border-top:1px solid var(--amber);background:var(--panel);display:flex;align-items:stretch;}
  .travel-foot button{width:100%;letter-spacing:1px;font-size:clamp(.72rem, 3.2vw, .84rem);
    padding:clamp(6px, 2vw, 10px) 8px;border-color:var(--amber);}
  .loc{font-size:.78rem;color:var(--amber);letter-spacing:1px;
    padding:4px 10px 3px;display:flex;justify-content:space-between;align-items:baseline;
    border-left:1px solid var(--border);border-right:1px solid var(--border);}
  .loc small{color:var(--dim);font-size:.58rem;letter-spacing:0;white-space:nowrap;}
  table{width:100%;border-collapse:collapse;font-size:.84rem;}
  th,td{text-align:left;padding:4px 8px;border-bottom:1px solid var(--rowline);vertical-align:middle;}
  th{color:var(--dim);font-weight:normal;font-size:.65rem;letter-spacing:1px;background:var(--bg);position:sticky;top:0;z-index:1;}
  td.r,th.r{text-align:right;}
  tr.dead{opacity:.4;}
  .price{color:var(--amber);} .have{color:var(--green);} .na{color:var(--dim);}

  /* BOTTOM BAR — cash/debt/bank/guns + action buttons, always visible */
  .market-play .bot-bar{flex:0 0 21%;min-height:118px;max-height:168px;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:6px 10px 7px;display:flex;flex-direction:column;overflow:hidden;}
  .bot-bar{flex:0 0 auto;background:var(--panel);border:1px solid var(--border);
    border-radius:8px;padding:7px 10px 8px;}
  .bot-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px 10px;margin-bottom:4px;flex:1 1 auto;min-height:0;}
  .bot-stat{display:flex;flex-direction:column;justify-content:center;}
  .bot-stat.right{align-items:flex-end;text-align:right;}
  .bot-label{font-size:clamp(.54rem, 2.3vw, .62rem);color:var(--dim);letter-spacing:.3px;line-height:1.1;}
  .market-play .bot-val{font-size:clamp(.88rem, 4.2vw, 1.08rem);line-height:1.15;color:var(--amber);}
  .bot-val{font-size:1.08rem;line-height:1.2;color:var(--amber);}
  .bot-val.red{color:var(--red);}
  .debt-warn{flex:0 0 auto;margin:0 0 4px;padding:0 2px;font-size:clamp(.52rem, 2.2vw, .62rem);
    line-height:1.25;color:var(--amber);text-align:center;letter-spacing:.2px;}
  .market-play .bot-val.dim{font-size:clamp(.72rem, 3.2vw, .88rem);color:var(--text);}
  .bot-val.dim{font-size:.9rem;color:var(--text);}
  .bar{height:4px;background:var(--bartrack);border-radius:3px;margin:3px 0 6px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:var(--green);}
  .market-play .actions{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .market-play .actions button{padding:clamp(7px, 2.2vw, 10px) 6px;font-size:clamp(.68rem, 3vw, .78rem);letter-spacing:.5px;}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .actions button{padding:10px 8px;font-size:.8rem;letter-spacing:.5px;}

  /* other screens that still use .row / .hud */
  .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-end;}
  .hud{flex:0 0 auto;border:1px solid var(--border);border-radius:8px;padding:8px 10px;
    background:var(--panel);font-size:.82rem;line-height:1.4;}
  .hud b{color:var(--amber);} .hud .red{color:var(--red);}
  #crt.title-mode .masthead{display:none;}
  #crt.title-mode{background:#0a0a0a;padding:env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px) 0;}
  #crt.title-mode #app{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
  .title-play{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
  .title-screen{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;
    justify-content:center;overflow:hidden;background:#0a0a0a;container-type:size;}
  .title-art{position:relative;container-type:size;
    width:min(100cqw,calc(100cqh * 472 / 1024));
    height:min(100cqh,calc(100cqw * 1024 / 472));
    max-width:100cqw;max-height:100cqh;}
  .title-art img{position:absolute;inset:0;width:100%;height:100%;display:block;user-select:none;-webkit-user-drag:none;
    pointer-events:none;image-rendering:-webkit-optimize-contrast;}
  .title-hit{position:absolute;box-sizing:border-box;border:0;background:transparent;cursor:pointer;padding:0!important;margin:0;
    border-radius:0;min-height:0;min-width:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .title-hit:focus-visible{outline:2px solid var(--amber);outline-offset:-2px;}
  .title-hit:disabled{cursor:default;pointer-events:none;opacity:0;}
  /* GW Style title — hit rects on 472×1024 canvas (scripts/title-blueprint.json); cqw/cqh = title-art box */
  .title-hit-new{left:3.814cqw;top:79.688cqh;width:45.339cqw;height:8.301cqh;}
  .title-hit-cont{left:50.847cqw;top:79.688cqh;width:45.339cqw;height:8.301cqh;}
  .title-hit-ledger{left:3.814cqw;top:89.062cqh;width:42.797cqw;height:8.594cqh;}
  .title-hit-scores{left:51.271cqw;top:89.062cqh;width:44.703cqw;height:8.594cqh;}
  .title-hit-mute{left:88cqw;top:2.5cqh;width:9cqw;height:6cqh;}
  .audio-mute-btn{font-family:inherit;background:transparent;color:var(--amber);border:1px solid var(--amber);
    padding:2px 7px;font-size:clamp(.62rem,2.8vw,.72rem);letter-spacing:0;cursor:pointer;border-radius:4px;
    line-height:1.2;min-height:0;}
  .audio-mute-btn:active{background:var(--amber);color:#1a1206;}
  .audio-mute-btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  #crt.game-mode .masthead{position:relative;padding-right:36px;}
  #crt.game-mode .masthead .audio-mute-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);
    padding:1px 5px;font-size:.62rem;}
  .save-err{text-align:center;color:var(--red);font-size:.72rem;padding:1px 0;}

  /* CRIME LEDGER v63 — unified template
     Home: blueprint overlay on base PNG (unchanged).
     Categories: in-flow header image + HTML title/counter + 10-slot normal-flow rows.
     No container-type:size, no aspect-ratio frame, no cqh. iOS Safari safe. */

  /* ── shared chrome ─────────────────────────────────────────────────────── */
  #crt.ledger-mode{padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);background:#000;}
  #crt.ledger-mode .masthead{display:none;}
  #crt.ledger-mode #app{flex:1 1 auto;min-height:0;}
  .ledger-play{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
    overflow-y:auto;-webkit-overflow-scrolling:touch;background:#000;}

  /* ── HOME: blueprint overlay shell ─────────────────────────────────────── */
  .ledger-art-screen{flex:1 1 auto;min-height:0;width:100%;display:flex;
    align-items:flex-start;justify-content:center;background:#000;}
  .ledger-art-frame{position:relative;container-type:inline-size;margin:0 auto;background:#000;
    width:min(100%,calc(100dvh * 473 / 1024));}
  .ledger-art-frame img{display:block;width:100%;height:auto;z-index:0;
    user-select:none;-webkit-user-drag:none;pointer-events:none;}
  .ledger-overlay-layer{position:absolute;inset:0;z-index:1;pointer-events:none;}
  .ledger-header-overlay{position:absolute;inset:0;z-index:3;pointer-events:none;}
  .ledger-hit{position:absolute;border:0;background:transparent;cursor:pointer;padding:0;margin:0;
    border-radius:0;min-height:0;min-width:0;-webkit-tap-highlight-color:transparent;
    pointer-events:auto;z-index:4;}
  .ledger-hit:focus-visible{outline:2px solid var(--amber);outline-offset:-2px;}
  .ledger-counter{position:absolute;display:flex;align-items:center;justify-content:center;
    pointer-events:none;background:transparent;color:#c9a85a;letter-spacing:.14em;white-space:nowrap;
    font-size:clamp(8px,3.0cqw,14px);}
  .ledger-counter.total{color:#9a8860;font-size:clamp(8px,2.9cqw,13px);}
  .ledger-row-label{position:absolute;display:flex;align-items:center;justify-content:flex-start;
    pointer-events:none;white-space:nowrap;color:#9a8860;letter-spacing:.08em;
    font-size:clamp(8px,2.9cqw,13px);}

  /* ── CATEGORY TEMPLATE: header + scrollable list + pinned back ─────────── */
  .ledger-play.ledger-template-page{overflow:hidden;}
  .ledger-template-page{display:flex;flex-direction:column;align-items:center;
    flex:1 1 auto;min-height:0;width:100%;background:#0d0b07;}
  .ledger-tpl-inner{display:flex;flex-direction:column;width:100%;
    max-width:calc(100dvh * 473 / 1024);flex:1 1 auto;min-height:0;background:#0d0b07;
    container-type:inline-size;}
  .ledger-tpl-img{display:block;width:100%;height:auto;flex-shrink:0;}
  .ledger-tpl-header{text-align:center;padding:1.8cqw 0 0;flex-shrink:0;}

  .ach-card-reveal{position:fixed;inset:0;z-index:150;background:#000;display:flex;flex-direction:column;

    animation:achCardFade .45s ease;}
  .ach-card-reveal.golden img{max-width:min(94vw,440px);max-height:min(72dvh,580px);}

  .ach-card-next{margin-top:16px;border:1px solid var(--amber);color:var(--amber);background:transparent;

  .ach-found-popup{text-align:center;padding:4px 2px;}

  .ach-found-title{font-size:clamp(.84rem,3.8vw,.96rem);color:var(--amber);letter-spacing:2px;margin:8px 0 6px;}

  button{font-family:inherit;background:var(--btnbg);color:var(--text);border:1px solid var(--btnborder);

  button:active{background:var(--green);color:#1a1206;}

  .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;margin-bottom:10px;}

  .big{font-size:1.8rem;color:var(--amber);text-shadow:var(--glow);margin:.2rem 0;}
  .err{color:var(--red);min-height:1em;font-size:.78rem;margin:.2rem 0;text-align:center;}
  .scr{font-size:.82rem;}
  .ticker{font-size:.72rem;color:var(--dim);letter-spacing:.5px;margin-top:8px;}
  .flavor{font-size:.74rem;color:var(--dim);margin:4px 0 1px;line-height:1.45;overflow:visible;}
  .profit{font-size:.78rem;}
  .profit.up{color:var(--green);}
  .profit.down{color:var(--red);}
  .tutorial{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;
    padding:calc(env(safe-area-inset-top, 0px) + 16px) 16px calc(env(safe-area-inset-bottom, 0px) + 16px) 16px;}
  .scores-play{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;gap:8px;}
  .scores-head{flex:0 0 auto;text-align:center;font-size:clamp(.76rem, 3.4vw, .88rem);color:var(--amber);
    letter-spacing:2px;padding:6px 0;border-bottom:1px solid var(--border);}
  .scores-list{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start;gap:1px;
    border:1px solid var(--border);border-radius:8px;padding:6px 8px;background:var(--panel);}
  .scores-empty{flex:1 1 auto;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:.82rem;text-align:center;padding:16px;}
  .scores-foot{flex:0 0 auto;}
  .tutorial .card{border-color:var(--green);max-width:420px;width:100%;}
  .tutorial .card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
  .save-err{text-align:center;color:var(--red);font-size:.72rem;padding:2px 0;}

  /* === END-OF-GAME — All Time Rankings + player banner + rank artwork === */
  .eos{flex:1 1 auto;display:flex;flex-direction:column;gap:0;min-height:0;overflow:hidden;}
  .eos-rankings{flex:0 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
  .eos-rankings-head{flex:0 0 auto;display:flex;align-items:center;gap:clamp(4px,2vw,10px);padding:0 0 5px;}
  .eos-rankings-head h2{flex:0 0 auto;margin:0;font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.56rem,2.5vw,.7rem);font-weight:700;color:var(--amber);letter-spacing:clamp(2px,.8vw,3px);
    white-space:nowrap;text-transform:uppercase;}
  .eos-orn-line{flex:1 1 auto;height:1px;background:linear-gradient(to var(--tdir,right),transparent,var(--amber));}
  .eos-orn-line.r{background:linear-gradient(to left,transparent,var(--amber));}
  .eos-lb-wrap{flex:1 1 auto;min-height:0;overflow:hidden;border:1px solid var(--amber);}
  .eos-lb{width:100%;border-collapse:collapse;table-layout:fixed;}
  .eos-lb th,.eos-lb td{padding:clamp(1px,.6vw,3px) clamp(4px,1.8vw,8px);
    border-bottom:1px solid rgba(231,200,121,.28);vertical-align:middle;}
  .eos-lb th{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.46rem,2vw,.56rem);font-weight:700;color:var(--amber);letter-spacing:1.5px;
    background:transparent;position:static;text-transform:uppercase;}
  .eos-lb tr:last-child td,.eos-lb tr:last-child th{border-bottom:none;}
  .eos-lb tbody tr.you td{background:rgba(231,200,121,.08);}
  .eos-lb .pos{width:14%;text-align:center;color:var(--text);font-size:clamp(.5rem,2.2vw,.62rem);}
  .eos-lb .rank-col{width:46%;}
  .eos-lb .rank-inner{display:flex;align-items:center;gap:clamp(3px,1.2vw,6px);min-width:0;}
  .eos-lb .rank-icon{flex:0 0 clamp(11px,3.2vw,15px);width:clamp(11px,3.2vw,15px);height:clamp(11px,3.2vw,15px);
    color:var(--amber);display:block;}
  .eos-lb .rank-name{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.48rem,2.15vw,.6rem);color:var(--amber);letter-spacing:.3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;}
  .eos-lb .score{width:40%;text-align:right;color:var(--text);font-size:clamp(.5rem,2.2vw,.62rem);white-space:nowrap;}
  .eos-divider{flex:0 0 auto;display:flex;align-items:center;gap:clamp(4px,2vw,10px);padding:clamp(3px,1.2vw,6px) 0;}
  .eos-divider::before,.eos-divider::after{content:'';flex:1 1 auto;height:1px;background:var(--amber);}
  .eos-divider-star{flex:0 0 auto;color:var(--amber);font-size:clamp(.42rem,1.8vw,.52rem);line-height:1;}
  .eos-banner{flex:0 0 auto;text-align:center;padding:0 2px clamp(4px,1.5vw,8px);
    font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.78rem,3.8vw,1.12rem);font-weight:700;color:var(--amber);letter-spacing:clamp(.5px,.3vw,1px);
    line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;}
  .eos-art{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;}
  .eos-art img{width:100%;max-height:100%;height:auto;object-fit:contain;object-position:bottom center;display:block;
    filter:brightness(1.1);}
  .eos-btns{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:clamp(4px,1.5vw,8px);}
  .eos-btns button{font-size:clamp(.66rem,2.8vw,.74rem);padding:9px 4px;letter-spacing:.5px;}

  /* === EVENT POPUP — locked standard: full-bleed left art (see docs/ui-standards/popup.png) === */
  .modal .ev-popup{width:100%;}
  .ev-popup{display:grid;grid-template-columns:1fr 1fr;align-items:stretch;width:100%;
    max-width:min(520px, 100%);max-height:88dvh;
    border:1px solid var(--amber);border-radius:12px;overflow:hidden;
    background:var(--bg);box-shadow:0 12px 46px var(--shadow);}
  .ev-left{grid-column:1;align-self:stretch;min-height:0;min-width:0;overflow:hidden;padding:0;margin:0;
    box-sizing:border-box;background-color:#000;background-size:cover;background-position:center center;
    background-repeat:no-repeat;filter:brightness(1.1);}
  .ev-right{grid-column:2;display:flex;flex-direction:column;padding:14px 13px 12px;
    border-left:1px solid var(--amber);min-height:0;min-width:0;}
  .ev-body{flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    font-size:.88rem;line-height:1.6;color:var(--text);text-align:center;overflow-y:auto;}
  .ev-body b{color:var(--amber);}
  .ev-acts{flex:0 0 auto;display:flex;flex-direction:column;gap:7px;margin-top:12px;}
  .ev-acts button{font-size:.8rem;padding:10px 8px;letter-spacing:.5px;}
  .ev-status{font-size:.8rem;color:var(--dim);text-align:center;margin-bottom:4px;}
  .ev-warn{font-size:.72rem;color:var(--dim);text-align:center;margin-top:4px;}

  /* === PORTRAIT ONLY — portrait layout fixed; rotate viewport on touch landscape === */
  #portrait-root{width:100%;height:100%;min-height:0;}
  @media (orientation:landscape) and (pointer:coarse){
    html,body{overflow:hidden;}
    #portrait-root{position:fixed;top:0;left:0;width:100vh;height:100vw;
      transform:rotate(-90deg) translateX(-100%);transform-origin:top left;}
  }
</style>
</head>
<body>
<div id="portrait-root">
<div id="crt">
  <div class="masthead">
    <button type="button" class="audio-mute-btn" id="audio-mute" data-audio-mute aria-label="Toggle sound">&#128266;</button>
    <h1 class="serif">GANG WARS</h1>
  </div>
  <div id="app"></div>
</div>
</div>

<script src="engine.js"></script>
<script src="ledger.js"></script>
<script src="ledger-blueprint.js"></script>
<script src="ledger-ui.js"></script>
<script src="audio.js"></script>
<script>
if (typeof document !== "undefined") {
(function lockPortrait(){
  const tryLock = () => {
    const o = screen.orientation;
    if (!o || typeof o.lock !== "function") return;
    o.lock("portrait").catch(() => {});
  };
  tryLock();
  window.addEventListener("orientationchange", tryLock);
  document.addEventListener("click", tryLock, { once: true, passive: true });
})();
(function(){
  const app = document.getElementById("app");
  const SAVE_KEY = "gw:save", HS_KEY = "gw:highscores", LEDGER_KEY = "gw:ledger";
  const A = () => window.GangWarsAudio;
  function audioUnlock(){ if (A()) A().unlock(); }
  function audioPlay(id, opts){ if (A()) A().play(id, opts); }
  function syncSceneAudio(scene){
    if (A()) A().onScene(scene);
    updateMuteButtons();
  }
  function updateMuteButtons(){
    const enabled = A() && A().isEnabled();
    document.querySelectorAll("[data-audio-mute]").forEach(btn => {
      btn.hidden = !enabled;
      if (!enabled) return;
      const muted = A().isMuted();
      const label = muted ? "Unmute sound" : "Mute sound";
      const icon = muted ? "\u{1F507}" : "\u{1F50A}";
      btn.textContent = icon;
      btn.setAttribute("aria-label", label);
    });
  }
  function bindMuteButton(el){
    if (!el) return;
    el.dataset.audioMute = "1";
    el.onclick = (e) => {
      e.stopPropagation();
      if (!A() || !A().isEnabled()) return;
      audioUnlock();
      A().setMuted(!A().isMuted());
      updateMuteButtons();
    };
    updateMuteButtons();
  }
  document.addEventListener("click", () => audioUnlock(), { once: true, passive: true });
  app.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn || btn.disabled || btn.dataset.audioMute) return;
    if (!A() || !A().isEnabled()) return;
    audioUnlock();
    audioPlay("sfx.ui.buttonTap");
  }, true);
  if (A()) A().init();
  bindMuteButton(document.getElementById("audio-mute"));
  let S = null, modal = null;
  let ledgerView = null, ledgerViewCat = null, ledgerFocusId = null, ledgerReturn = null;
  let pendingUnlockQueue = [], pendingCompleteQueue = [];
  let ledger = migrateLedger((() => { try { return JSON.parse(localStorage.getItem(LEDGER_KEY)); } catch(e) { return null; } })());
  const money = n => "$"+Math.round(n).toLocaleString("en-US");
  const TITLE_SCREEN = "title-screen.png";
  function openLedgerCategory(catId){
    if (!LEDGER_CATEGORIES.find(c => c.id === catId)) return;
    ledgerView = "category";
    ledgerViewCat = catId;
    ledgerFocusId = null;
    render();
  }
  function ledgerUiCtx(){
    return {
      view: ledgerView,
      catId: ledgerViewCat,
      focusId: ledgerFocusId,
      ledger,
      onOpenCategory: openLedgerCategory,
      onBackHome: exitLedgerHome,
      onBackCategory: exitLedgerCategory,
      onRevealComplete: ()=>{ saveLedger(); render(); },
    };
  }
  function ledgerProgressText(){
    return `${countDiscovered(ledger)} / ${LEDGER_TOTAL} DISCOVERED`;
  }
  function openLedgerFromTitle(){
    ledgerReturn = { type: "title", savedModal: null, savedModalEscape: null };
    ledgerView = "home";
    ledgerViewCat = null;
    ledgerFocusId = null;
    render();
  }
  function openLedgerReveal(achievementId){
    ledgerView = "category";
    ledgerViewCat = getCategoryForAchievement(achievementId);
    ledgerFocusId = achievementId;
    render();
  }
  function exitLedgerCategory(){
    if (ledgerFocusId && isUnlocked(ledger, ledgerFocusId)) {
      pendingUnlockQueue = pendingUnlockQueue.filter(id => id !== ledgerFocusId);
      saveLedger();
    }
    ledgerView = "home";
    ledgerViewCat = null;
    ledgerFocusId = null;
    render();
  }
  function exitLedgerHome(){
    if (ledgerReturn) { restoreLedgerReturn(); return; }
    ledgerView = null;
    render();
  }
  function captureLedgerReturn(){
    ledgerReturn = {
      type: S ? "game" : "title",
      savedModal: modal && modal._achFlow ? null : modal,
      savedModalEscape: modal && modal._achFlow ? null : modalEscape,
    };
  }
  function restoreLedgerReturn(){
    const ret = ledgerReturn;
    ledgerView = null;
    ledgerViewCat = null;
    ledgerFocusId = null;
    ledgerReturn = null;
    if (!ret) { render(); return; }
    modal = ret.savedModal || null;
    modalEscape = ret.savedModalEscape || null;
    render();
  }
  function renderLedgerRoute(){
    const crt = document.getElementById("crt");
    crt.classList.remove("title-mode", "game-mode");
    crt.classList.add("ledger-mode");
    app.dataset.ledgerView = ledgerView || "";
    app.dataset.ledgerCategory = ledgerViewCat || "";
    app.dataset.ledgerFocus = ledgerFocusId || "";
    LedgerUI.render(app, ledgerUiCtx());
  }
  function getAchievementCardImage(id){
    const cat = getCategoryForAchievement(id);
    if (cat === "rare") return `events/rare_${id}.png`;
    if (cat === "superRare") return `events/super_${id}.png`;
    if (cat === "godlike") return `events/godlike_${id}.png`;
    if (cat === "goldenGodlike") return "events/godlike_golden.png";
    return null;
  }
  /** Achievement unlock presentation (Achievement Found → reveal / card → ledger list). */
  function tryShowAchievementFlow(){
    if (modal && modal._achFlow) return true;
    if (pendingUnlockQueue.length) { showAchievementFoundPopup(); return true; }
    if (pendingCompleteQueue.length) { showLedgerCompletionPopup(pendingCompleteQueue[0]); return true; }
    return false;
  }
  function showAchievementFoundPopup(){
    audioPlay("sfx.achievement.found");
    modal = function(){
      modal._achFlow = true;
      app.innerHTML = `<div class="modal"><div class="card ach-found-card" role="dialog" aria-modal="true">
        <div class="ach-found-popup">
          <div class="ach-found-rule">════════════════════</div>
          <div class="ach-found-title">ACHIEVEMENT FOUND</div>
          <div class="ach-found-body">A NEW ENTRY HAS BEEN<br>ADDED TO YOUR LEDGER</div>
          <button type="button" class="full amber" id="achView">OK</button>
          <div class="ach-found-rule">════════════════════</div>
        </div>
      </div></div>`;
      document.getElementById("achView").onclick = ()=>{
        const id = pendingUnlockQueue[0];
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        if (!id) { render(); return; }
        captureLedgerReturn();
        const catId = getCategoryForAchievement(id);
        if (catId === "general") openLedgerReveal(id);
        else showAchievementCardReveal(id);
      };
      modalEscape = ()=>{
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        render();
      };
    };
    render();
  }
  function showLedgerCompletionPopup(kind){
    const isMaster = kind === "master";

  function pushScore(score, worth){
    const hs = highscores();
    const entry = {score, worth, date:new Date().toISOString().slice(0,10)};
    hs.push(entry);
    const sorted = sortHighscores(hs);
    const placement = sorted.findIndex(e => e === entry) + 1;
    localStorage.setItem(HS_KEY, JSON.stringify(sorted.map(({score:s, worth:w, date:d}) => ({score:s, worth:w, date:d}))));
    return { placement, entry };

  function queueUnlocks(ids){
    if (!ids || !ids.length) return;
    let eventUnlocked = false;
    ids.forEach(id => {
      if (!pendingUnlockQueue.includes(id)) pendingUnlockQueue.push(id);
      if (isEventAchievementId(id)) eventUnlocked = true;
    });
    if (eventUnlocked) resetEventPity(ledger);
    saveLedger();
    refreshCategoryCompletions();
    if (checkMasterComplete(ledger) && !ledger.masterComplete) {
      ledger.masterComplete = true;
      saveLedger();
      if (!ledger.masterCompleteShown) pendingCompleteQueue.push("master");
    }
  }
  function refreshCategoryCompletions(){
    LEDGER_CATEGORIES.forEach(cat => {
      if (isCategoryComplete(ledger, cat.id) && !wasCategoryCompleteShown(ledger, cat.id)) {
        if (!pendingCompleteQueue.includes(cat.id)) pendingCompleteQueue.push(cat.id);
      }
    });
  }
  function checkRunAchievements(){
    if (!S || S.over) return;

  function checkEndAchievements(){

  function openTrade(id, mode){
    const d = GOOD[id]; const price = S.prices[id];
    const maxFor = ()=> mode==="buy"
      ? Math.min(Math.floor(S.cash/price), spaceLeft(S))
      : (S.inventory[id]||0);
    let qty = maxFor();
    modal = function(){
      const max = maxFor(); if(qty>max) qty=max;

  function travelTo(dest){
    audioPlay("sfx.travel.engineStart");
    audioPlay("sfx.travel.dayTick");
    modal=null; S.location=dest; S.day+=1;
    audioPlay("sfx.travel.arrival");
    audioPlay("sfx.travel.screech");
    const eventsBefore = countEventAchievementsUnlocked(ledger);
    recordDistrictVisit(S, dest);
    recordSpaceChange(S);
    const capMsg = applyDailyInterest(S);
    if (capMsg){ endGame(capMsg); return; }
    if (S.day > CONFIG.days){ endGame(); return; }
    const { prices, anomaly, sr, gk, golden, re } = resolveTravelMarket(S, dest);
    S.prices = prices;
    if (LOCATION_FLAVOR[dest]) logMsg(`Arrived in ${dest}. ${LOCATION_FLAVOR[dest]}`);

    let marketEvent=null;
    if(golden && S.day===golden.day){
      unlockFromEvent('golden');
      const goldenImg=golden.img||'bigdaddy';
      marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'golden' }); showEvent(goldenImg, `<b>${golden.lines[0]}</b><br><br>${golden.lines[1]} Every price in the city is climbing.`, 'GOLDEN', next); };
    } else if(gk && S.day===gk.day){
      unlockFromEvent(gk.id);
      const gkImg=gk.img||'bigdaddy';
      if(dest===gk.district){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'godlike' }); showEvent(gkImg, `<b>${gk.lines[0]}</b><br><br>${gk.lines[1]}`, 'BIG DADDY J', next); };
      } else {
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'godlike' }); showEvent(gkImg, `<b>BIG DADDY J IS ACROSS TOWN</b><br><br>He's making moves in ${gk.district}. Every price there is climbing.`, 'NOTED', next); };
      }
    } else if(sr && S.day===sr.day){
      unlockFromEvent(sr.id);
      const srImg=sr.img||'celeb';
      if(dest===sr.district){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'superRare' }); showEvent(srImg, `<b>${sr.lines[0]}</b><br><br>${sr.lines[1]} Every price in the district is climbing.`, "LET'S GO", next); };
      } else {
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'superRare' }); showEvent(srImg, `<b>${sr.lines[0]}</b><br><br>${sr.lines[1]} Head to ${sr.district} for the action.`, 'NOTED', next); };
      }
    } else if(re && S.day===re.day){
      unlockFromEvent(re.id);
      const spikeGood=GOOD[re.commodity];
      const reImg=re.img||'intel';
      if(dest===re.district){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'rare' }); showEvent(reImg, `<b>${re.lines[0]}</b><br><br>${re.lines[1]}`, 'INTERESTING', next); };
      } else if(spikeGood){
        marketEvent=(next)=>{ if(A()) A().eventStinger({ tier: 'rare' }); showEvent(reImg, `<b>${re.lines[0]}</b><br><br>${re.lines[1]} ${spikeGood.name} prices are surging in ${re.district}.`, 'NOTED', next); };
      }
    } else if(anomaly){
      const anomalyImg={spike:'shortage',surge:'frenzy',flood:'flood'};
      const body=pick(ANOMALY_BODIES[anomaly.type]).replace(/{ITEM}/g, anomaly.itemName);
      marketEvent=(next)=>{ if(A()) A().eventStinger({ anomalyType: anomaly.type }); showEvent(anomalyImg[anomaly.type], body, 'NOTED', next); };
    }

    runTravelEvents(()=>{
      if (isEventLedgerSlow(ledger) && countEventAchievementsUnlocked(ledger) === eventsBefore) {
        recordEventPityTravel(ledger);
        saveLedger();
      }
      checkRunAchievements();
      save();
      if (tryShowAchievementFlow()) return;
      render();
    }, marketEvent);
  }
  function runTravelEvents(done, firstEvent){
    const queue=[];
    if(firstEvent) queue.push(firstEvent);
    const candidates=[];
    if (chance(1/12)) candidates.push(eventMugging);
    if (chance(1/12)) candidates.push(eventFind);
    if (chance(1/7))  candidates.push(eventStash);
    if (chance(1/7))  candidates.push(eventGun);
    if (chance(1/7))  candidates.push(eventFeds);
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    queue.push(...candidates.slice(0, CONFIG.maxTravelEvents));
    let i=0; const next=()=>{ if(S.over)return; if(i>=queue.length){ save(); done(); return; } queue[i++](next); };
    next();
  }

        document.getElementById("bribe").onclick=doBribe;
        const f=document.getElementById("fight");
        f.onclick=()=>{ if (canFight) doFight(); else audioPlay("sfx.combat.emptyClick"); };
        modalEscape = null;
      };
      render();
    };
    const hit=()=>{ audioPlay("sfx.combat.punchOof", { variant: "random" }); S.health-=1; if(S.health<=0){ audioPlay("sfx.combat.deathSting"); endGame("The city has a short memory. By morning nobody will remember your name."); return true; } return false; };
    const doFight=()=>{
      fightRound++;
      const copsBefore = cops;
      cops = fedsApplyFightKill(S, cops, fightRound);
      if (cops<=0){ const reward=randInt(3750,10000); S.cash+=reward;
        grantDebtInterestFreeze(S, 1);
        logMsg(`Beat the Feds, grabbed ${money(reward)}.`); modal=null;
        audioPlay("sfx.combat.tommyBurst");
        fedsResolved();
        const winV=pick([
          ["LAST MAN STANDING", `The smoke clears. The Feds don't get up. You do. The city has a long memory for days like this.`],
          ["ONE FOR THE PAPERS", `By evening the headlines had improved your reputation and damaged the truth. You can live with both.`],
          ["THE HOUSE WINS", `Another raid fails. Another detective writes a longer report. Business resumes before the ink is dry.`],
          ["WRONG TARGET", `They expected an easy arrest. They found you instead. Someone back at headquarters has difficult paperwork ahead.`],
          ["NOTHING TO REPORT", `Witnesses suddenly remembered urgent appointments. The official report will be remarkably uncomplicated.`],
          ["NOTED", `A boy in a pressed suit tips his hat. "Big Daddy heard." He says nothing else. He doesn't need to.`],
          ["WITNESSES FORGET", `Nobody saw enough to testify. Those who did suddenly remembered other appointments.`],
          ["BETTER LUCK TOMORROW", `Agent Hayes tips his hat before limping off. Even he knows when today's argument is over.`],
          ["EXPENSIVE LESSON", `Somebody underestimated you. The city won't make that mistake twice.`],
          ["CITY BUSINESS", `The street empties, the smoke settles, and Manhattan carries on as though nothing happened.`],
        ]);
        showEvent('feds', winV[1], "GO", next); return; }
      if (cops < copsBefore) audioPlay("sfx.combat.gunshot");
      if (chance(fedsCounterHitChance(S.guns, fightRound, S.day))){ if(hit())return; draw("You took a hit!"); }
      else { audioPlay("sfx.combat.emptyClick"); draw("You missed — they're still on you."); }
    };
    const doRun=()=>{
      if (chance(0.62)){ logMsg("Vanished into the streets."); modal=null;
        audioPlay("sfx.travel.screech");
        fedsResolved();
        const runV=pick([
          ["GONE", `You turn one corner, then another. By the time the whistles catch up, you're already somebody else's problem.`],
          ["INTO THE CROWD", `Lunch hour arrives at exactly the right moment. A hundred hats later, even you couldn't pick yourself out.`],
          ["THE BACK WAY", `The city keeps secrets. Today one of them kept you.`],
          ["LOST IN THE PARADE", `A brass band rounds the corner. By the final chorus you're applauding with everyone else.`],
          ["THE FUNERAL", `You borrow a solemn face and join the mourners. Nobody questions grief.`],
          ["THE LEFT TURN", `They chase the obvious route. You stopped being obvious years ago.`],
          ["WRONG PLATFORM", `You step onto a train just as the doors close. The Feds arrive in time to watch it leave.`],
          ["BORROWED HAT", `You swap hats with a stranger. Five seconds later the Feds arrest a very confused insurance salesman.`],
          ["ANOTHER FACE", `You straighten your tie, slow your pace, and become just another citizen with somewhere to be.`],
          ["THE NEWS CYCLE", `Tomorrow's paper will report a dramatic pursuit. It won't mention where you stopped for lunch.`],
        ]);
        showEvent('feds', runV[1], "PHEW", next); return; }
      if (hit()) return;
      const owned=Object.keys(S.inventory);
      if (owned.length){ const id=pick(owned); const lost=Math.min(S.inventory[id],randInt(1,5));
        S.inventory[id]-=lost; if(S.inventory[id]<=0) delete S.inventory[id];
        logMsg(`Fled but dropped ${lost} ${GOOD[id].name} and took a hit.`); }
      draw("Couldn't shake them — took a hit and dropped some goods.");
    };
    const doBribe=()=>{
      const cost=Math.min(S.cash, Math.round(randInt(2000,8000)*cops*bribeScale));
      if (cost<=0||cost>S.cash){ draw("Nothing to pay them with."); return; }
      S.cash-=cost; logMsg(`Counted out ${money(cost)} into an open palm.`); modal=null;
      audioPlay("sfx.events.bribePaid");
      fedsResolved();
      const brV=pick([
        ["NOBODY SAW ANYTHING", `The money changes hands. Memories become remarkably unreliable. The street returns to normal.`],
        ["CITY RATES", `The officer counts the cash twice, thanks you for your cooperation, and wishes you a pleasant afternoon.`],
        ["CIVIC DONATION", `Your contribution to public safety has been gratefully acknowledged.`],
        ["ABOVE BOARD", `Several receipts change hands. None explain what actually happened.`],
        ["ALREADY HANDLED", `Before you reach for your wallet the officer nods. "Big Daddy already handled it."`],
        ["ADMINISTRATIVE ERROR", `Your name disappears from the paperwork before the ink has time to dry.`],
        ["EXPEDITED PROCESSING", `The paperwork moves with astonishing efficiency once accompanied by folding money.`],
        ["THE USUAL ARRANGEMENT", `Neither of you mentions the money. That's how you know you're both professionals.`],
        ["THE RECEIPT", `"Would you like a receipt?" he asks. You both enjoy the joke more than expected.`],
        ["INTERNAL AFFAIRS", `"Best not mention this to Internal Affairs," he says. "They're happiest when they're surprised."`],
      ]);
      showEvent('feds', brV[1], "OK", next);
    };
    draw(null);
  }

  /* ---------- game over ---------- */
  function endGame(reason){
    if (A()) { A().stopMusic(); A().duckMusic(false); }
    audioPlay("sfx.end.rankReveal");
    S.over=true; S.overReason=reason||`Your month is over. Whatever you made, it's going to have to be enough.`;
    const result = pushScore(classicScore(S), netWorth(S));
    S.placement = result.placement;
    S.scoreEntry = result.entry;
    checkEndAchievements();
    save();
    saveLedger();
    if (tryShowAchievementFlow()) { render(); return; }
    render();
  }
  function renderGameOver(){
    const worth = netWorth(S), rank = getRank(worth);
    let placement = S.placement;
    if (!placement && S.scoreEntry) {
      placement = sortHighscores(highscores()).findIndex(e => scoreEntryMatch(e, S.scoreEntry)) + 1;
    }
    if (!placement) placement = 1;
    const top11 = buildTop11Leaderboard(highscores());
    const rows = top11.map((row, i) => {
      const isYou = !row.isDefault && scoreEntryMatch(row.entry, S.scoreEntry);
      return mkEosLbRow(row, i + 1, isYou);
    }).join("");

    app.innerHTML = `<div class="eos">
      <div class="eos-rankings">
        <div class="eos-rankings-head">
          <span class="eos-orn-line"></span>
          <h2>All Time Rankings</h2>
          <span class="eos-orn-line r"></span>
        </div>
        <div class="eos-lb-wrap">
          <table class="eos-lb">
            <thead><tr>
              <th class="pos">Pos</th>
              <th class="rank-col">Rank</th>
              <th class="score">Score</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div class="eos-divider"><span class="eos-divider-star" aria-hidden="true">✦</span></div>
      <div class="eos-banner">(${placement}) ${rank} ${money(worth)}</div>
      <div class="eos-art">
        <img src="cards/${rankCard(rank)}.png" alt="${rank}">
      </div>
      <div class="eos-btns">
        <button class="amber" id="again">PLAY AGAIN</button>
        <button id="menu">MAIN MENU</button>
      </div>
    </div>`;
    document.getElementById("again").onclick = ()=>{ localStorage.removeItem(SAVE_KEY); startNewGame(); render(); };
    document.getElementById("menu").onclick = ()=>{ S=null; render(); };
  }


  window.GangWarsLedger = {
    getLedger: () => ledger,
    getViewState: () => ({ view: ledgerView, categoryId: ledgerViewCat, focusId: ledgerFocusId }),
    getPendingUnlocks: () => pendingUnlockQueue.slice(),
    getPendingCompletions: () => pendingCompleteQueue.slice(),
    ledgerUiCtx,
    ledgerProgressText,
    getAchievementCardImage,
    openLedgerFromTitle,
    openLedgerCategory,
    openLedgerReveal,
    exitLedgerCategory,
    exitLedgerHome,
    saveLedger,
  };

  render();
})();
}
</script>
<script>
  if ('serviceWorker' in navigator && !/^127\.0\.0\.1$|^localhost$/i.test(location.hostname)) {
    navigator.serviceWorker.register('./sw.js?v=65').then(reg => {
      reg.update();
      reg.addEventListener('updatefound', () => {
        const worker = reg.installing;
        if (!worker) return;
        worker.addEventListener('statechange', () => {
          if (worker.state === 'installed' && navigator.serviceWorker.controller) {
            worker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    });
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  }
</script>
</body>
