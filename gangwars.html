<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#15110b" />
<link rel="manifest" href="manifest.json?v=3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gang Wars" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3" />
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png?v=3" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=3" />
<link rel="preload" as="image" href="title-screen.png?v=12" fetchpriority="high" />
<title>GANG WARS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" />
<link rel="stylesheet" href="gangwars.css?v=35">

</head>
<body>
<div id="portrait-root">
<div id="crt">
  <div class="masthead">
<h1 class="serif" aria-label="Gang Wars"><img src="./banner.png" alt="Gang Wars" class="masthead-banner"></h1>
  </div>
  <div id="app"></div>
  <div id="game-live" role="status" aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;padding:0;margin:0;"></div>
</div>
</div>

<script src="engine.js"></script>
<script src="ledger.js"></script>
<script src="tips.js"></script>
<script src="ledger-ui.js"></script>
<script src="scores-ui.js"></script>
<script src="event-ui.js"></script>
<script src="travel-ui.js"></script>
<script src="market-ui.js"></script>
<script src="bank-ui.js"></script>
<script src="standard-events.js"></script>
<script src="feds-event.js"></script>
<script src="audio.js"></script>
<script>
if (typeof document !== "undefined") {
(function lockPortrait(){
  const tryLock = () => {
    const o = screen.orientation;
    if (!o || typeof o.lock !== "function") return;
    o.lock("portrait").catch(() => {});
  };
  tryLock();
  window.addEventListener("orientationchange", tryLock);
  document.addEventListener("click", tryLock, { once: true, passive: true });
})();
(function(){
  const app = document.getElementById("app");
  const SAVE_KEY = "gw:save", HS_KEY = "gw:highscores", LEDGER_KEY = "gw:ledger";
  const A = () => window.GangWarsAudio;
  function audioUnlock(){ if (A()) A().unlock(); }
  function audioPlay(id, opts){ if (A()) A().play(id, opts); }
  function syncSceneAudio(scene){
    if (A()) A().onScene(scene);
    updateMuteButtons();
  }
  function updateMuteButtons(){
    const enabled = A() && A().isEnabled();
    document.querySelectorAll("[data-audio-mute]").forEach(btn => {
      btn.hidden = !enabled;
      if (!enabled) return;
      const muted = A().isMuted();
      const label = muted ? "Unmute sound" : "Mute sound";
      const icon = muted ? "\u{1F507}" : "\u{1F50A}";
      btn.textContent = icon;
      btn.setAttribute("aria-label", label);
    });
  }
  function bindMuteButton(el){
    if (!el) return;
    el.dataset.audioMute = "1";
    el.onclick = (e) => {
      e.stopPropagation();
      if (!A() || !A().isEnabled()) return;
      audioUnlock();
      A().setMuted(!A().isMuted());
      updateMuteButtons();
    };
    updateMuteButtons();
  }
  document.addEventListener("click", () => audioUnlock(), { once: true, passive: true });
  app.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn || btn.disabled || btn.dataset.audioMute) return;
    if (!A() || !A().isEnabled()) return;
    audioUnlock();
    audioPlay("sfx.ui.buttonTap");
  }, true);
  if (A()) A().init();
  bindMuteButton(document.getElementById("audio-mute"));
  let saveCorrupted = false;
  function announce(msg){ const el = document.getElementById("game-live"); if(el) el.textContent = msg; }
  let S = null, modal = null;
  let achModalFocusTrap = null, achModalPrevFocus = null;
  let ledgerView = null, ledgerViewCat = null, ledgerFocusId = null, ledgerReturn = null;
  let pendingUnlockQueue = [], pendingCompleteQueue = [], pendingTipQueue = [];
  const pendingEventCards = {};
  let ledger = migrateLedger((() => { try { return JSON.parse(localStorage.getItem(LEDGER_KEY)); } catch(e) { return null; } })());
  let tipsState = loadTips();
  const money = n => "$"+Math.round(n).toLocaleString("en-US");
  const ScoresUI = window.GangWarsScoresUI;
  const TITLE_SCREEN = "title-screen.png?v=12";
  const TITLE_CANVAS = { w: 853, h: 1844 };
  function layoutTitleScreen(){
    const cover = document.querySelector(".title-cover");
    if (!cover) return;
    const { w: W, h: H } = TITLE_CANVAS;
    const vv = window.visualViewport;
    const vw = vv ? vv.width : window.innerWidth;
    const vh = vv ? vv.height : window.innerHeight;
    if (!vw || !vh) return;
    const scale = Math.max(vw / W, vh / H);
    const sw = W * scale, sh = H * scale;
    cover.style.width = sw + "px";
    cover.style.height = sh + "px";
    cover.style.left = ((vw - sw) / 2 + (vv?.offsetLeft || 0)) + "px";
    cover.style.top = Math.max(0, (vh - sh) / 2 + (vv?.offsetTop || 0)) - 5 + "px";
  }
  function openLedgerCategory(catId){
    if (!LEDGER_CATEGORIES.find(c => c.id === catId)) return;
    ledgerView = "category";
    ledgerViewCat = catId;
    ledgerFocusId = null;
    render();
  }
  function ledgerUiCtx(){
    return {
      view: ledgerView,
      catId: ledgerViewCat,
      focusId: ledgerFocusId,
      ledger,
      onOpenCategory: openLedgerCategory,
      onBackHome: exitLedgerHome,
      onBackCategory: exitLedgerCategory,
      onRevealComplete: ()=>{ saveLedger(); render(); },
    };
  }
  function ledgerProgressText(){
    return `${countDiscovered(ledger)} / ${LEDGER_TOTAL} DISCOVERED`;
  }
  function titleAchievementText(){
    return `${countDiscovered(ledger)}/${LEDGER_TOTAL} ACHIEVEMENTS DISCOVERED`;
  }
  function titleAchievementCount(){
    return `${countDiscovered(ledger)}/${LEDGER_TOTAL}`;
  }
  function openLedgerFromTitle(){
    ledgerReturn = { type: "title", savedModal: null, savedModalEscape: null };
    ledgerView = "home";
    ledgerViewCat = null;
    ledgerFocusId = null;
    render();
  }
  function openLedgerReveal(achievementId){
    ledgerView = "category";
    ledgerViewCat = getCategoryForAchievement(achievementId);
    ledgerFocusId = achievementId;
    render();
  }
  function exitLedgerCategory(){
    if (ledgerFocusId && isUnlocked(ledger, ledgerFocusId)) {
      pendingUnlockQueue = pendingUnlockQueue.filter(id => id !== ledgerFocusId);
      saveLedger();
    }
    const returnToGame = ledgerFocusId && ledgerReturn?.type === "game";
    ledgerFocusId = null;
    if (returnToGame) {
      ledgerViewCat = null;
      restoreLedgerReturn();
      return;
    }
    ledgerView = "home";
    ledgerViewCat = null;
    render();
  }
  function exitLedgerHome(){
    if (ledgerReturn) { restoreLedgerReturn(); return; }
    ledgerView = null;
    render();
  }
  function captureLedgerReturn(){
    ledgerReturn = {
      type: S ? "game" : "title",
      savedModal: modal && modal._achFlow ? null : modal,
      savedModalEscape: modal && modal._achFlow ? null : modalEscape,
    };
  }
  function restoreLedgerReturn(){
    const ret = ledgerReturn;
    ledgerView = null;
    ledgerViewCat = null;
    ledgerFocusId = null;
    ledgerReturn = null;
    if (!ret) { render(); return; }
    modal = ret.savedModal || null;
    modalEscape = ret.savedModalEscape || null;
    render();
  }
  function renderLedgerRoute(){
    const crt = document.getElementById("crt");
    // Home and category pages both reuse the High Scores layout (Gang Wars banner shown).
    crt.classList.remove("title-mode", "ledger-mode");
    crt.classList.add("game-mode");
    app.dataset.ledgerView = ledgerView || "";
    app.dataset.ledgerCategory = ledgerViewCat || "";
    app.dataset.ledgerFocus = ledgerFocusId || "";
    LedgerUI.render(app, ledgerUiCtx());
  }
  const EVENT_IMG_VERSION = "events-v5";
  function versionEventImage(path){
    if (typeof path !== "string" || !path.startsWith("events/") || path.includes("?")) return path;
    return `${path}?v=${EVENT_IMG_VERSION}`;
  }
  function getAchievementCardImage(id){
    const cat = getCategoryForAchievement(id);
    if (cat === "rare") return versionEventImage(`events/rare_${id}.jpg`);
    if (cat === "superRare") return versionEventImage(`events/super_${id}.jpg`);
    if (cat === "godlike") return versionEventImage(`events/godlike_${id}.jpg`);
    if (cat === "goldenGodlike") return versionEventImage("events/godlike_golden.jpg");
    return null;
  }
  /** Achievement unlock presentation (Achievement Found → reveal / card → ledger list). */
  function tryShowAchievementFlow(){
    if (modal && !modal._achFlow) return false;
    if (modal && modal._achFlow) return true;
    if (pendingUnlockQueue.length) { showAchievementFoundPopup(); return true; }
    if (pendingCompleteQueue.length) { showLedgerCompletionPopup(pendingCompleteQueue[0]); return true; }
    return false;
  }
  function emitTipEvent(name, ctx){
    matchTips(name, ctx || {}, tipsState).forEach(t => {
      pendingTipQueue = enqueueTipIds([t.id], pendingTipQueue);
    });
  }
  function hideTipOverlay(){
    document.getElementById("tutorial-overlay")?.remove();
  }
  function tipMount(){
    return document.getElementById("portrait-root") || document.body;
  }
  function emitMarketTips(){
    if (!S || S.over) return;
    if (S.day === 1) emitTipEvent("game:firstMarket", { day: S.day });
    migrateRunStats(S);
    if (S.location === HOME && S.runStats.leftHome) {
      emitTipEvent("location:donReturn", { location: S.location, returnVisit: true });
    }
  }
  function schedulePostFlow(){
    requestAnimationFrame(()=>{
      if (modal) return;
      tryShowPostFlow();
    });
  }
  function showTipModal(tipId){
    const tip = getTipById(tipId);
    if (!tip){ if (tryShowTipFlow()) return; render(); return; }
    const body = resolveTipBody(tip, CONFIG, money);
    let el = document.getElementById("tutorial-overlay");
    const mount = tipMount();
    if (!el){
      el = document.createElement("div");
      el.id = "tutorial-overlay";
      mount.appendChild(el);
    } else if (el.parentNode !== mount) {
      mount.appendChild(el);
    }
    el.className = "tutorial";
    el.setAttribute("role", "dialog");
    el.setAttribute("aria-modal", "true");
    el.innerHTML = `<div class="card">
        <p class="na">PRO TIP</p>
        <h2 id="modal-title">${tip.title}</h2><p>${body}</p>
        <div class="card-actions">
          <button type="button" id="tskip">SKIP ALL</button>
          <button type="button" class="amber" id="tnext">OK</button>
        </div>
      </div>`;
    const dismissTip = ()=>{
      markTipSeen(tipId, tipsState);
      saveTips(tipsState);
      hideTipOverlay();
      modal = null;
      modalEscape = null;
      if (tryShowTipFlow()) return;
      render();
    };
    const skipAll = ()=>{
      skipAllTips(tipsState);
      saveTips(tipsState);
      pendingTipQueue = [];
      hideTipOverlay();
      modal = null;
      modalEscape = null;
      render();
    };
    el.querySelector("#tnext").onclick = dismissTip;
    el.querySelector("#tskip").onclick = skipAll;
    modal = ()=>{};
    modal._tipFlow = true;
    modalEscape = skipAll;
    requestAnimationFrame(()=> el.querySelector("#tnext")?.focus());
  }
  function tryShowTipFlow(){
    if (modal && !modal._tipFlow) return false;
    if (!pendingTipQueue.length) return false;
    showTipModal(pendingTipQueue.shift());
    return true;
  }
  function tryShowPostFlow(){
    if (tryShowAchievementFlow()) return true;
    if (tryShowTipFlow()) return true;
    return false;
  }
  function showAchievementFoundPopup(){
    audioPlay("sfx.achievement.found");
    achModalPrevFocus = document.activeElement;
    modal = function(){
      modal._achFlow = true;
      app.innerHTML = `<div class="modal achievement-modal-overlay">
        <section class="achievement-modal" role="dialog" aria-modal="true" aria-labelledby="achievement-modal-title">
          <div class="achievement-modal__divider" aria-hidden="true">
            <span class="achievement-modal__divider-lines"></span>
            <span class="achievement-modal__divider-diamond"></span>
            <span class="achievement-modal__divider-lines"></span>
          </div>
          <h2 id="achievement-modal-title" class="achievement-modal__title">ACHIEVEMENT FOUND</h2>
          <p class="achievement-modal__message">A NEW ENTRY HAS BEEN<br>ADDED TO YOUR LEDGER</p>
          <button type="button" class="achievement-modal__button" id="achView">OK</button>
          <div class="achievement-modal__divider achievement-modal__divider--bottom" aria-hidden="true">
            <span class="achievement-modal__divider-lines"></span>
            <span class="achievement-modal__divider-diamond"></span>
            <span class="achievement-modal__divider-lines"></span>
          </div>
        </section>
      </div>`;
      const btn = document.getElementById("achView");
      achModalFocusTrap = (e)=>{
        if (e.key !== "Tab") return;
        e.preventDefault();
        btn?.focus();
      };
      document.addEventListener("keydown", achModalFocusTrap);
      btn.onclick = ()=>{
        removeAchModalFocusTrap();
        achModalPrevFocus = null;
        const id = pendingUnlockQueue[0];
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        if (!id) { render(); return; }
        captureLedgerReturn();
        const catId = getCategoryForAchievement(id);
        if (catId === "general") openLedgerReveal(id);
        else showEventAchievementReveal(id);
      };
      modalEscape = ()=>{
        removeAchModalFocusTrap();
        if (achModalPrevFocus && achModalPrevFocus.focus) {
          try { achModalPrevFocus.focus(); } catch (_) {}
        }
        achModalPrevFocus = null;
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        render();
      };
    };
    render();
  }
  function showLedgerCompletionPopup(kind){
    const isMaster = kind === "master";
    const cat = isMaster ? null : LEDGER_CATEGORIES.find(c => c.id === kind);
    const title = isMaster ? "CRIME LORD" : cat.completeTitle;
    const sub = isMaster
      ? `ALL ${LEDGER_TOTAL} LEDGER ENTRIES DISCOVERED`
      : `${cat.achievements.length} / ${cat.achievements.length} FOUND`;
    modal = function(){
      modal._achFlow = true;
      app.innerHTML = `<div class="modal"><div class="card ledger-complete${isMaster ? " master" : ""}" role="dialog" aria-modal="true">
        <div class="ach-found-rule">════════════════════</div>
        <h2>${title}</h2>
        <p>${isMaster ? sub : `${cat.achievements.length} / ${cat.achievements.length} FOUND`}</p>
        ${isMaster ? '<p class="ledger-master-tag">THE CITY IS YOURS</p>' : ""}
        <div class="ach-found-rule">════════════════════</div>
        <button class="full amber" id="ok" style="margin-top:12px">CONTINUE</button>
      </div></div>`;
      document.getElementById("ok").onclick = ()=>{
        if (isMaster) {
          ledger.masterCompleteShown = true;
          saveLedger();
        } else {
          markCategoryCompleteShown(ledger, kind);
          saveLedger();
        }
        pendingCompleteQueue = pendingCompleteQueue.filter(k => k !== kind);
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        if (pendingUnlockQueue.length) showAchievementFoundPopup();
        else if (pendingCompleteQueue.length) showLedgerCompletionPopup(pendingCompleteQueue[0]);
        else if (tryShowTipFlow()) return;
        else restoreLedgerReturn();
      };
    };
    render();
  }
  function showEventAchievementReveal(achievementId){
    const staged = pendingEventCards[achievementId];
    if (!staged) { showAchievementCardReveal(achievementId); return; }
    delete pendingEventCards[achievementId];
    const { imgKey, title, desc, tier } = staged;
    if (A()) A().eventStinger({ tier: tier || 'rare' });
    showTierEvent(imgKey, title, desc, ()=>{
      revealAchievement(ledger, achievementId);
      saveLedger();
      modal = null;
      modalEscape = null;
      openLedgerReveal(achievementId);
    });
    if (modal) modal._achFlow = true;
  }
  function showAchievementCardReveal(achievementId){
    const img = getAchievementCardImage(achievementId);
    const cat = getCategoryForAchievement(achievementId);
    const golden = cat === "goldenGodlike";
    modal = function(){
      modal._achFlow = true;
      app.innerHTML = `<div class="ach-card-reveal${golden ? " golden" : ""}" id="achCardReveal" role="dialog" aria-modal="true">
        <img src="${img}" alt="${getAchievementTitle(achievementId)}" decoding="async">
        <button type="button" class="ach-card-next" id="achCardNext">NEXT</button>
      </div>`;
      const advance = ()=>{
        revealAchievement(ledger, achievementId);
        saveLedger();
        modal._achFlow = false;
        modal = null;
        modalEscape = null;
        openLedgerReveal(achievementId);
      };
      document.getElementById("achCardNext").onclick = advance;
      document.getElementById("achCardReveal").onclick = e=>{
        if (e.target.id === "achCardReveal") advance();
      };
      modalEscape = advance;
    };
    render();
  }
  function save(){
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }
    catch(e){
      const el = document.getElementById("save-err");
      if(el) el.textContent = "Could not save — storage may be full or disabled.";
    }
  }
  function load(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return null;
      return migrateSave(JSON.parse(raw));
    }catch(e){ saveCorrupted = true; localStorage.removeItem(SAVE_KEY); return null; }
  }
  function highscores(){ try{ return JSON.parse(localStorage.getItem(HS_KEY))||[]; }catch(e){ return []; } }
  function pushScore(score, worth){
    const hs = highscores();
    const entry = {score, worth, date:new Date().toISOString().slice(0,10)};
    hs.push(entry);
    const sorted = ScoresUI.sortHighscores(hs);
    const placement = sorted.findIndex(e => e === entry) + 1;
    localStorage.setItem(HS_KEY, JSON.stringify(sorted.map(({score:s, worth:w, date:d}) => ({score:s, worth:w, date:d}))));
    return { placement, entry };
  }
  function saveLedger(){
    try { localStorage.setItem(LEDGER_KEY, JSON.stringify(ledger)); }
    catch(e) { /* storage full */ }
  }
  function startNewGame(){
    audioPlay("sfx.events.modalClose");
    if (A()) A().stopMusic();
    S = newGame(eventRollChances(ledger));
    migrateRunStats(S);
    save();
  }
  function queueUnlocks(ids){
    if (!ids || !ids.length) return;
    let eventUnlocked = false;
    ids.forEach(id => {
      if (!pendingUnlockQueue.includes(id)) pendingUnlockQueue.push(id);
      if (isEventAchievementId(id)) eventUnlocked = true;
    });
    if (eventUnlocked) resetEventPity(ledger);
    saveLedger();
    refreshCategoryCompletions();
    if (checkMasterComplete(ledger) && !ledger.masterComplete) {
      ledger.masterComplete = true;
      saveLedger();
      if (!ledger.masterCompleteShown) pendingCompleteQueue.push("master");
    }
  }
  function refreshCategoryCompletions(){
    LEDGER_CATEGORIES.forEach(cat => {
      if (isCategoryComplete(ledger, cat.id) && !wasCategoryCompleteShown(ledger, cat.id)) {
        if (!pendingCompleteQueue.includes(cat.id)) pendingCompleteQueue.push(cat.id);
      }
    });
  }
  function checkRunAchievements(){
    if (!S || S.over) return;
    migrateRunStats(S);
    const ids = checkGeneralAchievements(S, ledger);
    queueUnlocks(ids);
  }
  function checkEndAchievements(){
    if (!S) return;
    migrateRunStats(S);
    const ids = checkEndRunAchievements(S, ledger);
    queueUnlocks(ids);
  }
  function unlockFromEvent(eventId){
    queueUnlocks(unlockEventAchievement(ledger, eventId));
  }
  function logMsg(t){ S.log.unshift(`Day ${S.day}: ${t}`); S.log = S.log.slice(0,12); }
  function afterMarketAction(msg){
    const stall = tickStallPressure(S);
    if (stall){
      if (S.over){ endGame(stall); return; }
      logMsg(stall);
    }
    if (msg) logMsg(msg);
    save();
  }

  function bindModalCard(card){
    if(!card) return;
    card.setAttribute("role","dialog");
    card.setAttribute("aria-modal","true");
    const h2 = card.querySelector("h2");
    if(h2 && !card.getAttribute("aria-labelledby")) card.setAttribute("aria-labelledby", h2.id || (h2.id = "modal-title"));
  }
  function removeAchModalFocusTrap(){
    if (achModalFocusTrap) {
      document.removeEventListener("keydown", achModalFocusTrap);
      achModalFocusTrap = null;
    }
  }
  function dismissModal(){
    modal = null;
    modalEscape = null;
    render();
  }
  let modalEscape = null;
  const EventUI = window.GangWarsEventUI.create({
    app,
    render,
    audioPlay,
    bindModalCard,
    versionEventImage,
    setModal(fn){ modal = fn; },
    clearModal(){ modal = null; modalEscape = null; },
    setModalEscape(fn){ modalEscape = fn; },
  });
  const TravelUI = window.GangWarsTravelUI.create({
    app,
    render,
    setModal(fn){ modal = fn; },
  });
  const BankUI = window.GangWarsBankUI.create({
    app,
    render,
    setModal(fn){ modal = fn; },
    dismissModal,
    bindModalCard,
    getState(){ return S; },
    getLedger(){ return ledger; },
    money,
    audioPlay,
    emitTipEvent,
    tryShowPostFlow,
    CONFIG,
    bankRepay,
    bankBorrow,
    bankDeposit,
    bankWithdraw,
    maxBorrowAmount,
    bankDepositLimit,
    effectiveBankInterest,
    recordBorrow,
    recordBankDeposit,
    saveLedger,
    announce,
    afterMarketAction,
    checkRunAchievements,
  });
  const MarketUI = window.GangWarsMarketUI.create({
    app,
    render,
    setModal(fn){ modal = fn; },
    clearModal(){ modal = null; modalEscape = null; },
    bindModalCard,
    dismissModal,
    getState(){ return S; },
    getLedger(){ return ledger; },
    money,
    audioPlay,
    announce,
    afterMarketAction,
    tryShowPostFlow,
    checkRunAchievements,
    save,
    saveLedger,
    buy,
    sell,
    avgCost,
    profitPct,
    spaceUsed,
    spaceLeft,
    recordBuy,
    recordSell,
    recordUnitsBought,
    CONFIG,
    GOODS,
    GOOD,
    LOCATION_FLAVOR,
    HOME,
    renderTravel,
    openBank,
  });
  const StandardEvents = window.GangWarsStandardEvents.create({
    getState(){ return S; },
    money,
    randInt,
    pick,
    GOODS,
    CONFIG,
    spaceLeft,
    rollStashUpgrade,
    gunEventCost,
    showEvent,
    showEventAsk,
    emitTipEvent,
    recordSpaceChange,
    logMsg,
    clearModal(){ modal = null; modalEscape = null; },
  });
  const FedsEvent = window.GangWarsFedsEvent.create({
    app,
    render,
    getState(){ return S; },
    getAudio: A,
    money,
    randInt,
    chance,
    pick,
    CONFIG,
    GOOD,
    audioPlay,
    eventImgSrc,
    fitEventPopupToImage,
    showEvent,
    emitTipEvent,
    logMsg,
    endGame,
    fedsApplyFightKill,
    fedsCounterHitChance,
    grantDebtInterestFreeze,
    recordFedFightWin,
    setModal(fn){ modal = fn; },
    clearModal(){ modal = null; modalEscape = null; },
    setModalEscape(fn){ modalEscape = fn; },
  });
  document.addEventListener("keydown", e=>{
    if(e.key !== "Escape") return;
    if (ledgerView && !modal) {
      e.preventDefault();
      if (ledgerView === "category") exitLedgerCategory();
      else exitLedgerHome();
      return;
    }
    if (!modal) return;
    e.preventDefault();
    if (modalEscape) modalEscape();
    else dismissModal();
  });



  /* ── Market anomaly event bodies ── */
  const ANOMALY_BODIES = {
    spike:[
      `The Feds hit three stash houses overnight. You won't find {ITEM} on the streets anymore. Name your price.`,
      `Big Daddy J stopped moving {ITEM}. The rest of the city mistook it for a law.`,
      `Father Dempsey condemned {ITEM} on Sunday. By Monday, his congregation had bought every crate.`,
      `The Tribune reported a {ITEM} shortage. It wasn't true until everyone believed it.`,
      `A sign read: "BUY {ITEM}. — A FRIEND FROM 1959." By noon, nobody was laughing.`,
      `A broker refused Big Daddy J's offer. By breakfast he accepted. By dinner he'd disappeared.`,
      `Aldermen declared {ITEM} a menace. Their chauffeurs bought every crate before the ink dried.`,
      `The Feds seized a warehouse of {ITEM}. Half returned as "missing evidence." The rest became expensive.`,
      `A bookmaker stopped taking bets and started buying {ITEM}. That's all the market needed to hear.`,
      `Someone asked where all the {ITEM} went. Nobody answered. Nobody needed to.`,
    ],
    surge:[
      `Rothstein's network collapsed. What's left of {ITEM} is selling like buried treasure.`,
      `Every {ITEM} dealer got the same offer: pay or close. The survivors named their own price.`,
      `A doctor prescribed {ITEM} for "modern nerves." By lunch, half the city felt unwell.`,
      `Nobody knew why the queue formed. By noon, nobody cared. {ITEM} was gone.`,
      `Big Daddy J quietly bought {ITEM}. By lunchtime, everyone else had a reason to.`,
      `Big Daddy J is entertaining tonight. Every crate of {ITEM} already has an invitation.`,
      `Big Daddy J said three words. By sunrise, everyone was buying {ITEM}. Nobody asked what they were.`,
      `A truckload of {ITEM} vanished between two blocks. So did the witnesses.`,
      `The newspapers called {ITEM} a passing craze. The next edition cost twice as much.`,
      `Everybody laughed at the first buyer of {ITEM}. By afternoon they were laughing in a queue.`,
    ],
    flood:[
      `A hijacked shipment of {ITEM} got scattered across the docks. Someone's offloading it fast and cheap.`,
      `Nobody ordered this much {ITEM}. Nobody admits owning it. Everybody's selling it.`,
      `Only one man survived last night's deal. He's selling {ITEM} like tomorrow's somebody else's problem.`,
      `Big Bill Thompson lost the city's {ITEM} stockpile on a boxing match. Now everyone's buying it back.`,
      `Salvatore Minetti's dying wish: sell every crate of {ITEM}. His lawyer took him literally.`,
      `Big Daddy J flooded the {ITEM} market overnight. Somewhere, somebody got the message.`,
      `She sold every crate of {ITEM}. "It won't matter after '33," she smiled. Nobody understood.`,
      `The owner refused to sell {ITEM}. His widow accepted a much lower offer.`,
      `An accountant found one extra zero. The warehouse found nine extra shipments.`,
      `Somebody accidentally delivered {ITEM} to the evidence warehouse. Somebody else accidentally collected it.`,
    ],
  };

  function render(){
    const crt = document.getElementById("crt");
    if (ledgerView && !modal){
      document.documentElement.classList.remove("title-route");
      renderLedgerRoute();
      syncSceneAudio("ledger");
      return;
    }
    crt.classList.remove("ledger-mode");
    if (modal){ document.documentElement.classList.remove("title-route"); crt.classList.remove("title-mode"); crt.classList.add("game-mode"); modal();
      requestAnimationFrame(()=>{ const d=app.querySelector('[role="dialog"]'); if(!d) return; const f=d.querySelector('button:not([disabled]),input:not([disabled])'); if(f) f.focus(); });
      return; }
    if (!S){ document.documentElement.classList.add("title-route"); crt.classList.add("title-mode"); crt.classList.remove("game-mode"); renderTitle(); syncSceneAudio("title"); return; }
    document.documentElement.classList.remove("title-route");
    crt.classList.remove("title-mode"); crt.classList.add("game-mode");
    if (S.over){ renderGameOver(); syncSceneAudio("end"); return; }
    renderMarket();
    syncSceneAudio("market");
    emitMarketTips();
    schedulePostFlow();
  }

  function renderTitle(){
    const saved = load();
    app.innerHTML = `${saveCorrupted ? '<p class="save-err" role="alert" style="padding:6px 0 0;">Save data was corrupted and has been cleared.</p>' : ''}<div class="play title-play">
      <div class="title-screen">
        <div class="title-cover">
          <img src="${TITLE_SCREEN}" width="853" height="1844" decoding="async" fetchpriority="high"
            alt="Gang Wars — Prohibition 1929">
          <div class="title-achievement-count" aria-label="${titleAchievementText()}">
            <span>${titleAchievementCount()}</span><span>ACHIEVEMENTS</span><span>DISCOVERED</span>
          </div>
          <button type="button" class="title-hit title-hit-new" id="new" aria-label="New Game"></button>
          <button type="button" class="title-hit title-hit-cont" id="cont" aria-label="Continue" ${saved?"":"disabled"}></button>
          <button type="button" class="title-hit title-hit-ledger" id="ledger" aria-label="Ledger"></button>
          <button type="button" class="title-hit title-hit-scores" id="scores" aria-label="High Scores"></button>
        </div>
      </div>
    </div>`;
    layoutTitleScreen();
    const coverImg = app.querySelector(".title-cover img");
    if (coverImg && !coverImg.complete) coverImg.addEventListener("load", layoutTitleScreen, { once: true });
    if (!window._titleLayoutBound) {
      window._titleLayoutBound = true;
      window.addEventListener("resize", layoutTitleScreen);
      window.addEventListener("orientationchange", layoutTitleScreen);
      window.visualViewport?.addEventListener("resize", layoutTitleScreen);
      window.visualViewport?.addEventListener("scroll", layoutTitleScreen);
    }
    bindMuteButton(document.getElementById("audio-mute"));
    if (A()) A().preload("music.title");
    document.getElementById("new").onclick = ()=>{ startNewGame(); render(); };
    document.getElementById("cont").onclick = ()=>{
      const v=load();
      if(v){
        S=v; migrateRunStats(S); checkRunAchievements(); render();
      }
    };
    document.getElementById("scores").onclick = renderScores;
    document.getElementById("ledger").onclick = openLedgerFromTitle;
  }

  function renderScores(){
    document.documentElement.classList.remove("title-route");
    document.getElementById("crt").classList.remove("title-mode");
    document.getElementById("crt").classList.add("game-mode");
    syncSceneAudio("scores");
    const top10 = ScoresUI.buildTop10Leaderboard(highscores(), RANKS, getRank);
    const rows = top10.map((row, i) => ScoresUI.mkScoresLbRow(row, i + 1, false, money)).join("");
    app.innerHTML = `<div class="play scores-play high-scores-play">
      <div class="scores-hero">
        <div class="scores-hero-title">
          <span class="eos-orn-line"></span>
          <span class="scores-hero-text">HIGH SCORES</span>
          <span class="eos-orn-line r"></span>
        </div>
      </div>
      <div class="scores-lb-wrap">${rows}</div>
      <div class="scores-foot"><button class="full" id="back">BACK</button></div>
    </div>`;
    document.getElementById("back").onclick = render;
  }

  /* ---------- market ---------- */
  function renderMarket(){
    return MarketUI.renderMarket();
  }

  /* ---------- the Don & the bank (in-DOM inputs) ---------- */
  function openBank(){
    return BankUI.openBank();
  }

  /* ---------- move + day events ---------- */
  function renderTravel(){
    return TravelUI.renderTravel(LOCATIONS, S.location, travelTo, dismissModal);
  }
  function stageEventCard(id, imgKey, title, desc, tier){
    pendingEventCards[id] = { imgKey, title, desc, tier: tier || 'rare' };
  }
  function travelTo(dest){
    audioPlay("sfx.travel.engineStart");
    audioPlay("sfx.travel.dayTick");
    const from = S.location;
    modal=null; S.location=dest; S.day+=1;
    migrateRunStats(S);
    if (from === HOME && dest !== HOME) S.runStats.leftHome = true;
    emitTipEvent("travel:dayAdvanced", { day: S.day });
    audioPlay("sfx.travel.arrival");
    audioPlay("sfx.travel.screech");
    const eventsBefore = countEventAchievementsUnlocked(ledger);
    recordDistrictVisit(S, dest);
    recordSpaceChange(S);
    const capMsg = applyDailyInterest(S);
    if (capMsg){ endGame(capMsg); return; }
    if (S.day > CONFIG.days){ endGame(); return; }
    const { prices, anomaly, sr, gk, golden, re } = resolveTravelMarket(S, dest);
    S.prices = prices;
    S.anomaly = anomaly || null;
    if (LOCATION_FLAVOR[dest]) { logMsg(`Arrived in ${dest}. ${LOCATION_FLAVOR[dest]}`); announce(`Day ${S.day}. Arrived in ${dest}.`); }

    let marketEvent=null;
    if(golden && S.day===golden.day){
      unlockFromEvent('golden');
      const goldenImg=golden.img||'bigdaddy';
      stageEventCard('golden', goldenImg, golden.lines[0], `${golden.lines[1]} Every price in the city is climbing.`, 'golden');
    } else if(gk && S.day===gk.day){
      unlockFromEvent(gk.id);
      const gkImg=gk.img||'bigdaddy';
      if(dest===gk.district){
        stageEventCard(gk.id, gkImg, gk.lines[0], gk.lines[1], 'godlike');
      } else {
        stageEventCard(gk.id, gkImg, 'BIG DADDY J IS ACROSS TOWN', `He's making moves in ${gk.district}. Every price there is climbing.`, 'godlike');
      }
    } else if(sr && S.day===sr.day){
      unlockFromEvent(sr.id);
      const srImg=sr.img||'celeb';
      const srTitle = sr.title || (sr.lines && sr.lines[0]) || '';
      const srDesc  = sr.desc  || (sr.lines && sr.lines[1]) || '';
      if(dest===sr.district){
        stageEventCard(sr.id, srImg, srTitle, srDesc, 'superRare');
      } else {
        stageEventCard(sr.id, srImg, srTitle, `${srDesc} Head to ${sr.district} for the action.`, 'superRare');
      }
    } else if(re && S.day===re.day){
      unlockFromEvent(re.id);
      const reImg=re.img||'intel';
      const reTitle = re.title || (re.lines && re.lines[0]) || '';
      const reDesc  = re.desc  || (re.lines && re.lines[1]) || '';
      if(dest===re.district){
        stageEventCard(re.id, reImg, reTitle, reDesc, 'rare');
      } else {
        stageEventCard(re.id, reImg, reTitle, `${reDesc} Head to ${re.district} for the action.`, 'rare');
      }
    } else if(anomaly){
      const anomalyImg={spike:'shortage',surge:'frenzy',flood:'flood'};
      const body=pick(ANOMALY_BODIES[anomaly.type]).replace(/{ITEM}/g, anomaly.itemName);
      marketEvent=(next)=>{ if(A()) A().eventStinger({ anomalyType: anomaly.type }); showEvent(anomalyImg[anomaly.type], body, 'NOTED', next); };
    }

    runTravelEvents(()=>{
      if (isEventLedgerSlow(ledger) && countEventAchievementsUnlocked(ledger) === eventsBefore) {
        recordEventPityTravel(ledger);
        saveLedger();
      }
      checkRunAchievements();
      save();
      if (tryShowPostFlow()) return;
      render();
    }, marketEvent);
  }
  function runTravelEvents(done, firstEvent){
    const queue=[];
    if(firstEvent) queue.push(firstEvent);
    const candidates=[];
    if (chance(1/12)) candidates.push(StandardEvents.eventMugging);
    if (chance(1/12)) candidates.push(StandardEvents.eventFind);
    if (chance(1/7))  candidates.push(StandardEvents.eventStash);
    if (chance(1/7))  candidates.push(StandardEvents.eventGun);
    if (chance(1/7))  candidates.push(FedsEvent.eventFeds);
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    queue.push(...candidates.slice(0, CONFIG.maxTravelEvents));
    let i=0; const next=()=>{ if(S.over)return; if(i>=queue.length){ save(); done(); return; } queue[i++](next); };
    next();
  }
  function eventImgSrc(imgKeyOrPath){
    return EventUI.eventImgSrc(imgKeyOrPath);
  }
  function fitEventPopupToImage(src){
    return EventUI.fitEventPopupToImage(src);
  }

  /* Single-button event popup with split image/text layout */
  function showEvent(imgKey, body, btn, cb){
    return EventUI.showEvent(imgKey, body, btn, cb);
  }

  /* Tier-event popup (rare / super rare / godlike / golden godlike):
     event title + description stacked above a large illustration, NEXT below. */
  function showTierEvent(imgKey, title, desc, cb){
    return EventUI.showTierEvent(imgKey, title, desc, cb);
  }

  /* Two-button choice popup (BUY/PASS style) */
  function showEventAsk(imgKey, body, yesLabel, onYes, noLabel, onNo){
    return EventUI.showEventAsk(imgKey, body, yesLabel, onYes, noLabel, onNo);
  }

  /* Legacy plain-card toast (used by bank/Don modals - no image) */
  function toast(title, body, btn, cb){
    return EventUI.toast(title, body, btn, cb);
  }
  /* ---------- game over ---------- */
  function endGame(reason){
    if (A()) { A().stopMusic(); A().duckMusic(false); }
    audioPlay("sfx.end.rankReveal");
    S.over=true; S.overReason=reason||`Your month is over. Whatever you made, it's going to have to be enough.`;
    const result = pushScore(classicScore(S), netWorth(S));
    S.placement = result.placement;
    S.scoreEntry = result.entry;
    checkEndAchievements();
    save();
    saveLedger();
    if (tryShowPostFlow()) { render(); return; }
    render();
  }
  function renderGameOver(){
    const worth = netWorth(S);
    const hs = highscores();
    const top10 = ScoresUI.buildTop10Leaderboard(hs, RANKS, getRank);
    const playerInTop10 = top10.findIndex(row => !row.isDefault && ScoresUI.scoreEntryMatch(row.entry, S.scoreEntry)) !== -1;
    const rows = top10.map((row, i) => {
      const isYou = !row.isDefault && ScoresUI.scoreEntryMatch(row.entry, S.scoreEntry);
      return ScoresUI.mkScoresLbRow(row, i + 1, isYou, money);
    }).join("");

    let outsideRow = '';
    if (!playerInTop10 && S.scoreEntry) {
      const real = ScoresUI.sortHighscores(hs).map(e => ({ worth: e.worth, isDefault: false, entry: e }));
      const combined = [...real, ...ScoresUI.defaultLeaderboardRows(RANKS)].sort((a, b) => b.worth - a.worth || (a.isDefault ? 1 : -1));
      const pos = combined.findIndex(row => !row.isDefault && ScoresUI.scoreEntryMatch(row.entry, S.scoreEntry)) + 1;
      outsideRow = `<div class="scores-lb-wrap eos-you-wrap">${ScoresUI.mkScoresLbRow({ rank: getRank(worth), worth }, pos, true, money)}</div>`;
    }

    app.innerHTML = `<div class="play scores-play eos-play">
      <div class="scores-hero">
        <div class="scores-hero-title eos-hero-title">
          <span class="eos-orn-line"></span>
          <span class="eos-hero-label">FINAL SCORE</span>
          <span class="eos-orn-line r"></span>
        </div>
      </div>
      <div class="scores-lb-wrap">${rows}</div>
      ${outsideRow}
      <div class="scores-foot eos-foot">
        <button class="amber" id="again">PLAY AGAIN</button>
        <button id="menu">MAIN MENU</button>
      </div>
    </div>`;
    document.getElementById("again").onclick = ()=>{ localStorage.removeItem(SAVE_KEY); startNewGame(); render(); };
    document.getElementById("menu").onclick = ()=>{ S=null; render(); };
  }


  window.GangWarsTips = {
    getTipsState: () => tipsState,
    getPendingTips: () => pendingTipQueue.slice(),
    emitTipEvent,
    tryShowTipFlow,
    tryShowPostFlow,
    saveTipsState: () => saveTips(tipsState),
  };

  window.GangWarsLedger = {
    getLedger: () => ledger,
    getViewState: () => ({ view: ledgerView, categoryId: ledgerViewCat, focusId: ledgerFocusId }),
    getPendingUnlocks: () => pendingUnlockQueue.slice(),
    getPendingCompletions: () => pendingCompleteQueue.slice(),
    ledgerUiCtx,
    ledgerProgressText,
    getAchievementCardImage,
    openLedgerFromTitle,
    openLedgerCategory,
    openLedgerReveal,
    exitLedgerCategory,
    exitLedgerHome,
    saveLedger,
  };

  render();
})();
}
</script>
<script>
  if ('serviceWorker' in navigator && !/^127\.0\.0\.1$|^localhost$/i.test(location.hostname)) {
    navigator.serviceWorker.register('./sw.js?v=134').then(reg => {
      reg.update();
      reg.addEventListener('updatefound', () => {
        const worker = reg.installing;
        if (!worker) return;
        worker.addEventListener('statechange', () => {
          if (worker.state === 'installed' && navigator.serviceWorker.controller) {
            worker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    });
    // NOTE: deliberately do NOT reload on controllerchange. A forced reload
    // when a new SW activates interrupts active play (in-memory state isn't
    // restored on load, so it drops back to the title). The updated assets
    // apply on the next natural page load instead.
  }
</script>
</body>
</html>
