<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#15110b" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gang Wars" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<title>GANG WARS</title>
<style>
  :root{
    color-scheme:dark;
    /* READABLE — art-deco speakeasy: espresso black, cream, gold */
    --bg:#15110b; --panel:#201a11;
    --text:#ece1cd; --dim:#9c8d73;
    --green:#c9a24a; --amber:#e7c879; --red:#cf6a5d;
    --border:#3a2f1d; --bartrack:#2a2114;
    --btnbg:#241d12; --btnborder:#4a3b22;
    --shadow:rgba(0,0,0,.55); --glow:none; --rowline:#2a2215;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{height:100%;height:100svh;height:100dvh;}
  html,body{margin:0;padding:0;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:ui-monospace,"SF Mono","Menlo",Consolas,monospace;font-size:15px;line-height:1.4;
    -webkit-text-size-adjust:100%;}
  body{display:flex;justify-content:center;align-items:stretch;
    height:100vh;height:100svh;height:100dvh;}
  .serif{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,"Times New Roman",serif;}
  #crt{width:100%;max-width:540px;display:flex;flex-direction:column;
    min-height:0;height:100vh;height:100svh;height:100dvh;max-height:100dvh;overflow:hidden;
    padding:calc(env(safe-area-inset-top, 0px) + 10px) 10px calc(env(safe-area-inset-bottom, 0px) + 12px) 10px;background:var(--bg);}
  .masthead{flex:0 0 auto;text-align:center;
    border-top:3px double var(--amber);border-bottom:3px double var(--amber);
    padding:3px 0;margin:0 0 3px;}
  #crt.game-mode{padding:calc(env(safe-area-inset-top, 0px) + 1px) 8px env(safe-area-inset-bottom, 0px) 8px;}
  #crt.game-mode .masthead{padding:2px 0;margin:0 0 15px;}
  #crt.game-mode h1{font-size:clamp(1.1rem, 6.5vw, 2rem);}
  h1{font-size:clamp(1.35rem, 7.5vw, 2.4rem);letter-spacing:2px;margin:0;line-height:1.05;
    color:var(--amber);text-shadow:var(--glow);font-weight:900;white-space:nowrap;}
  #app{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  /* ── three-zone permanent frame ── */
  .play{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;}

  /* Sepia pixel-art assets — lighten ~10% for readability on dark UI */
  .goods-icon,.market-play .loc-header img,.travel-head img,.travel-row img,.eos-card img{
    filter:brightness(1.1);}

  /* MARKET SCREEN — fixed single-screen layout (no scroll) */
  .market-play{gap:5px;overflow:hidden;}
  .market-play .loc-header{flex:0 0 16%;min-height:76px;max-height:112px;
    display:flex;gap:6px;align-items:stretch;padding:4px 8px 4px 4px;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;}
  .market-play .loc-header img{flex:0 0 auto;width:auto;height:100%;
    min-width:clamp(76px, 24vw, 120px);max-width:42%;aspect-ratio:1;
    display:block;object-fit:cover;object-position:center;
    image-rendering:pixelated;image-rendering:crisp-edges;border-radius:4px;
    border:1px solid var(--btnborder);}
  .market-play .loc-header-body{flex:1 1 auto;min-width:0;overflow:hidden;}
  .market-play .loc-header-title{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.82rem, 3.8vw, 1rem);font-weight:700;color:var(--amber);letter-spacing:1px;
    line-height:1.1;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .market-play .loc-header-day{font-size:clamp(.62rem, 2.8vw, .74rem);color:var(--dim);margin:1px 0 2px;}
  .market-play .loc-header-desc{font-size:clamp(.58rem, 2.5vw, .68rem);color:var(--dim);line-height:1.28;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .market-mid{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;
    background:var(--bg);border:1px solid var(--border);border-radius:8px;}
  .market-head{flex:0 0 auto;padding:5px 10px 3px;border-bottom:1px solid var(--border);}
  .market-golden-banner{flex:0 0 auto;margin:0;padding:5px 10px 4px;
    font-size:clamp(.58rem, 2.5vw, .68rem);letter-spacing:1.2px;text-transform:uppercase;
    text-align:center;color:#1a1206;background:linear-gradient(90deg, #b8860b, var(--amber), #b8860b);
    border-bottom:1px solid var(--amber);animation:golden-pulse 2s ease-in-out infinite;}
  @keyframes golden-pulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.15);}}
  .market-head-title{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.76rem, 3.4vw, .88rem);color:var(--amber);letter-spacing:1px;text-transform:uppercase;}
  .market-cols{flex:0 0 auto;display:grid;grid-template-columns:1fr minmax(4.2rem,5.4rem) 1.8rem minmax(5rem,6.8rem);gap:3px;
    padding:2px 8px 3px;font-size:clamp(.52rem, 2.3vw, .6rem);color:var(--dim);letter-spacing:.5px;
    border-bottom:1px solid var(--rowline);}
  .market-cols span:nth-child(2){text-align:right;}
  .market-cols span:nth-child(3){text-align:right;}
  .market-rows{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
  .market-row{flex:1 1 0;min-height:0;display:grid;grid-template-columns:1fr minmax(4.2rem,5.4rem) 1.8rem minmax(5rem,6.8rem);gap:3px;
    align-items:center;padding:0 8px;border-bottom:1px solid var(--rowline);font-size:clamp(.62rem, 2.8vw, .74rem);
    overflow:hidden;}
  .market-row:last-child{border-bottom:none;}
  .market-row.dead{opacity:.42;}
  .goods-cell{display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;}
  .goods-icon{width:clamp(26px, 6.5vw, 34px);height:clamp(26px, 6.5vw, 34px);flex:0 0 clamp(26px, 6.5vw, 34px);
    display:block;object-fit:contain;
    image-rendering:pixelated;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;
    border:1px solid var(--btnborder);border-radius:4px;background:rgba(0,0,0,.35);padding:1px;}
  .goods-name{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .price-cell{text-align:right;color:var(--amber);white-space:nowrap;}
  .price-cell.na{color:var(--dim);}
  .hold-cell{text-align:right;color:var(--dim);white-space:nowrap;}
  .hold-cell.have{color:var(--green);}
  .market-play .market-actions{display:flex;justify-content:flex-end;align-items:center;gap:3px;
    white-space:nowrap;height:100%;max-height:100%;overflow:hidden;}
  .market-play .market-actions button{padding:2px 7px;font-size:clamp(.5rem, 2.1vw, .58rem);margin:0;border-radius:3px;
    min-height:0;min-width:0;height:clamp(20px, 92%, 30px);line-height:1.1;flex:0 0 auto;}
  .market-mid .actlog{flex:0 0 auto;font-size:clamp(.56rem, 2.4vw, .64rem);color:var(--dim);
    padding:4px 10px 5px;line-height:1.25;border-top:1px solid var(--border);}

  /* TRAVEL — locked standard: full car header, stacked districts, zero dead space (see docs/ui-standards/travel.png) */
  .travel-play{overflow:hidden;}
  .travel-screen{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column;
    border:3px double var(--amber);border-radius:8px;background:var(--bg);}
  .travel-head{flex:0 0 16%;min-height:88px;max-height:118px;display:flex;gap:10px;align-items:center;
    padding:4px 10px 4px 6px;border-bottom:1px solid var(--amber);background:var(--panel);}
  .travel-head img{flex:0 0 auto;height:100%;width:auto;max-width:44%;min-width:0;
    display:block;object-fit:contain;object-position:left center;
    image-rendering:pixelated;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;
    border:none;border-radius:0;background:transparent;}
  .travel-head-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px;}
  .travel-head-title{font-family:inherit;
    font-size:clamp(1.2rem, 6vw, 1.6rem);font-weight:700;color:var(--amber);letter-spacing:1.5px;
    line-height:1.05;text-transform:uppercase;width:100%;
    padding:0;border:none;border-radius:0;background:transparent;box-sizing:border-box;}
  .travel-head-sub{font-size:clamp(.6rem, 2.6vw, .72rem);color:var(--dim);line-height:1.3;padding:0 2px;}
  .travel-list{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;
    gap:0;padding:0;}
  .travel-row{flex:1 1 0;min-height:0;display:flex;align-items:stretch;gap:8px;
    padding:2px 8px 2px 3px;border:none;border-bottom:1px solid var(--btnborder);border-radius:0;
    background:var(--bg);color:var(--text);text-align:left;cursor:pointer;width:100%;
    font-family:inherit;}
  .travel-row:first-child{border-top:1px solid var(--btnborder);}
  .travel-row img{flex:0 0 auto;height:100%;width:auto;
    min-width:clamp(56px, 16vw, 88px);max-width:38%;aspect-ratio:1;
    display:block;object-fit:cover;object-position:center;border-radius:0;
    border:none;
    image-rendering:pixelated;image-rendering:crisp-edges;}
  .travel-row-body{flex:1 1 auto;min-width:0;overflow:hidden;padding-right:2px;
    display:flex;flex-direction:column;justify-content:center;}
  .travel-row-name{display:block;font-family:inherit;font-weight:700;color:var(--amber);letter-spacing:.4px;
    font-size:clamp(.74rem, 3.3vw, .86rem);
    text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .travel-row-desc{display:block;font-size:clamp(.56rem, 2.4vw, .66rem);color:var(--dim);line-height:1.28;
    margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .travel-row.here,.travel-row:disabled{opacity:.35;cursor:default;pointer-events:none;
    background:rgba(32,26,17,.5);}
  .travel-row.here img,.travel-row:disabled img{filter:brightness(1.1) grayscale(.7);}
  .travel-row.here .travel-row-name,.travel-row:disabled .travel-row-name{color:var(--dim);}
  .travel-row:active:not(.here):not(:disabled){background:rgba(231,200,121,.12);}
  .travel-foot{flex:0 0 auto;min-height:42px;max-height:52px;padding:5px 10px 6px;
    border-top:1px solid var(--amber);background:var(--panel);display:flex;align-items:stretch;}
  .travel-foot button{width:100%;letter-spacing:1px;font-size:clamp(.72rem, 3.2vw, .84rem);
    padding:clamp(6px, 2vw, 10px) 8px;border-color:var(--amber);}
  .loc{font-size:.78rem;color:var(--amber);letter-spacing:1px;
    padding:4px 10px 3px;display:flex;justify-content:space-between;align-items:baseline;
    border-left:1px solid var(--border);border-right:1px solid var(--border);}
  .loc small{color:var(--dim);font-size:.58rem;letter-spacing:0;white-space:nowrap;}
  table{width:100%;border-collapse:collapse;font-size:.84rem;}
  th,td{text-align:left;padding:4px 8px;border-bottom:1px solid var(--rowline);vertical-align:middle;}
  th{color:var(--dim);font-weight:normal;font-size:.65rem;letter-spacing:1px;background:var(--bg);position:sticky;top:0;z-index:1;}
  td.r,th.r{text-align:right;}
  tr.dead{opacity:.4;}
  .price{color:var(--amber);} .have{color:var(--green);} .na{color:var(--dim);}

  /* BOTTOM BAR — cash/debt/bank/guns + action buttons, always visible */
  .market-play .bot-bar{flex:0 0 21%;min-height:118px;max-height:168px;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:6px 10px 7px;display:flex;flex-direction:column;overflow:hidden;}
  .bot-bar{flex:0 0 auto;background:var(--panel);border:1px solid var(--border);
    border-radius:8px;padding:7px 10px 8px;}
  .bot-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px 10px;margin-bottom:4px;flex:1 1 auto;min-height:0;}
  .bot-stat{display:flex;flex-direction:column;justify-content:center;}
  .bot-stat.right{align-items:flex-end;text-align:right;}
  .bot-label{font-size:clamp(.54rem, 2.3vw, .62rem);color:var(--dim);letter-spacing:.3px;line-height:1.1;}
  .market-play .bot-val{font-size:clamp(.88rem, 4.2vw, 1.08rem);line-height:1.15;color:var(--amber);}
  .bot-val{font-size:1.08rem;line-height:1.2;color:var(--amber);}
  .bot-val.red{color:var(--red);}
  .debt-warn{flex:0 0 auto;margin:0 0 4px;padding:0 2px;font-size:clamp(.52rem, 2.2vw, .62rem);
    line-height:1.25;color:var(--amber);text-align:center;letter-spacing:.2px;}
  .market-play .bot-val.dim{font-size:clamp(.72rem, 3.2vw, .88rem);color:var(--text);}
  .bot-val.dim{font-size:.9rem;color:var(--text);}
  .bar{height:4px;background:var(--bartrack);border-radius:3px;margin:3px 0 6px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:var(--green);}
  .market-play .actions{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .market-play .actions button{padding:clamp(7px, 2.2vw, 10px) 6px;font-size:clamp(.68rem, 3vw, .78rem);letter-spacing:.5px;}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .actions button{padding:10px 8px;font-size:.8rem;letter-spacing:.5px;}

  /* other screens that still use .row / .hud */
  .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-end;}
  .hud{flex:0 0 auto;border:1px solid var(--border);border-radius:8px;padding:8px 10px;
    background:var(--panel);font-size:.82rem;line-height:1.4;}
  .hud b{color:var(--amber);} .hud .red{color:var(--red);}
  #crt.title-mode .masthead{display:none;}
  #crt.title-mode{padding:env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px) 0;}
  #crt.title-mode #app{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
  .title-play{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
  .title-screen{position:relative;flex:1 1 auto;min-height:0;width:100%;height:100%;overflow:hidden;}
  .title-screen img{position:absolute;inset:0;width:100%;height:100%;display:block;
    object-fit:fill;user-select:none;-webkit-user-drag:none;pointer-events:none;}
  .title-hit{position:absolute;border:0;background:transparent;cursor:pointer;padding:0;margin:0;
    border-radius:0;min-height:0;min-width:0;}
  .title-hit:focus-visible{outline:2px solid var(--amber);outline-offset:-2px;}
  .title-hit:active:not(:disabled){background:rgba(231,200,121,.14);}
  .title-hit:disabled{cursor:default;pointer-events:none;}
  .title-hit-new{left:3.5%;right:3.5%;top:84.5%;height:7.5%;}
  .title-hit-cont{left:3.5%;width:44.5%;top:91%;height:7.8%;}
  .title-hit-scores{left:52%;width:44.5%;top:91%;height:7.8%;}
  .save-err{text-align:center;color:var(--red);font-size:.72rem;padding:1px 0;}

  button{font-family:inherit;background:var(--btnbg);color:var(--text);border:1px solid var(--btnborder);
    padding:12px 12px;font-size:.84rem;letter-spacing:1px;cursor:pointer;border-radius:7px;}
  button:active{background:var(--green);color:#1a1206;}
  button:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  input:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  button.amber{border-color:var(--amber);color:var(--amber);}
  button.amber:active{background:var(--amber);color:#1a1206;}
  button.red{border-color:var(--red);color:var(--red);}
  button.red:active{background:var(--red);color:#1a0606;}
  button.on{background:var(--green);color:#1a1206;border-color:var(--green);}
  button.full{width:100%;} button:disabled{opacity:.32;}

  .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;margin-bottom:10px;}
  .btns3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.74);display:flex;align-items:center;
    justify-content:center;padding:10px 8px;z-index:100;}
  .card{width:100%;max-width:420px;max-height:92dvh;overflow:hidden;background:var(--panel);
    border:1px solid var(--amber);border-radius:11px;padding:16px;box-shadow:0 12px 46px var(--shadow);}
  .card h2{margin:.1rem 0 .6rem;font-size:1.05rem;color:var(--amber);letter-spacing:2px;}
  .card p{font-size:.88rem;line-height:1.5;margin:.45rem 0;}
  input[type=number]{font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);
    padding:11px;width:100%;font-size:1.1rem;text-align:center;border-radius:7px;margin-top:8px;}
  .qtybtns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:9px 0;}
  .center{text-align:center;}
  .big{font-size:1.8rem;color:var(--amber);text-shadow:var(--glow);margin:.2rem 0;}
  .err{color:var(--red);min-height:1em;font-size:.78rem;margin:.2rem 0;text-align:center;}
  .scr{font-size:.82rem;}
  .ticker{font-size:.72rem;color:var(--dim);letter-spacing:.5px;margin-top:8px;}
  .flavor{font-size:.74rem;color:var(--dim);margin:4px 0 1px;line-height:1.45;overflow:visible;}
  .range{font-size:.6rem;color:var(--dim);line-height:1;display:block;margin-top:1px;}
  .profit{font-size:.78rem;}
  .profit.up{color:var(--green);}
  .profit.down{color:var(--red);}
  .tutorial{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;
    padding:calc(env(safe-area-inset-top, 0px) + 16px) 16px calc(env(safe-area-inset-bottom, 0px) + 16px) 16px;}
  .scores-play{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;gap:8px;}
  .scores-head{flex:0 0 auto;text-align:center;font-size:clamp(.76rem, 3.4vw, .88rem);color:var(--amber);
    letter-spacing:2px;padding:6px 0;border-bottom:1px solid var(--border);}
  .scores-list{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start;gap:1px;
    border:1px solid var(--border);border-radius:8px;padding:6px 8px;background:var(--panel);}
  .scores-empty{flex:1 1 auto;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:.82rem;text-align:center;padding:16px;}
  .scores-foot{flex:0 0 auto;}
  .tutorial .card{border-color:var(--green);max-width:420px;width:100%;}
  .tutorial .card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
  .save-err{text-align:center;color:var(--red);font-size:.72rem;padding:2px 0;}

  /* === END-OF-GAME — locked portrait stack (see docs/ui-standards/end-screen.png) === */
  .eos{flex:1 1 auto;display:flex;flex-direction:column;gap:5px;min-height:0;overflow:hidden;}
  .eos-score-head{flex:0 0 auto;text-align:center;padding:0 2px;}
  .eos-title{font-family:"Didot","Bodoni MT","Playfair Display",Georgia,serif;
    font-size:clamp(.62rem,2.8vw,.72rem);color:var(--dim);letter-spacing:3px;margin:0 0 2px;}
  .eos-amount-wrap{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:6px;margin:0 0 4px;}
  .eos-gun{flex:0 0 auto;width:clamp(28px,8vw,40px);height:auto;display:block;
    image-rendering:pixelated;image-rendering:crisp-edges;filter:brightness(1.1);}
  .eos-gun-r{transform:scaleX(-1);}
  .eos-amount{flex:1 1 auto;font-size:clamp(1.05rem,5.2vw,1.55rem);color:var(--amber);font-weight:900;
    text-align:center;letter-spacing:.5px;line-height:1.1;min-width:0;}
  .eos-rule{height:0;border:none;border-top:1px solid var(--border);margin:0 0 4px;}
  .eos-scores{flex:1 1 0;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
  .eos-hs-header{flex:0 0 auto;font-size:clamp(.52rem,2.4vw,.6rem);color:var(--dim);letter-spacing:2px;
    text-align:center;margin-bottom:2px;}
  .eos-rows{flex:1 1 0;overflow:hidden;min-height:0;display:flex;flex-direction:column;justify-content:flex-start;gap:0;}
  .eos-row{display:flex;align-items:baseline;gap:2px;padding:1px 0;font-size:clamp(.58rem,2.6vw,.68rem);line-height:1.25;}
  .eos-pos{flex:0 0 1.8em;text-align:right;color:var(--dim);padding-right:2px;}
  .eos-name{flex:0 0 auto;color:var(--amber);letter-spacing:.3px;white-space:nowrap;}
  .eos-fill{flex:1 1 auto;overflow:hidden;color:var(--dim);white-space:nowrap;padding:0 2px;}
  .eos-fill::before{content:'·················································';}
  .eos-val{flex:0 0 auto;color:var(--text);white-space:nowrap;}
  .eos-tag{flex:0 0 auto;font-size:clamp(.5rem,2.2vw,.56rem);color:var(--amber);letter-spacing:.5px;padding-left:2px;}
  .eos-row.you .eos-name,.eos-row.you .eos-val{color:var(--amber);}
  .eos-rows .eos-row.you{background:rgba(231,200,121,.07);}
  .eos-you-box{flex:0 0 auto;border:1px solid var(--amber);border-radius:3px;padding:3px 6px;margin-top:2px;}
  .eos-card{flex:1 1 0;min-height:72px;max-height:38%;display:flex;align-items:center;justify-content:center;
    padding:2px;border:1px solid var(--amber);border-radius:4px;background:#000;overflow:hidden;}
  .eos-card img{width:100%;height:100%;object-fit:contain;display:block;}
  .eos-btns{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:2px;}
  .eos-btns button{font-size:clamp(.66rem,2.8vw,.74rem);padding:9px 4px;letter-spacing:.5px;}

  /* === EVENT POPUP — locked standard: full-bleed left art (see docs/ui-standards/popup.png) === */
  .modal .ev-popup{width:100%;}
  .ev-popup{display:grid;grid-template-columns:1fr 1fr;align-items:stretch;width:100%;
    max-width:min(520px, 100%);max-height:88dvh;
    border:1px solid var(--amber);border-radius:12px;overflow:hidden;
    background:var(--bg);box-shadow:0 12px 46px var(--shadow);}
  .ev-left{grid-column:1;align-self:stretch;min-height:0;min-width:0;overflow:hidden;padding:2px;margin:0;
    box-sizing:border-box;background-color:#000;background-size:contain;background-position:center center;
    background-repeat:no-repeat;background-origin:content-box;background-clip:content-box;
    filter:brightness(1.1);}
  .ev-right{grid-column:2;display:flex;flex-direction:column;padding:14px 13px 12px;
    border-left:1px solid var(--amber);min-height:0;min-width:0;}
  .ev-body{flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    font-size:.88rem;line-height:1.6;color:var(--text);text-align:center;overflow-y:auto;}
  .ev-body b{color:var(--amber);}
  .ev-acts{flex:0 0 auto;display:flex;flex-direction:column;gap:7px;margin-top:12px;}
  .ev-acts button{font-size:.8rem;padding:10px 8px;letter-spacing:.5px;}
  .ev-status{font-size:.8rem;color:var(--dim);text-align:center;margin-bottom:4px;}
  .ev-warn{font-size:.72rem;color:var(--dim);text-align:center;margin-top:4px;}

  /* === PORTRAIT ONLY — portrait layout fixed; rotate viewport on touch landscape === */
  #portrait-root{width:100%;height:100%;min-height:0;}
  @media (orientation:landscape) and (pointer:coarse){
    html,body{overflow:hidden;}
    #portrait-root{position:fixed;top:0;left:0;width:100vh;height:100vw;
      transform:rotate(-90deg) translateX(-100%);transform-origin:top left;}
  }
</style>
</head>
<body>
<div id="portrait-root">
<div id="crt">
  <div class="masthead">
    <h1 class="serif">GANG WARS</h1>
  </div>
  <div id="app"></div>
</div>
</div>

<script src="engine.js"></script>
<script>
if (typeof document !== "undefined") {
(function lockPortrait(){
  const tryLock = () => {
    const o = screen.orientation;
    if (!o || typeof o.lock !== "function") return;
    o.lock("portrait").catch(() => {});
  };
  tryLock();
  window.addEventListener("orientationchange", tryLock);
  document.addEventListener("click", tryLock, { once: true, passive: true });
})();
(function(){
  const app = document.getElementById("app");
  const SAVE_KEY = "gw:save", HS_KEY = "gw:highscores";
  let S = null, modal = null;
  const money = n => "$"+Math.round(n).toLocaleString("en-US");
  const TITLE_SCREEN = "title-screen.png";
  const DISTRICT_IMG = {
    "Little Italy":       "assets/little-italy.png",
    "Dock #13":           "assets/dock-13.png",
    "Kitty Kat Club":     "assets/kitty-kat-club.png",
    "Uptown":             "assets/uptown.png",
    "Warehouse District": "assets/warehouse-district.png",
    "City Hall":          "assets/city-hall.png",
  };
  const GOODS_IMG = Object.fromEntries(DRUGS.map(d => [d.id, `assets/goods/${d.id}.png`]));
  const TRAVEL_FLAVOR = {
    "Little Italy":       "The heart of old-world power. Respect matters more than money here.",
    "Dock #13":           "Smugglers' Paradise. High-risk trading and black-market goods rule these foggy docks.",
    "Kitty Kat Club":     "Jazz, gin & secrets. Information is as valuable as cash in this speakeasy district.",
    "Uptown":             "Where the money lives. Bigger profits, bigger customers, and bigger targets.",
    "Warehouse District": "Industry and opportunity. Bulk goods and underground operations move big money here.",
    "City Hall":          "The seat of power. Bribes, favors, and connections open every door.",
  };



  function save(){
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }
    catch(e){
      const el = document.getElementById("save-err");
      if(el) el.textContent = "Could not save — storage may be full or disabled.";
    }
  }
  const TUTORIAL_KEY = "gw:tutorialDone";
  function load(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return null;
      return migrateSave(JSON.parse(raw));
    }catch(e){ return null; }
  }
  function highscores(){ try{ return JSON.parse(localStorage.getItem(HS_KEY))||[]; }catch(e){ return []; } }
  function pushScore(score, worth){
    const hs = highscores();
    const entry = {score, worth, date:new Date().toISOString().slice(0,10)};
    hs.push(entry);
    hs.sort((a,b)=>b.worth-a.worth);
    const pos = hs.indexOf(entry) + 1; // exact-ref find works even with duplicate values
    localStorage.setItem(HS_KEY, JSON.stringify(hs.slice(0,10).map(({score:s,worth:w,date:d})=>({score:s,worth:w,date:d}))));
    return pos;
  }
  function rankCard(r){ return r.toLowerCase().replace(/ /g,'-'); }
  function logMsg(t){ S.log.unshift(`Day ${S.day}: ${t}`); S.log = S.log.slice(0,12); }
  function afterMarketAction(msg){
    const stall = tickStallPressure(S);
    if (stall){
      if (S.over){ endGame(stall); return; }
      logMsg(stall);
    }
    if (msg) logMsg(msg);
    save();
  }

  function mkScoreRow(h, i, isYou){
    const tag = isYou ? `<span class="eos-tag">← YOU</span>` : '';
    return `<div class="eos-row${isYou ? ' you' : ''}">
      <span class="eos-pos">${i + 1}.</span>
      <span class="eos-name">${getRank(h.score).toUpperCase()}</span>
      <span class="eos-fill"></span>
      <span class="eos-val">${money(h.worth)}</span>${tag}</div>`;
  }

  function bindModalCard(card){
    if(!card) return;
    card.setAttribute("role","dialog");
    card.setAttribute("aria-modal","true");
    const h2 = card.querySelector("h2");
    if(h2 && !card.getAttribute("aria-labelledby")) card.setAttribute("aria-labelledby", h2.id || (h2.id = "modal-title"));
  }
  function dismissModal(){
    modal = null;
    modalEscape = null;
    render();
  }
  let modalEscape = null;
  document.addEventListener("keydown", e=>{
    if(e.key !== "Escape" || !modal) return;
    e.preventDefault();
    if (modalEscape) modalEscape();
    else dismissModal();
  });



  /* ── Market event toast bodies (user-selected variants) ── */
  const ANOMALY_BODIES = {
    spike:[
      `The Feds hit three stash houses overnight. {ITEM} has vanished from the streets. Name your price.`,
      `The Feds have been busy. Half the city's {ITEM} is sitting in an evidence locker downtown. Prices just went through the roof.`,
      `Nobody knows how the Feds knew where to look. Somebody talked. Now {ITEM} is gone and everyone's pointing fingers at each other.`,
      `Word is the Feds have a new list and every name on it dealt in {ITEM}. The smart ones cleared out. What's left on the street is selling for a king's ransom.`,
    ],
    surge:[
      `Word spread fast — there's a shortage of {ITEM} and the clubs are in a panic. Prices are going wild.`,
      `A tipping point hit the market hard. {ITEM} is moving at prices nobody would have believed yesterday. Get in while it lasts.`,
      `Two suppliers got cold feet and pulled out overnight. What little {ITEM} remains is being fought over and the price shows it.`,
      `Rothstein's old network collapsed overnight and took half the city's {ITEM} supply with it. What's left is being fought over at prices nobody saw coming.`,
    ],
    flood:[
      `A hijacked shipment of {ITEM} got scattered across the docks. Someone's offloading it fast and cheap.`,
      `Someone's liquidating fast. A full shipment of {ITEM} just flooded the street and the price has collapsed. Move quickly.`,
      `A deal went badly wrong last night. The survivor is offloading {ITEM} at any price just to disappear. Get in before he does.`,
      `Big Bill Thompson bet the city's impounded {ITEM} stockpile on a boxing match. The wrong man won. It's all hitting the street at once and nobody in City Hall is admitting anything.`,
    ],
  };

  function maybeTutorial(){
    if(localStorage.getItem(TUTORIAL_KEY)) return;
    const steps = [
      {title:"THE DON'S DEBT", body:`Your debt compounds at 8% every day you travel. Pay him down at Little Italy before it eats your profits — the Don caps total debt at ${money(CONFIG.maxTotalDebt)}.`},
      {title:"THE FAMILY VAULT", body:`Bank your cash at Little Italy only. Savings earn ${Math.round(CONFIG.bankInterest*100)}% daily — plus a ${Math.round(CONFIG.conservativeBankBonus*100)}% bonus when your debt is under half the cap.`},
      {title:"PACK HEAT", body:"Feds show up on the road. Buy guns when offered — without one, you can only run or bribe."},
      {title:"LOOSE CASH", body:"Muggings hit harder when you're carrying a lot of cash. Bank it at Little Italy before you travel — the streets notice a fat wallet."},
    ];
    let step = 0;
    function hideTutorial(){
      document.getElementById("tutorial-overlay")?.remove();
    }
    function finishTutorial(){
      localStorage.setItem(TUTORIAL_KEY, "1");
      hideTutorial();
      modal = null;
      modalEscape = null;
      render();
    }
    function showStep(){
      if(step >= steps.length){
        finishTutorial();
        return;
      }
      const s = steps[step];
      let el = document.getElementById("tutorial-overlay");
      if(!el){
        el = document.createElement("div");
        el.id = "tutorial-overlay";
        document.body.appendChild(el);
      }
      el.className = "tutorial";
      el.setAttribute("role", "dialog");
      el.setAttribute("aria-modal", "true");
      el.innerHTML = `<div class="card">
          <p class="na">Tip ${step+1}/${steps.length}</p>
          <h2 id="modal-title">${s.title}</h2><p>${s.body}</p>
          <div class="card-actions">
            <button type="button" id="tskip">SKIP</button>
            <button type="button" class="amber" id="tnext">${step===steps.length-1?"PLAY":"NEXT"}</button>
          </div>
        </div>`;
      el.querySelector("#tnext").onclick = ()=>{ step++; showStep(); };
      el.querySelector("#tskip").onclick = finishTutorial;
      modal = ()=>{};
      modalEscape = finishTutorial;
    }
    showStep();
  }

  function render(){
    const crt = document.getElementById("crt");
    if (modal){ crt.classList.remove("title-mode"); crt.classList.add("game-mode"); modal(); return; }
    if (!S){ crt.classList.add("title-mode"); crt.classList.remove("game-mode"); renderTitle(); return; }
    crt.classList.remove("title-mode"); crt.classList.add("game-mode");
    if (S.over){ renderGameOver(); return; }
    renderMarket();
  }

  function renderTitle(){
    const saved = load();
    app.innerHTML = `<div class="play title-play">
      <div class="title-screen">
        <img src="${TITLE_SCREEN}" alt="Gang Wars — Prohibition 1929">
        <button type="button" class="title-hit title-hit-new" id="new" aria-label="New Game"></button>
        <button type="button" class="title-hit title-hit-cont" id="cont" aria-label="Continue" ${saved?"":"disabled"}></button>
        <button type="button" class="title-hit title-hit-scores" id="scores" aria-label="High Scores"></button>
      </div>
    </div>`;
    document.getElementById("new").onclick = ()=>{ S=newGame(); save(); render(); maybeTutorial(); };
    document.getElementById("cont").onclick = ()=>{ const v=load(); if(v){ S=v; render(); maybeTutorial(); } };
    document.getElementById("scores").onclick = renderScores;
  }

  function renderScores(){
    document.getElementById("crt").classList.remove("title-mode");
    document.getElementById("crt").classList.add("game-mode");
    const hs = highscores().slice(0, 10);
    const rows = hs.length
      ? hs.map((h, i) => mkScoreRow(h, i, false)).join("")
      : `<div class="scores-empty">No finished runs yet. The streets are waiting.</div>`;
    app.innerHTML = `<div class="play scores-play">
      <div class="scores-head">— TOP EARNERS —</div>
      <div class="scores-list">${rows}</div>
      <div class="scores-foot"><button class="full" id="back">BACK</button></div>
    </div>`;
    document.getElementById("back").onclick = render;
  }

  function renderMarket(){
    const used = spaceUsed(S.inventory);
    const rows = DRUGS.map(d=>{
      const p = S.prices[d.id]; const have = S.inventory[d.id]||0;
      const dead = p==null;
      return `<div class="market-row${dead?' dead':''}">
        <div class="goods-cell">
          <img class="goods-icon" src="${GOODS_IMG[d.id]}" alt="${d.name}">
          <span class="goods-name">${d.name}</span>
        </div>
        <span class="price-cell${dead?' na':''}">${dead?'—':money(p)}</span>
        <span class="hold-cell${have?' have':''}">${have||'—'}</span>
        <div class="market-actions">
          ${have?`<button class="amber" data-sell="${d.id}">SELL</button>`:''}
          <button data-buy="${d.id}" ${dead?'disabled':''}>BUY</button>
        </div>
      </div>`;
    }).join("");
    const goldenActive = S.events?.goldenGodlike && S.day === S.events.goldenGodlike.day;
    app.innerHTML = `<div class="play market-play">
      <div class="loc-header">
        <img src="${DISTRICT_IMG[S.location]||DISTRICT_IMG[HOME]}" alt="${S.location}">
        <div class="loc-header-body">
          <div class="loc-header-title">${S.location}</div>
          <div class="loc-header-day">Day ${S.day} / ${CONFIG.days}</div>
          <div class="loc-header-desc">${LOCATION_FLAVOR[S.location]||""}</div>
        </div>
      </div>
      <div class="market-mid">
        ${goldenActive?'<div class="market-golden-banner" role="status">✦ Golden Shower — every price in the city ×10 ✦</div>':''}
        <div class="market-head">
          <span class="market-head-title">MARKET</span>
        </div>
        <div class="market-cols">
          <span>Goods</span><span>Price</span><span>Hold</span><span></span>
        </div>
        <div class="market-rows">${rows}</div>
        <div class="actlog" aria-live="polite">▶ ${S.log[0]||'The streets are quiet.. for now.'}${S.log[1]?`<br><span style='opacity:.6'>▶ ${S.log[1]}</span>`:''}</div>
      </div>
      <div class="bot-bar">
        <div class="bot-stats">
          <div class="bot-stat"><span class="bot-label">CASH</span><span class="bot-val">${money(S.cash)}</span></div>
          <div class="bot-stat right"><span class="bot-label">DON DEBT</span><span class="bot-val red">${money(S.debt)}</span></div>
          <div class="bot-stat"><span class="bot-label">BANK</span><span class="bot-val dim">${money(S.bank)}</span></div>
          <div class="bot-stat right"><span class="bot-label">GUNS</span><span class="bot-val dim">${S.guns}</span></div>
          <div class="bot-stat"><span class="bot-label">STASH</span><span class="bot-val dim">${used}/${S.space}</span></div>
          <div class="bot-stat right"><span class="bot-label">HP</span><span class="bot-val dim">${S.health}/${CONFIG.startHealth}</span></div>
        </div>
        ${S.debt>=CONFIG.maxTotalDebt*0.9?'<p class="debt-warn" role="status">The Don is losing patience, get in over $100k and its curtains</p>':''}
        <p class="save-err" id="save-err" role="alert"></p>
        <div class="actions">
          <button class="amber" id="travel">MOVE ▶</button>
          <button id="bankbtn" ${S.location===HOME?'':'disabled'}>THE DON / BANK</button>
        </div>
      </div>
    </div>`;
    app.querySelectorAll("[data-buy]").forEach(b=> b.onclick=()=>openTrade(b.dataset.buy,"buy"));
    app.querySelectorAll("[data-sell]").forEach(b=> b.onclick=()=>openTrade(b.dataset.sell,"sell"));
    document.getElementById("travel").onclick = renderTravel;
    const bk=document.getElementById("bankbtn"); if(bk && S.location===HOME) bk.onclick = openBank;
    save();
  }

  /* ---------- trade — single mode (buy OR sell), opened via inline row button ---------- */
  function openTrade(id, mode){
    const d = DRUG[id]; const price = S.prices[id];
    const maxFor = ()=> mode==="buy"
      ? Math.min(Math.floor(S.cash/price), spaceLeft(S))
      : (S.inventory[id]||0);
    let qty = maxFor();
    modal = function(){
      const max = maxFor(); if(qty>max) qty=max;
      const avg = mode==="sell" ? avgCost(S,id) : null;
      const pct = mode==="sell" ? profitPct(S,id,price) : null;
      app.innerHTML = `<div class="modal"><div class="card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">${mode==="buy"?"BUY":"SELL"} ${d.name}</h2>
        <p>Price <span class="price">${money(price)}</span> each ·
          <span class="range">typical ${money(d.low)}–${money(d.high)}</span><br>
          ${mode==="buy"?`can afford ${max}`:`you hold ${S.inventory[id]||0}`}</p>
        ${avg!=null?`<p class="profit ${pct>=0?'up':'down'}">Avg cost ${money(avg)} · ${pct>=0?'+':''}${pct}%</p>`:''}
        <label for="qty" class="na">Quantity</label>
        <input type="number" id="qty" min="0" max="${max}" value="${qty}" inputmode="numeric" aria-label="Quantity" />
        <div class="qtybtns">
          <button data-q="1">+1</button><button data-q="10">+10</button>
          <button data-q="half">½</button><button data-q="max">MAX</button>
        </div>
        <p class="center">Total <span class="price" id="tot">${money(price*qty)}</span></p>
        <p class="err" id="terr"></p>
        <div class="btns">
          <button class="amber" id="confirm">${mode==="buy"?"BUY":"SELL"} ${qty}</button>
          <button id="cancel">CLOSE</button>
        </div>
      </div></div>`;
      const input=document.getElementById("qty"), tot=document.getElementById("tot");
      const conf=document.getElementById("confirm");
      const setQ=v=>{ qty=Math.max(0,Math.min(maxFor(),Math.floor(v||0))); input.value=qty;
        tot.textContent=money(price*qty); conf.textContent=`${mode==="buy"?"BUY":"SELL"} ${qty}`; };
      input.oninput=()=>setQ(+input.value);
      app.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>{ const q=b.dataset.q;
        setQ(q==="max"?maxFor():q==="half"?Math.floor(maxFor()/2):qty+(+q)); });
      bindModalCard(app.querySelector(".card"));
      document.getElementById("cancel").onclick=dismissModal;
      conf.onclick=()=>{
        const err = mode==="buy"?buy(S,id,qty):sell(S,id,qty);
        if(err){ document.getElementById("terr").textContent=err; return; }
        afterMarketAction(`${mode==="buy"?"Bought":"Sold"} ${qty} ${d.name}.`); modal=null; render();
      };
    };
    render();
  }

  /* ---------- the Don & the bank (in-DOM inputs) ---------- */
  function openBank(){
    let action = null;
    modal = function(){
      const A = {
        repay:    {label:"Pay the Don", max:Math.min(S.cash,S.debt), fn:v=>bankRepay(S,v), msg:v=>`Paid the Don ${money(v)}.`},
        borrow:   {label:"Borrow",      max:maxBorrowAmount(S),      fn:v=>bankBorrow(S,v), msg:v=>`Borrowed ${money(v)} from the Don.`},
        deposit:  {label:"Deposit",     max:S.cash,                  fn:v=>bankDeposit(S,v), msg:v=>`Banked ${money(v)}.`},
        withdraw: {label:"Withdraw",    max:S.bank,                  fn:v=>bankWithdraw(S,v), msg:v=>`Withdrew ${money(v)}.`},
      };
      if(!action){
        app.innerHTML = `<div class="modal"><div class="card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
          <h2 id="modal-title">THE FAMILY VAULT</h2>
          <p>Your debt to the Don stands at <b class="red">${money(S.debt)}</b> — and it's climbing ${Math.round(CONFIG.loanInterest*100)}%/day.</p>
          <p>Bank <b>${money(S.bank)}</b> <span class="na">(+${Math.round(effectiveBankInterest(S)*100)}%/day)</span> · Cash <b>${money(S.cash)}</b></p>
          <p class="na">The Don caps total debt at ${money(CONFIG.maxTotalDebt)}.</p>
          <div class="btns">
            <button class="amber" data-a="repay" ${S.debt>0&&S.cash>0?'':'disabled'}>SETTLE UP</button>
            <button data-a="borrow" ${maxBorrowAmount(S)>0?'':'disabled'}>BORROW</button>
            <button data-a="deposit" ${S.cash>0?'':'disabled'}>DEPOSIT</button>
            <button data-a="withdraw" ${S.bank>0?'':'disabled'}>WITHDRAW</button>
          </div>
          <button class="full" id="close" style="margin-top:10px">DONE</button>
        </div></div>`;
        app.querySelectorAll("[data-a]").forEach(b=> b.onclick=()=>{ action=b.dataset.a; render(); });
        bindModalCard(app.querySelector(".card"));
        document.getElementById("close").onclick=dismissModal;
      } else {
        const a=A[action]; let qty=a.max>0?a.max:0;
        app.innerHTML = `<div class="modal"><div class="card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
          <h2 id="modal-title">${a.label.toUpperCase()}</h2>
          <p>Max <span class="price">${money(a.max)}</span> · Cash ${money(S.cash)}</p>
          <label for="amt" class="na">Amount</label>
          <input type="number" id="amt" min="0" max="${a.max}" value="${qty}" inputmode="numeric" aria-label="Amount" />
          <div class="qtybtns">
            <button data-q="1000">+1k</button><button data-q="10000">+10k</button>
            <button data-q="half">½</button><button data-q="max">MAX</button>
          </div>
          <div class="btns"><button class="amber" id="ok">CONFIRM</button><button id="back">BACK</button></div>
          <p class="err" id="berr"></p>
        </div></div>`;
        const input=document.getElementById("amt");
        const setQ=v=>{ qty=Math.max(0,Math.min(a.max,Math.floor(v||0))); input.value=qty; document.getElementById("berr").textContent=""; };
        input.oninput=()=>setQ(+input.value);
        app.querySelectorAll("[data-q]").forEach(b=> b.onclick=()=>{ const q=b.dataset.q;
          setQ(q==="max"?a.max:q==="half"?Math.floor(a.max/2):qty+(+q)); });
        bindModalCard(app.querySelector(".card"));
        document.getElementById("back").onclick=()=>{ action=null; render(); };
        document.getElementById("ok").onclick=()=>{
          if(qty<=0){ document.getElementById("berr").textContent="Enter an amount."; return; }
          const err = a.fn(qty);
          if(err){ document.getElementById("berr").textContent=err; return; }
          afterMarketAction(a.msg(qty));
          action=null; render();
        };
      }
    };
    render();
  }

  /* ---------- move + day events ---------- */
  function renderTravel(){
    modal = function(){
      app.innerHTML = `<div class="play travel-play">
        <div class="travel-screen" role="dialog" aria-modal="true" aria-labelledby="travel-title">
        <div class="travel-head">
          <img src="assets/travel-car.png" alt="On the move">
          <div class="travel-head-body">
            <div class="travel-head-title" id="travel-title">ON THE MOVE</div>
            <div class="travel-head-sub">Pick your next territory. Moving costs you day.</div>
          </div>
        </div>
        <div class="travel-list">
        ${LOCATIONS.map(l=>{
          const here = l === S.location;
          return `<button type="button" class="travel-row${here?' here':''}" data-go="${l}" ${here?'disabled aria-disabled="true"':''} aria-label="${here?'Current location: ':'Travel to '}${l}">
            <img src="${DISTRICT_IMG[l]}" alt="${l}">
            <span class="travel-row-body">
              <span class="travel-row-name">${l}</span>
              <span class="travel-row-desc">${TRAVEL_FLAVOR[l]||""}</span>
            </span>
          </button>`;
        }).join("")}
        </div>
        <div class="travel-foot">
          <button type="button" class="full" id="cancel">GO BACK</button>
        </div>
        </div>
      </div>`;
      app.querySelectorAll("[data-go]:not([disabled])").forEach(b=> b.onclick=()=> travelTo(b.dataset.go));
      document.getElementById("cancel").onclick=dismissModal;
    };
    render();
  }
  function travelTo(dest){
    modal=null; S.location=dest; S.day+=1;
    const capMsg = applyDailyInterest(S);
    if (capMsg){ endGame(capMsg); return; }
    if (S.day > CONFIG.days){ endGame(); return; }
    const { prices, anomaly, sr, gk, golden, re } = resolveTravelMarket(S, dest);
    S.prices = prices;
    if (LOCATION_FLAVOR[dest]) logMsg(`Arrived in ${dest}. ${LOCATION_FLAVOR[dest]}`);

    let marketEvent=null;
    if(golden && S.day===golden.day){
      const goldenImg=golden.img||'bigdaddy';
      marketEvent=(next)=>showEvent(goldenImg, `<b>${golden.lines[0]}</b><br><br>${golden.lines[1]} Every price in the city is climbing.`, 'GOLDEN', next);
    } else if(gk && S.day===gk.day){
      const gkImg=gk.img||'bigdaddy';
      if(dest===gk.district){
        marketEvent=(next)=>showEvent(gkImg, `<b>${gk.lines[0]}</b><br><br>${gk.lines[1]}`, 'BIG DADDY J', next);
      } else {
        marketEvent=(next)=>showEvent(gkImg, `<b>BIG DADDY J IS ACROSS TOWN</b><br><br>He's making moves in ${gk.district}. Every price there is climbing.`, 'NOTED', next);
      }
    } else if(sr && S.day===sr.day){
      const srImg=sr.img||'celeb';
      if(dest===sr.district){
        marketEvent=(next)=>showEvent(srImg, `<b>${sr.lines[0]}</b><br><br>${sr.lines[1]} Every price in the district is climbing.`, "LET'S GO", next);
      } else {
        marketEvent=(next)=>showEvent(srImg, `<b>${sr.lines[0]}</b><br><br>${sr.lines[1]} Head to ${sr.district} for the action.`, 'NOTED', next);
      }
    } else if(re && S.day===re.day){
      const reDrug=DRUG[re.commodity];
      const reImg=re.img||'intel';
      if(dest===re.district){
        marketEvent=(next)=>showEvent(reImg, `<b>${re.lines[0]}</b><br><br>${re.lines[1]}`, 'INTERESTING', next);
      } else if(reDrug){
        marketEvent=(next)=>showEvent(reImg, `<b>${re.lines[0]}</b><br><br>${re.lines[1]} ${reDrug.name} surging in ${re.district}.`, 'NOTED', next);
      }
    } else if(anomaly){
      const anomalyImg={spike:'shortage',surge:'frenzy',flood:'flood'};
      const body=pick(ANOMALY_BODIES[anomaly.type]).replace(/{ITEM}/g, anomaly.itemName);
      marketEvent=(next)=>showEvent(anomalyImg[anomaly.type], body, 'NOTED', next);
    }

    runTravelEvents(()=>{ render(); }, marketEvent);
  }
  function runTravelEvents(done, firstEvent){
    const queue=[];
    if(firstEvent) queue.push(firstEvent);
    const candidates=[];
    if (chance(1/12)) candidates.push(eventMugging);
    if (chance(1/12)) candidates.push(eventFind);
    if (chance(1/7))  candidates.push(eventStash);
    if (chance(1/7))  candidates.push(eventGun);
    if (chance(1/7))  candidates.push(eventFeds);
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    queue.push(...candidates.slice(0, CONFIG.maxTravelEvents));
    let i=0; const next=()=>{ if(S.over)return; if(i>=queue.length){ save(); done(); return; } queue[i++](next); };
    next();
  }
  const EV_IMG={
    feds:     'events/the_feds.png',
    mugging:  'events/ambushed_rolled.png',
    find:     'events/dead_drop.png',
    gun:      'events/packing_iron.png',
    stash:    'events/upgrade_available.png',
    shortage: 'events/shortage.png',
    frenzy:   'events/buying_frenzy.png',
    flood:    'events/flooded_market.png',
    celeb:    'events/super_rare_event.png',
    intel:    'events/rare_event_intel.png',
    bigdaddy: 'cards/big-daddy-j.png',
  };

  function eventImgSrc(imgKeyOrPath){
    if (typeof imgKeyOrPath === 'string' && imgKeyOrPath.includes('/')) return imgKeyOrPath;
    return EV_IMG[imgKeyOrPath] || EV_IMG.intel;
  }

  /* Single-button event popup with split image/text layout */
  function showEvent(imgKey, body, btn, cb){
    modal=function(){
      app.innerHTML=`<div class="modal"><div class="ev-popup" role="dialog" aria-modal="true">
        <div class="ev-left" style="background-image:url('${eventImgSrc(imgKey)}')" role="img" aria-label="Event illustration"></div>
        <div class="ev-right">
          <div class="ev-body"><div>${body}</div></div>
          <div class="ev-acts"><button class="amber full" id="ok">${btn||'OK'}</button></div>
        </div>
      </div></div>`;
      const advance = ()=>{ modal=null; modalEscape=null; cb(); };
      document.getElementById("ok").onclick=advance;
      modalEscape = advance;
    };
    render();
  }

  /* Two-button choice popup (BUY/PASS style) */
  function showEventAsk(imgKey, body, yesLabel, onYes, noLabel, onNo){
    modal=function(){
      app.innerHTML=`<div class="modal"><div class="ev-popup" role="dialog" aria-modal="true">
        <div class="ev-left" style="background-image:url('${eventImgSrc(imgKey)}')" role="img" aria-label="Event illustration"></div>
        <div class="ev-right">
          <div class="ev-body"><div>${body}</div></div>
          <div class="ev-acts">
            <button class="amber full" id="yes">${yesLabel}</button>
            <button class="full" id="no">${noLabel}</button>
          </div>
        </div>
      </div></div>`;
      const yes = ()=>{ modal=null; modalEscape=null; onYes(); };
      const pass = ()=>{ modal=null; modalEscape=null; onNo(); };
      document.getElementById("yes").onclick=yes;
      document.getElementById("no").onclick=pass;
      modalEscape = pass;
    };
    render();
  }

  /* Legacy plain-card toast (used by bank/Don modals — no image) */
  function toast(title, body, btn, cb){
    modal=function(){
      app.innerHTML=`<div class="modal"><div class="card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">${title}</h2><p>${body}</p>
        <button class="full amber" id="ok">${btn||"OK"}</button>
      </div></div>`;
      bindModalCard(app.querySelector(".card"));
      document.getElementById("ok").onclick=()=>{ modal=null; modalEscape=null; cb(); };
    };
    render();
  }
  function eventMugging(next){
    const loss=Math.min(S.cash, randInt(50, Math.max(100, Math.round(S.cash*0.15))));
    S.cash-=loss; logMsg(`Ambushed — lost ${money(loss)}.`);
    const mugV = pick([
      ["AMBUSHED",        `Someone knew you were coming. You took a beating and lost ${money(loss)} before you could run.`],
      ["ROLLED",          `A welcoming committee was waiting around the corner. They were fast, organised, and ${money(loss)} richer when they left.`],
      ["CLASSIC MISTAKE", `You stopped to help a man who'd dropped his groceries. His friend took ${money(loss)} from your coat. The groceries were fake. The money was real.`],
      ["SENT A MESSAGE",  `This wasn't random. Someone paid to have you roughed up and ${money(loss)} lifted. You need to think about who.`],
      ["OUTSMARTED",      `You were robbed by a man pretending to be a lamppost. In hindsight the signs were there. ${money(loss)} gone and your pride in tatters.`],
      ["CAPONE'S REGARDS",`A man in a very good suit handed you an envelope and took ${money(loss)} from your coat. He said Mr Capone sends his regards. You didn't argue.`],
    ]);
    showEvent('mugging', mugV[1], "DAMN", next);
  }
  function eventFind(next){
    if (spaceLeft(S)<=0){ next(); return; }
    const d=pick(DRUGS); const n=Math.min(spaceLeft(S), randInt(2,7));
    S.inventory[d.id]=(S.inventory[d.id]||0)+n; logMsg(`Dead drop — picked up ${n} ${d.name}.`);
    const findV = pick([
      ["DEAD DROP",             `Someone left a stash and never came back. You help yourself to <b>${n} ${d.name}</b> before anyone's the wiser.`],
      ["VALENTINE'S LEFTOVERS", `Whatever went down in that garage on Clark Street, the men who stashed these <b>${n} ${d.name}</b> won't be collecting them. You will.`],
      ["GENNA BROTHERS' GIFT",  `The Gennas are finished and their operation is scattered to the wind. <b>${n} ${d.name}</b> left in a Cicero warehouse with no one left to claim it.`],
    ]);
    showEvent('find', findV[1], "NICE", next);
  }
  function eventStash(next){
    const add=pick([10,15,20,30]); const cost=add*randInt(90,110);
    if (S.cash<cost){ next(); return; }
    const sv=pick([
      `A mechanic at the yard can fit <b>+${add}</b> extra hidden crates into your vehicle for <span class="price">${money(cost)}</span>. Do it?`,
      `A Ford engineer — allegedly — offers to modify your Model T with <b>+${add}</b> hidden crates for <span class="price">${money(cost)}</span>. He claims Mr Ford himself suggested the design. This is almost certainly not true.`,
      `A grease-stained man slides a card across the bar. Says he can build <b>+${add}</b> hidden crates into your vehicle for <span class="price">${money(cost)}</span>. Doesn't ask what you're carrying. Doesn't want to know.`,
    ]);
    showEventAsk('stash', sv, 'BUY',
      ()=>{ S.cash-=cost; S.space+=add; logMsg(`+${add} stash space.`); modal=null; next(); },
      'PASS', ()=>{ modal=null; next(); }
    );
  }
  function eventGun(next){
    if (S.guns >= CONFIG.maxGuns){ next(); return; }
    const base=randInt(1500,2500);
    const cost=gunEventCost(base, S.guns);
    if (S.cash<cost){ next(); return; }
    const gv=pick([
      `Someone's selling out of a bag in the alley. Clean piece, <span class="price">${money(cost)}</span>. The Feds won't wait for you to be unarmed.`,
      `A man claims he's moving hardware left over from one of Capone's operations. Clean piece, <span class="price">${money(cost)}</span>, no serial number. Take it or leave it.`,
      `A contact with War Department connections is quietly moving government-issue hardware. <span class="price">${money(cost)}</span> gets you something Eliot Ness himself would respect.`,
      `The piece on the table has a history you don't want to know about. <span class="price">${money(cost)}</span>, no questions, no paperwork. In this city that's a bargain.`,
      `Ness's boys confiscated these from the Circus Café last Tuesday. By Wednesday they were back on the street. <span class="price">${money(cost)}</span> and it's yours. Don't ask how.`,
    ]);
    showEventAsk('gun', gv, 'BUY',
      ()=>{ S.cash-=cost; S.guns+=1; logMsg(`Bought a gun.`); modal=null; next(); },
      'PASS', ()=>{ modal=null; next(); }
    );
  }
  /* Feds encounter — same combat math as the original cop fight */
  function eventFeds(next){
    let maxCops = 1 + Math.min(3, Math.floor(S.day / 8));
    if (S.day > 20) maxCops += 1;
    let cops = randInt(1, maxCops);
    let fightRound = 0;
    const bribeScale = S.day > 20 ? 1.5 : 1;
    const draw=(msg)=>{
      modal=function(){
        const canFight=S.guns>0;
        app.innerHTML=`<div class="modal"><div class="ev-popup" role="dialog" aria-modal="true">
          <div class="ev-left" style="background-image:url('${EV_IMG.feds}')" role="img" aria-label="The Feds"></div>
          <div class="ev-right">
            <div class="ev-body"><div>
              Agent Hayes spotted you — <b>${cops}</b> ${cops>1?'agents':'agent'} closing in.<br><br>
              HP: <b>${S.health}/${CONFIG.startHealth}</b> &nbsp;·&nbsp; Guns: <b>${S.guns}</b>
              ${msg?`<br><br><span style="color:var(--red)">${msg}</span>`:''}
            </div></div>
            <div class="ev-acts">
              <button class="red full" id="fight" ${canFight?'':'disabled'}>FIGHT</button>
              <button class="full" id="run">RUN</button>
              <button class="amber full" id="bribe">PAYOFF</button>
              ${!canFight?'<span class="ev-warn">No gun — can\'t fight back.</span>':''}
            </div>
          </div>
        </div></div>`;
        document.getElementById("run").onclick=doRun;
        document.getElementById("bribe").onclick=doBribe;
        const f=document.getElementById("fight"); if(canFight) f.onclick=doFight;
        modalEscape = null;
      };
      render();
    };
    const hit=()=>{ S.health-=1; if(S.health<=0){ endGame("The city has a short memory. By morning nobody will remember your name."); return true; } return false; };
    const doFight=()=>{
      fightRound++;
      if (chance(fightKillChance(S.guns))) cops-=1;
      if (cops<=0){ const reward=randInt(3750,10000); S.cash+=reward;
        logMsg(`Beat the Feds, grabbed ${money(reward)}.`); modal=null;
        const winV=pick([
          ["LAST MAN STANDING",                  `Last man standing. You grab <span class="price">${money(reward)}</span> off the bodies and disappear into the night.`],
          ["ONE FOR THE PAPERS",                 `This one will make the Tribune tomorrow. You don't wait to read it. You take <span class="price">${money(reward)}</span> and put six blocks between yourself and the scene.`],
          ["ANOTHER VICTORY FOR ORGANISED CRIME",`Capone himself couldn't have handled it cleaner. <span class="price">${money(reward)}</span> off the floor, coat straightened, gone before the echo fades.`],
          ["IZZY PICKED THE WRONG MARK",         `The disguise was convincing — you'll give him that. But a fishmonger who moves like a middleweight is a fishmonger worth questioning. <span class="price">${money(reward)}</span> richer, one legend humbled.`],
        ]);
        showEvent('feds', winV[1], "GO", next); return; }
      if (chance(fedsCounterHitChance(S.guns, fightRound, S.day))){ if(hit())return; draw("You took a hit!"); } else draw("You missed — they're still on you.");
    };
    const doRun=()=>{
      if (chance(0.62)){ logMsg("Vanished into the streets."); modal=null;
        const runV=pick([
          ["GONE",             "You know these streets better than they do. Gone before they could blink."],
          ["INTO THE CROWD",   "You ducked into the lunch crowd on Michigan Avenue and let the city swallow you whole. Ness's men walked right past."],
          ["THE BACK WAY",     "Three alleys, a fire escape, and a borrowed hat. By the time they reached the corner you were four blocks north having a coffee."],
          ["LOST IN THE PARADE","By sheer luck a temperance march turned onto the street at precisely the right moment. You joined the procession, took a pamphlet, and were gone before anyone noticed the irony."],
        ]);
        showEvent('feds', runV[1], "PHEW", next); return; }
      if (hit()) return;
      const owned=Object.keys(S.inventory);
      if (owned.length){ const id=pick(owned); const lost=Math.min(S.inventory[id],randInt(1,5));
        S.inventory[id]-=lost; if(S.inventory[id]<=0) delete S.inventory[id];
        logMsg(`Fled but dropped ${lost} ${DRUG[id].name} and took a hit.`); }
      draw("Couldn't shake them — took a hit and dropped some goods.");
    };
    const doBribe=()=>{
      const cost=Math.min(S.cash, Math.round(randInt(2000,8000)*cops*bribeScale));
      if (cost<=0||cost>S.cash){ draw("Nothing to pay them with."); return; }
      S.cash-=cost; logMsg(`Counted out ${money(cost)} into an open palm.`); modal=null;
      const brV=pick([
        ["NOBODY SAW ANYTHING",`You count out <span class="price">${money(cost)}</span> into an open palm. Nobody saw anything. Nobody ever does.`],
        ["CITY RATES",         `<span class="price">${money(cost)}</span> in a folded newspaper, slid across the bar. Agent Hayes pockets it without breaking eye contact. Standard rate. Standard result.`],
        ["CIVIC DONATION",     `You explained to the officers that <span class="price">${money(cost)}</span> was a voluntary contribution to the Policemen's Benevolent Fund. They thanked you for your generosity and wished you a good evening.`],
        ["ABOVE BOARD",        `You told them it was a consulting fee for advice on avoiding criminal activity. They accepted <span class="price">${money(cost)}</span> and advised you to use the north exit. Everybody wins.`],
      ]);
      showEvent('feds', brV[1], "OK", next);
    };
    draw(null);
  }

  /* ---------- game over ---------- */
  function endGame(reason){
    S.over=true; S.overReason=reason||`Your month is over. Whatever you made, it's going to have to be enough.`;
    S.placement = pushScore(classicScore(S), netWorth(S));
    save(); render();
  }
  function renderGameOver(){
    const worth=netWorth(S), score=classicScore(S), rank=getRank(score);
    const hs=highscores();
    const placement=S.placement||1;
    const inTop10=placement<=10 && hs.length>0;

    const mkRow=(h,i,isYou)=>mkScoreRow(h,i,isYou);

    const rows=hs.map((h,i)=>mkRow(h,i,inTop10&&i===placement-1)).join('');
    const playerRow=inTop10?'':
      `<div class="eos-you-box"><div class="eos-row you">
        <span class="eos-pos">${placement}.</span>
        <span class="eos-name">${rank.toUpperCase()}</span>
        <span class="eos-fill"></span>
        <span class="eos-val">${money(worth)}</span>
        <span class="eos-tag">← YOU</span></div></div>`;

    app.innerHTML=`<div class="eos">
      <div class="eos-score-head">
        <div class="eos-title">FINAL SCORE</div>
        <div class="eos-amount-wrap">
          <img class="eos-gun" src="assets/eos-tommy-left.png" alt="" aria-hidden="true">
          <div class="eos-amount">${money(worth)}</div>
          <img class="eos-gun eos-gun-r" src="assets/eos-tommy-left.png" alt="" aria-hidden="true">
        </div>
        <hr class="eos-rule">
      </div>
      <div class="eos-scores">
        <div class="eos-hs-header">— ALL TIME HIGH SCORES —</div>
        <div class="eos-rows">${rows}${playerRow}</div>
      </div>
      <div class="eos-card">
        <img src="cards/${rankCard(rank)}.png" alt="${rank}">
      </div>
      <div class="eos-btns">
        <button class="amber" id="again">PLAY AGAIN</button>
        <button id="menu">MAIN MENU</button>
      </div>
    </div>`;
    document.getElementById("again").onclick=()=>{ localStorage.removeItem(SAVE_KEY); S=newGame(); save(); render(); };
    document.getElementById("menu").onclick=()=>{ S=null; renderTitle(); };
  }


  render();
})();
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
